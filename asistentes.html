<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de asistentes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 1150px;
      margin: 40px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    h2 {
      margin: 8px 0 0;
      font-size: 18px;
      font-weight: normal;
    }

    .cabecera {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 26px;
      min-height: 120px;
    }

    .logo {
      position: absolute;
      left: 0;
      max-width: 120px;
      height: auto;
    }

    .titulos {
      text-align: center;
    }

    .sublinea {
      margin-top: 10px;
      font-size: 15px;
      color: #444;
      text-align: center;
    }

    .mensaje {
      margin-top: 16px;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .mensaje.aviso {
      display: block;
      background: #eef4ff;
      color: #1d4f91;
      border: 1px solid #c9dcff;
    }

    .bloques-superiores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .bloque-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bloque-titulo-externo {
      font-size: 18px;
      font-weight: bold;
      color: #1d4f91;
      padding-left: 2px;
    }

    .bloque-info {
      background: #eef4ff;
      border: 1px solid #c9dcff;
      color: #1d4f91;
      padding: 14px;
      border-radius: 8px;
      line-height: 1.75;
      min-height: 170px;
    }

    .estado-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      vertical-align: middle;
    }

    .estado-badge.pendiente { background: #d39e00; }
    .estado-badge.confirmada { background: #198754; }
    .estado-badge.rechazada { background: #dc3545; }
    .estado-badge.cancelada { background: #6c757d; }

    .resumen-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .resumen-col strong {
      display: inline-block;
      min-width: 0;
    }

    .panel {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .barra-acciones {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .acciones-izquierda,
    .acciones-derecha {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn-enlace {
      background: #6c757d;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-enlace:hover {
      background: #565e64;
    }

    .btn-enlace.deshabilitado {
      background: #7aa7e8;
      cursor: not-allowed;
      pointer-events: none;
      opacity: 0.75;
    }

    .btn-icono {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .btn-icono:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }

    .btn-icono:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      color: #8a98a8;
      background: #f8fafc;
    }

    .btn-icono.eliminar {
      color: #dc3545;
      border-color: #efc2c7;
    }

    .btn-icono.eliminar:hover {
      background: #fff5f5;
      color: #b52a37;
      border-color: #e2a7af;
    }

    .btn-icono.anadir {
      color: #198754;
      border-color: #b8ddc4;
    }

    .btn-icono.anadir:hover {
      background: #f1fbf4;
      color: #13653f;
      border-color: #9fd1b0;
    }

    .btn-icono.guardar {
      color: #0b5ed7;
      border-color: #b8cbea;
    }

    .btn-icono.guardar:hover {
      background: #f3f8ff;
      color: #094db1;
      border-color: #9bb7e0;
    }

    .btn-icono svg {
      width: 18px;
      height: 18px;
    }

    .tabla-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      min-width: 860px;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid #dde4ea;
      padding: 12px 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #eef4ff;
      color: #1d4f91;
      font-weight: bold;
    }

    th.sel-col, td.sel-col {
      width: 40px;
      text-align: center;
    }

    th.nombre-col, td.nombre-col {
      width: 46%;
    }

    th.tipo-col, td.tipo-col {
      width: 22%;
    }

    th.edad-col, td.edad-col {
      width: 22%;
    }

    input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .fila-seleccionada {
      background: #f2f7ff;
    }

    @media (max-width: 1000px) {
      .bloques-superiores {
        grid-template-columns: 1fr;
      }

      .logo {
        position: static;
        display: block;
        margin: 0 auto 10px auto;
      }

      .cabecera {
        display: block;
        min-height: auto;
      }

      .barra-acciones {
        flex-direction: column;
        align-items: stretch;
      }

      .resumen-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">
      <div class="titulos">
        <h1 id="tituloEvento">DIFAS 2026</h1>
        <h2>Bautismos de mar</h2>
        <div class="sublinea">Panel de gestión de asistentes</div>
      </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="bloques-superiores">
      <div class="bloque-wrap">
        <div class="bloque-titulo-externo">Reserva actual</div>
        <div id="bloqueReserva" class="bloque-info">
          Cargando datos...
        </div>
      </div>

      <div class="bloque-wrap">
        <div class="bloque-titulo-externo">Resumen de la reserva</div>
        <div id="bloqueResumen" class="bloque-info">
          Cargando datos...
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="barra-acciones">
        <div class="acciones-izquierda">
          <a href="admin-reservas.html" id="btnVolverReservas" class="btn-enlace">Volver a panel de reservas</a>
        </div>

        <div class="acciones-derecha">
          <button type="button" id="btnEliminarSeleccionado" class="btn-icono eliminar" title="Eliminar asistente seleccionado" aria-label="Eliminar asistente seleccionado" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>

          <button type="button" id="btnAnadirFila" class="btn-icono anadir" title="Añadir asistente" aria-label="Añadir asistente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>

          <button type="button" id="btnGuardarAsistentes" class="btn-icono guardar" title="Guardar asistentes" aria-label="Guardar asistentes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
          </button>
        </div>
      </div>

      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th class="sel-col"></th>
              <th class="nombre-col">Nombre completo</th>
              <th class="tipo-col">Tipo</th>
              <th class="edad-col">Edad</th>
            </tr>
          </thead>
          <tbody id="cuerpoAsistentes"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let tokenEdicion = "";
    let reservaActual = null;
    let visitantesActuales = [];
    let envioEnCurso = false;
    let filaSeleccionadaId = null;
    let contadorFilas = 0;

    function claseEstadoBadge(estado) {
      const e = String(estado || "").toLowerCase();
      if (e === "pendiente") return "pendiente";
      if (e === "confirmada") return "confirmada";
      if (e === "rechazada") return "rechazada";
      if (e === "cancelada") return "cancelada";
      return "";
    }

    function solicitudEditable() {
      return reservaActual && ["PENDIENTE", "CONFIRMADA"].includes(reservaActual.estado);
    }

    function formatearFechaHora(valor) {
      if (!valor) return "No disponible";
      return String(valor).replace("T", " ");
    }

    function mostrarMensaje(tipo, texto) {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje " + tipo;
      mensaje.style.display = "block";
      mensaje.textContent = texto;
    }

    function limpiarMensaje() {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje";
      mensaje.style.display = "none";
      mensaje.textContent = "";
    }

    async function cargarConfigEvento() {
      try {
        const response = await fetch("/api/config-evento");
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar la configuración del evento.");
        }

        const config = data.config || {};
        document.title = config.subtitulo_evento || "Gestión de asistentes";
        document.getElementById("tituloEvento").textContent = config.nombre_evento || "DIFAS 2026";
      } catch (error) {
        console.error(error);
      }
    }

    async function cargarReserva() {
      const params = new URLSearchParams(window.location.search);
      tokenEdicion = params.get("token") || "";

      if (!tokenEdicion) {
        mostrarMensaje("error", "Falta el token de edición en la URL.");
        return false;
      }

      const response = await fetch(`/api/reserva?token=${encodeURIComponent(tokenEdicion)}`);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        mostrarMensaje("error", data.error || "No se pudo recuperar la solicitud.");
        return false;
      }

      reservaActual = data.reserva;
      return true;
    }

    async function cargarVisitantes() {
      const response = await fetch(`/api/visitantes?token=${encodeURIComponent(tokenEdicion)}`);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        if (reservaActual && reservaActual.estado === "CANCELADA") {
          mostrarMensaje("aviso", "La solicitud está cancelada. No se permite gestionar asistentes.");
        } else if (reservaActual && reservaActual.estado === "RECHAZADA") {
          mostrarMensaje("error", "La solicitud está rechazada. No se permite gestionar asistentes.");
        } else {
          mostrarMensaje("error", data.error || "No se pudieron cargar los asistentes.");
        }
        visitantesActuales = [];
        renderizarVisitantes();
        actualizarModoPantalla();
        return;
      }

      visitantesActuales = Array.isArray(data.visitantes) ? data.visitantes : [];
      renderizarVisitantes();
      actualizarModoPantalla();
    }

    function crearIdFila() {
      contadorFilas += 1;
      return `fila_${Date.now()}_${contadorFilas}`;
    }

    function obtenerFilasTabla() {
      return Array.from(document.querySelectorAll("#cuerpoAsistentes tr"));
    }

    function obtenerVisitantesDeTabla() {
      return obtenerFilasTabla().map(tr => ({
        filaId: tr.dataset.filaId,
        nombre_completo: tr.querySelector(".nombre-asistente")?.value.trim() || "",
        tipo_asistente: tr.querySelector(".tipo-asistente")?.value || "ALUMNO",
        categoria_edad: tr.querySelector(".categoria-asistente")?.value || "MAYOR_10"
      }));
    }

    function obtenerVisitantesValidosDeTabla() {
      return obtenerVisitantesDeTabla().filter(v => v.nombre_completo !== "");
    }

    function actualizarBotonEliminar() {
      const btn = document.getElementById("btnEliminarSeleccionado");
      btn.disabled = !solicitudEditable() || !filaSeleccionadaId;
    }

    function seleccionarFila(filaId) {
      filaSeleccionadaId = filaId;
      obtenerFilasTabla().forEach(tr => {
        tr.classList.toggle("fila-seleccionada", tr.dataset.filaId === filaId);
        const radio = tr.querySelector(".selector-fila");
        if (radio) radio.checked = tr.dataset.filaId === filaId;
      });
      actualizarBotonEliminar();
    }

    function eliminarFilaSeleccionada() {
      if (!solicitudEditable() || !filaSeleccionadaId) return;

      const fila = document.querySelector(`#cuerpoAsistentes tr[data-fila-id="${filaSeleccionadaId}"]`);
      if (fila) fila.remove();

      filaSeleccionadaId = null;

      if (obtenerFilasTabla().length === 0) {
        crearFila();
      }

      recalcularResumenEnPantalla();
      actualizarBotonEliminar();
    }

    function crearFila(asistente = { nombre_completo: "", tipo_asistente: "ALUMNO", categoria_edad: "MAYOR_10" }) {
      const tbody = document.getElementById("cuerpoAsistentes");
      const tr = document.createElement("tr");
      const filaId = crearIdFila();
      const editable = solicitudEditable();

      tr.dataset.filaId = filaId;

      tr.innerHTML = `
        <td class="sel-col">
          <input type="radio" name="seleccionAsistente" class="selector-fila" ${editable ? "" : "disabled"}>
        </td>
        <td class="nombre-col">
          <input type="text" class="nombre-asistente" value="${(asistente.nombre_completo || "").replace(/"/g, "&quot;")}" ${editable ? "" : "disabled"}>
        </td>
        <td class="tipo-col">
          <select class="tipo-asistente" ${editable ? "" : "disabled"}>
            <option value="ALUMNO" ${asistente.tipo_asistente === "ALUMNO" ? "selected" : ""}>Alumno</option>
            <option value="PROFESOR" ${asistente.tipo_asistente === "PROFESOR" ? "selected" : ""}>Profesor</option>
          </select>
        </td>
        <td class="edad-col">
          <select class="categoria-asistente" ${editable ? "" : "disabled"}>
            <option value="MAYOR_10" ${asistente.categoria_edad === "MAYOR_10" ? "selected" : ""}>Mayor de 10 años</option>
            <option value="MENOR_10" ${asistente.categoria_edad === "MENOR_10" ? "selected" : ""}>Menor de 10 años</option>
          </select>
        </td>
      `;

      tr.querySelector(".selector-fila").addEventListener("change", function () {
        seleccionarFila(filaId);
      });

      tr.querySelector(".nombre-asistente").addEventListener("input", function () {
        recalcularResumenEnPantalla();
      });

      tr.querySelector(".tipo-asistente").addEventListener("change", function () {
        recalcularResumenEnPantalla();
      });

      tr.querySelector(".categoria-asistente").addEventListener("change", function () {
        recalcularResumenEnPantalla();
      });

      tbody.appendChild(tr);
    }

    function renderizarVisitantes() {
      const tbody = document.getElementById("cuerpoAsistentes");
      tbody.innerHTML = "";
      filaSeleccionadaId = null;

      if (visitantesActuales.length === 0) {
        crearFila();
      } else {
        visitantesActuales.forEach(v => crearFila(v));
      }

      recalcularResumenEnPantalla();
      actualizarBotonEliminar();
    }

    function recalcularResumenEnPantalla() {
      if (!reservaActual) return;

      const visitantesValidos = obtenerVisitantesValidosDeTabla();
      const totalAsignadas = visitantesValidos.length;

      const reservaOriginal = Number(reservaActual.plazas_prereservadas || 0);
      const prereservaVigente = !!reservaActual.prereserva_vigente;
      const capacidadFranja = Number(reservaActual.capacidad || 0);

      const reservadasPendientes = prereservaVigente
        ? Math.max(reservaOriginal - totalAsignadas, 0)
        : 0;

      const plazasBloqueadasActualmente = prereservaVigente
        ? Math.max(reservaOriginal, totalAsignadas)
        : totalAsignadas;

      const disponiblesFranja = Math.max(capacidadFranja - plazasBloqueadasActualmente, 0);

      const alumnos = visitantesValidos.filter(v => v.tipo_asistente === "ALUMNO").length;
      const profesores = visitantesValidos.filter(v => v.tipo_asistente === "PROFESOR").length;
      const mayores = visitantesValidos.filter(v => v.categoria_edad === "MAYOR_10").length;
      const menores = visitantesValidos.filter(v => v.categoria_edad === "MENOR_10").length;

      const claseEstado = claseEstadoBadge(reservaActual.estado);

      document.getElementById("bloqueReserva").innerHTML = `
        <strong>Código de reserva:</strong> ${reservaActual.codigo_reserva}<br>
        <strong>Estado actual:</strong> <span class="estado-badge ${claseEstado}">${reservaActual.estado}</span><br>
        <strong>Franja horaria asignada:</strong><br>
        ${reservaActual.fecha} - ${reservaActual.hora_inicio} a ${reservaActual.hora_fin}<br>
        <strong>Hora límite de asignación de plazas reservadas:</strong> ${formatearFechaHora(reservaActual.prereserva_expira_en)}
      `;

      document.getElementById("bloqueResumen").innerHTML = `
        <div class="resumen-grid">
          <div class="resumen-col">
            <strong>Plazas</strong><br>
            Reservadas pendientes: ${reservadasPendientes}<br>
            Asignadas: ${totalAsignadas}<br>
            Disponibles en la franja: ${disponiblesFranja}
          </div>
          <div class="resumen-col">
            <strong>Desglose</strong><br>
            Alumnos: ${alumnos}<br>
            Profesores: ${profesores}<br>
            Mayores de 10 años: ${mayores}<br>
            Menores de 10 años: ${menores}
          </div>
        </div>
      `;

      const btnGuardar = document.getElementById("btnGuardarAsistentes");
      const btnAnadir = document.getElementById("btnAnadirFila");

      if (!solicitudEditable()) {
        btnGuardar.disabled = true;
        btnAnadir.disabled = true;
        actualizarBotonEliminar();
        return;
      }

      const maximoPermitido = prereservaVigente
        ? Math.max(capacidadFranja, reservaOriginal)
        : capacidadFranja;

      if (totalAsignadas > maximoPermitido) {
        mostrarMensaje("error", `No puede asignar más asistentes (${totalAsignadas}) que el máximo actualmente permitido para esta franja (${maximoPermitido}).`);
        btnGuardar.disabled = true;
        btnAnadir.disabled = true;
      } else {
        limpiarMensaje();
        btnGuardar.disabled = envioEnCurso;
        btnAnadir.disabled = totalAsignadas >= maximoPermitido;
      }

      actualizarBotonEliminar();
    }

    function actualizarModoPantalla() {
      const editable = solicitudEditable();

      document.getElementById("btnGuardarAsistentes").disabled = !editable || envioEnCurso;
      document.getElementById("btnAnadirFila").disabled = !editable;

      obtenerFilasTabla().forEach(tr => {
        const nombre = tr.querySelector(".nombre-asistente");
        const tipo = tr.querySelector(".tipo-asistente");
        const categoria = tr.querySelector(".categoria-asistente");
        const selector = tr.querySelector(".selector-fila");

        if (nombre) nombre.disabled = !editable;
        if (tipo) tipo.disabled = !editable;
        if (categoria) categoria.disabled = !editable;
        if (selector) selector.disabled = !editable;
      });

      recalcularResumenEnPantalla();
    }

    async function guardarAsistentes() {
      if (!solicitudEditable() || envioEnCurso) return;

      limpiarMensaje();

      const visitantes = obtenerVisitantesValidosDeTabla().map(v => ({
        nombre_completo: v.nombre_completo,
        tipo_asistente: v.tipo_asistente,
        categoria_edad: v.categoria_edad
      }));

      try {
        envioEnCurso = true;
        const btnGuardar = document.getElementById("btnGuardarAsistentes");
        btnGuardar.disabled = true;

        const response = await fetch("/api/visitantes-guardar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token_edicion: tokenEdicion,
            visitantes
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          mostrarMensaje("error", data.error || "No se pudieron guardar los asistentes.");
          return;
        }

        mostrarMensaje("ok", data.mensaje || "Asistentes guardados correctamente.");
        await cargarReserva();
        await cargarVisitantes();

      } catch (error) {
        console.error(error);
        mostrarMensaje("error", "Error de conexión con el servidor.");
      } finally {
        envioEnCurso = false;
        document.getElementById("btnGuardarAsistentes").disabled = !solicitudEditable();
        actualizarModoPantalla();
      }
    }

    document.addEventListener("DOMContentLoaded", async function () {
      document.getElementById("btnAnadirFila").addEventListener("click", function () {
        if (!solicitudEditable()) return;
        crearFila();
        recalcularResumenEnPantalla();
      });

      document.getElementById("btnEliminarSeleccionado").addEventListener("click", eliminarFilaSeleccionada);
      document.getElementById("btnGuardarAsistentes").addEventListener("click", guardarAsistentes);

      try {
        await cargarConfigEvento();
        const ok = await cargarReserva();
        if (!ok) return;
        await cargarVisitantes();
      } catch (error) {
        console.error(error);
        mostrarMensaje("error", "Error al cargar la página de asistentes.");
      }
    });
  </script>
</body>
</html>
