<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de asistentes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 1150px;
      margin: 40px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    h2 {
      margin-top: 6px;
      font-size: 22px;
      font-weight: normal;
    }

    .cabecera {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
      min-height: 120px;
    }

    .logo {
      position: absolute;
      left: 0;
      max-width: 120px;
      height: auto;
    }

    .titulos {
      text-align: center;
    }

    .lugar-evento {
      margin-top: 8px;
      font-size: 15px;
      color: #444;
      text-align: center;
    }

    .nota-destacada {
      background: #fff8e6;
      border: 1px solid #f0d58a;
      color: #7a5a00;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 18px;
      line-height: 1.55;
      display: none;
    }

    .resumen-superior {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .info {
      background: #eef4ff;
      border: 1px solid #c9dcff;
      color: #1d4f91;
      padding: 12px;
      border-radius: 6px;
      min-height: 150px;
      line-height: 1.7;
    }

    .info-titulo {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 16px;
      display: block;
    }

    .mensaje {
      margin-top: 16px;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .mensaje.aviso {
      display: block;
      background: #eef4ff;
      color: #1d4f91;
      border: 1px solid #c9dcff;
    }

    .estado-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      vertical-align: middle;
    }

    .estado-badge.pendiente { background: #d39e00; }
    .estado-badge.confirmada { background: #198754; }
    .estado-badge.rechazada { background: #dc3545; }
    .estado-badge.cancelada { background: #6c757d; }

    .panel {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .acciones-superiores {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button, .btn-enlace {
      background: #0b5ed7;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    button:hover, .btn-enlace:hover {
      background: #094db1;
    }

    button:disabled,
    .btn-enlace.deshabilitado {
      background: #7aa7e8;
      cursor: not-allowed;
      pointer-events: none;
      opacity: 0.75;
    }

    .btn-secundario {
      background: #6c757d;
    }

    .btn-secundario:hover {
      background: #565e64;
    }

    .btn-anadir {
      background: #198754;
    }

    .btn-anadir:hover {
      background: #13653f;
    }

    .btn-eliminar {
      background: #dc3545;
    }

    .btn-eliminar:hover {
      background: #b52a37;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid #dde4ea;
      padding: 12px 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #eef4ff;
      color: #1d4f91;
    }

    input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .acciones {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    @media (max-width: 1000px) {
      .resumen-superior {
        grid-template-columns: 1fr;
      }

      .logo {
        position: static;
        display: block;
        margin: 0 auto 10px auto;
      }

      .cabecera {
        display: block;
        min-height: auto;
      }

      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 14px;
        background: #fff;
        border: 1px solid #dde4ea;
        border-radius: 8px;
        padding: 10px;
      }

      td {
        border: none;
        padding: 8px 0;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">
      <div class="titulos">
        <h1 id="tituloEvento">Cargando evento...</h1>
        <h2 id="subtituloEvento">Gestión de asistentes</h2>
        <div id="lugarEvento" class="lugar-evento" style="display:none;"></div>
      </div>
    </div>

    <div id="notaReserva" class="nota-destacada"></div>
    <div id="mensaje" class="mensaje"></div>

    <div class="resumen-superior">
      <div id="infoReserva" class="info" style="display:none;"></div>
      <div id="resumenAsistentes" class="info">
        <span class="info-titulo">Resumen de asistentes</span>
        Cargando datos...
      </div>
      <div id="resumenFranja" class="info">
        <span class="info-titulo">Resumen global de la franja horaria</span>
        Cargando datos...
      </div>
    </div>

    <div class="panel">
      <div class="acciones-superiores">
        <a href="#" id="btnVolverEditar" class="btn-enlace btn-secundario">Volver a datos generales</a>
        <button type="button" id="btnAnadirFila" class="btn-anadir">Añadir asistente</button>
      </div>

      <div style="overflow-x:auto;">
        <table id="tablaAsistentes">
          <thead>
            <tr>
              <th style="width:45%;">Nombre completo</th>
              <th style="width:20%;">Tipo</th>
              <th style="width:20%;">Edad</th>
              <th style="width:15%;">Acción</th>
            </tr>
          </thead>
          <tbody id="cuerpoAsistentes"></tbody>
        </table>
      </div>

      <div class="acciones">
        <button type="button" id="btnGuardarAsistentes">Guardar asistentes</button>
      </div>
    </div>
  </div>

  <script>
    let tokenEdicion = "";
    let reservaActual = null;
    let visitantesActuales = [];
    let envioEnCurso = false;

    let plazasAsignadasActuales = 0;
    let plazasReservadasPendientes = 0;
    let plazasLibresFranja = 0;
    let maximoAsignable = 0;

    function claseEstadoBadge(estado) {
      const e = String(estado || "").toLowerCase();
      if (e === "pendiente") return "pendiente";
      if (e === "confirmada") return "confirmada";
      if (e === "rechazada") return "rechazada";
      if (e === "cancelada") return "cancelada";
      return "";
    }

    function solicitudEditable() {
      return reservaActual && ["PENDIENTE", "CONFIRMADA"].includes(reservaActual.estado);
    }

    function formatearFechaHora(valor) {
      if (!valor) return "No disponible";
      return String(valor).replace("T", " ");
    }

    function mostrarMensaje(tipo, texto) {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje " + tipo;
      mensaje.style.display = "block";
      mensaje.textContent = texto;
    }

    function limpiarMensaje() {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje";
      mensaje.style.display = "none";
      mensaje.textContent = "";
    }

    async function cargarConfigEvento() {
      try {
        const response = await fetch("/api/config-evento");
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar la configuración del evento.");
        }

        const config = data.config || {};

        document.title = config.subtitulo_evento || "Gestión de asistentes";
        document.getElementById("tituloEvento").textContent = config.nombre_evento || "Evento no configurado";
        document.getElementById("subtituloEvento").textContent = "Gestión de asistentes";

        const lugarEl = document.getElementById("lugarEvento");
        if (config.lugar && String(config.lugar).trim() !== "") {
          lugarEl.style.display = "block";
          lugarEl.innerHTML = `<strong>Lugar:</strong> ${config.lugar}`;
        } else {
          lugarEl.style.display = "none";
          lugarEl.textContent = "";
        }
      } catch (error) {
        console.error(error);
        document.getElementById("tituloEvento").textContent = "Evento no disponible";
        document.getElementById("subtituloEvento").textContent = "Gestión de asistentes";
      }
    }

    function calcularEstadoReservaActual() {
      const prereservaVigente = !!reservaActual?.prereserva_vigente;
      const plazasHistoricas = Number(reservaActual?.plazas_prereservadas || 0);
      const asignadas = Number(reservaActual?.plazas_asignadas || 0);

      plazasAsignadasActuales = asignadas;
      plazasReservadasPendientes = prereservaVigente
        ? Math.max(plazasHistoricas - asignadas, 0)
        : 0;

      plazasLibresFranja = Number(reservaActual?.disponibles || 0);
      maximoAsignable = asignadas + plazasReservadasPendientes + plazasLibresFranja;
    }

    function actualizarNotaReserva(totalAsignadasTabla) {
      const nota = document.getElementById("notaReserva");

      const reservadasPendientesVisual = Math.max(
        plazasReservadasPendientes - Math.max(totalAsignadasTabla - plazasAsignadasActuales, 0),
        0
      );

      const libresVisual = Math.max(
        plazasLibresFranja - Math.max(totalAsignadasTabla - plazasAsignadasActuales - plazasReservadasPendientes, 0),
        0
      );

      nota.innerHTML = `
        <strong>Reserva actual</strong>
        <br>Plazas reservadas pendientes: <strong>${reservadasPendientesVisual}</strong>
        <br>Plazas asignadas: <strong>${totalAsignadasTabla}</strong>
        <br>Plazas libres en la franja: <strong>${libresVisual}</strong>
        <br>Hora límite de consolidación: <strong>${formatearFechaHora(reservaActual?.prereserva_expira_en)}</strong>
      `;
      nota.style.display = "block";
    }

    async function cargarReserva() {
      const params = new URLSearchParams(window.location.search);
      tokenEdicion = params.get("token") || "";

      if (!tokenEdicion) {
        mostrarMensaje("error", "Falta el token de edición en la URL.");
        return false;
      }

      const response = await fetch(`/api/reserva?token=${encodeURIComponent(tokenEdicion)}`);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        mostrarMensaje("error", data.error || "No se pudo recuperar la solicitud.");
        return false;
      }

      reservaActual = data.reserva;
      calcularEstadoReservaActual();

      document.getElementById("btnVolverEditar").href = `editar.html?token=${encodeURIComponent(tokenEdicion)}`;

      const claseEstado = claseEstadoBadge(reservaActual.estado);
      document.getElementById("infoReserva").style.display = "block";
      document.getElementById("infoReserva").innerHTML = `
        <span class="info-titulo">Resumen de la solicitud actual</span>
        <strong>Código de reserva:</strong> ${reservaActual.codigo_reserva}<br>
        <strong>Estado:</strong> <span class="estado-badge ${claseEstado}">${reservaActual.estado}</span><br>
        <strong>Franja asignada:</strong><br>
        ${reservaActual.fecha} - ${reservaActual.hora_inicio} a ${reservaActual.hora_fin}<br>
        <strong>Plazas reservadas pendientes:</strong> ${plazasReservadasPendientes}<br>
        <strong>Plazas asignadas:</strong> ${plazasAsignadasActuales}<br>
        <strong>Plazas libres en la franja:</strong> ${plazasLibresFranja}<br>
        <strong>Expira:</strong> ${formatearFechaHora(reservaActual.prereserva_expira_en)}
      `;

      document.getElementById("resumenFranja").innerHTML = `
        <span class="info-titulo">Resumen global de la franja horaria</span>
        <strong>Plazas totales:</strong> ${Number(reservaActual.capacidad || 0)}<br>
        <strong>Plazas ocupadas en esta franja:</strong> ${Number(reservaActual.ocupadas || 0)}<br>
        <strong>Plazas disponibles:</strong> ${Number(reservaActual.disponibles || 0)}
      `;

      return true;
    }

    function crearFila(asistente = { nombre_completo: "", tipo_asistente: "ALUMNO", categoria_edad: "MAYOR_10" }) {
      const tbody = document.getElementById("cuerpoAsistentes");
      const tr = document.createElement("tr");

      const editable = solicitudEditable();

      tr.innerHTML = `
        <td>
          <input type="text" class="nombre-asistente" value="${(asistente.nombre_completo || "").replace(/"/g, "&quot;")}" ${editable ? "" : "disabled"} />
        </td>
        <td>
          <select class="tipo-asistente" ${editable ? "" : "disabled"}>
            <option value="ALUMNO" ${asistente.tipo_asistente === "ALUMNO" ? "selected" : ""}>Alumno</option>
            <option value="PROFESOR" ${asistente.tipo_asistente === "PROFESOR" ? "selected" : ""}>Profesor</option>
          </select>
        </td>
        <td>
          <select class="categoria-asistente" ${editable ? "" : "disabled"}>
            <option value="MAYOR_10" ${asistente.categoria_edad === "MAYOR_10" ? "selected" : ""}>Mayor de 10 años</option>
            <option value="MENOR_10" ${asistente.categoria_edad === "MENOR_10" ? "selected" : ""}>Menor de 10 años</option>
          </select>
        </td>
        <td>
          <button type="button" class="btn-eliminar" ${editable ? "" : "disabled"}>Eliminar</button>
        </td>
      `;

      tr.querySelector(".btn-eliminar").addEventListener("click", function () {
        if (!solicitudEditable()) return;
        tr.remove();
        actualizarResumenAsistentesDesdeTabla();
      });

      tr.querySelector(".nombre-asistente").addEventListener("input", actualizarResumenAsistentesDesdeTabla);
      tr.querySelector(".tipo-asistente").addEventListener("change", actualizarResumenAsistentesDesdeTabla);
      tr.querySelector(".categoria-asistente").addEventListener("change", actualizarResumenAsistentesDesdeTabla);

      tbody.appendChild(tr);
    }

    function actualizarResumenAsistentesDesdeTabla() {
      const filas = Array.from(document.querySelectorAll("#cuerpoAsistentes tr"));
      const datos = filas.map(tr => ({
        nombre: tr.querySelector(".nombre-asistente")?.value.trim() || "",
        tipo: tr.querySelector(".tipo-asistente")?.value || "",
        categoria: tr.querySelector(".categoria-asistente")?.value || ""
      })).filter(v => v.nombre !== "");

      const total = datos.length;
      const alumnos = datos.filter(v => v.tipo === "ALUMNO").length;
      const profesores = datos.filter(v => v.tipo === "PROFESOR").length;
      const mayores = datos.filter(v => v.categoria === "MAYOR_10").length;
      const menores = datos.filter(v => v.categoria === "MENOR_10").length;

      const adicionales = Math.max(total - plazasAsignadasActuales, 0);
      const consumidasDeReserva = Math.min(adicionales, plazasReservadasPendientes);
      const consumidasDirectas = Math.max(adicionales - plazasReservadasPendientes, 0);

      const reservadasPendientesVisual = Math.max(plazasReservadasPendientes - consumidasDeReserva, 0);
      const libresVisual = Math.max(plazasLibresFranja - consumidasDirectas, 0);

      document.getElementById("resumenAsistentes").innerHTML = `
        <span class="info-titulo">Resumen de asistentes</span>
        <strong>Plazas reservadas pendientes:</strong> ${reservadasPendientesVisual}<br>
        <strong>Plazas asignadas:</strong> ${total}<br>
        <strong>Plazas libres en la franja:</strong> ${libresVisual}<br>
        <strong>Alumnos:</strong> ${alumnos}<br>
        <strong>Profesores:</strong> ${profesores}<br>
        <strong>Mayores de 10 años:</strong> ${mayores}<br>
        <strong>Menores de 10 años:</strong> ${menores}
      `;

      actualizarNotaReserva(total);

      const botonGuardar = document.getElementById("btnGuardarAsistentes");
      const botonAnadir = document.getElementById("btnAnadirFila");

      if (total > maximoAsignable) {
        mostrarMensaje("error", `No puede asignar más asistentes (${total}) que el máximo actualmente disponible para esta solicitud (${maximoAsignable}).`);
        botonGuardar.disabled = true;
        botonAnadir.disabled = true;
      } else {
        limpiarMensaje();
        botonGuardar.disabled = !solicitudEditable() || envioEnCurso;
        botonAnadir.disabled = !solicitudEditable() || total >= maximoAsignable;
      }
    }

    async function cargarVisitantes() {
      const response = await fetch(`/api/visitantes?token=${encodeURIComponent(tokenEdicion)}`);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        if (reservaActual && reservaActual.estado === "CANCELADA") {
          mostrarMensaje("aviso", "La solicitud está cancelada. No se permite gestionar asistentes.");
        } else if (reservaActual && reservaActual.estado === "RECHAZADA") {
          mostrarMensaje("error", "La solicitud está rechazada. No se permite gestionar asistentes.");
        } else {
          mostrarMensaje("error", data.error || "No se pudieron cargar los asistentes.");
        }
        visitantesActuales = [];
        renderizarVisitantes();
        actualizarModoPantalla();
        return;
      }

      visitantesActuales = Array.isArray(data.visitantes) ? data.visitantes : [];
      renderizarVisitantes();
      actualizarModoPantalla();
    }

    function renderizarVisitantes() {
      const tbody = document.getElementById("cuerpoAsistentes");
      tbody.innerHTML = "";

      if (visitantesActuales.length === 0) {
        crearFila();
      } else {
        visitantesActuales.forEach(v => crearFila(v));
      }

      actualizarResumenAsistentesDesdeTabla();
    }

    function actualizarModoPantalla() {
      const editable = solicitudEditable();
      const totalActualTabla = obtenerVisitantesDeTabla().length;

      document.getElementById("btnGuardarAsistentes").disabled = !editable || envioEnCurso || totalActualTabla > maximoAsignable;
      document.getElementById("btnAnadirFila").disabled = !editable || totalActualTabla >= maximoAsignable;

      if (!editable) {
        const filas = document.querySelectorAll("#cuerpoAsistentes tr");
        filas.forEach(tr => {
          const nombre = tr.querySelector(".nombre-asistente");
          const tipo = tr.querySelector(".tipo-asistente");
          const categoria = tr.querySelector(".categoria-asistente");
          const eliminar = tr.querySelector(".btn-eliminar");
          if (nombre) nombre.disabled = true;
          if (tipo) tipo.disabled = true;
          if (categoria) categoria.disabled = true;
          if (eliminar) eliminar.disabled = true;
        });
      }
    }

    function obtenerVisitantesDeTabla() {
      return Array.from(document.querySelectorAll("#cuerpoAsistentes tr"))
        .map(tr => ({
          nombre_completo: tr.querySelector(".nombre-asistente")?.value.trim() || "",
          tipo_asistente: tr.querySelector(".tipo-asistente")?.value || "ALUMNO",
          categoria_edad: tr.querySelector(".categoria-asistente")?.value || "MAYOR_10"
        }))
        .filter(v => v.nombre_completo !== "");
    }

    async function guardarAsistentes() {
      if (!solicitudEditable() || envioEnCurso) return;

      limpiarMensaje();

      const visitantes = obtenerVisitantesDeTabla();

      if (visitantes.length > maximoAsignable) {
        mostrarMensaje("error", `No puede asignar más asistentes (${visitantes.length}) que el máximo actualmente disponible para esta solicitud (${maximoAsignable}).`);
        return;
      }

      try {
        envioEnCurso = true;
        document.getElementById("btnGuardarAsistentes").disabled = true;
        document.getElementById("btnGuardarAsistentes").textContent = "Guardando...";

        const response = await fetch("/api/visitantes-guardar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token_edicion: tokenEdicion,
            visitantes
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          mostrarMensaje("error", data.error || "No se pudieron guardar los asistentes.");
          return;
        }

        mostrarMensaje("ok", data.mensaje || "Asistentes guardados correctamente.");
        await cargarReserva();
        await cargarVisitantes();

      } catch (error) {
        console.error(error);
        mostrarMensaje("error", "Error de conexión con el servidor.");
      } finally {
        envioEnCurso = false;
        document.getElementById("btnGuardarAsistentes").disabled = !solicitudEditable();
        document.getElementById("btnGuardarAsistentes").textContent = "Guardar asistentes";
        actualizarModoPantalla();
      }
    }

    document.addEventListener("DOMContentLoaded", async function () {
      document.getElementById("btnAnadirFila").addEventListener("click", function () {
        if (!solicitudEditable()) return;

        const totalActual = obtenerVisitantesDeTabla().length;
        if (totalActual >= maximoAsignable) {
          mostrarMensaje("error", `Ya ha alcanzado el máximo asignable actualmente para esta solicitud (${maximoAsignable}).`);
          return;
        }

        crearFila();
        actualizarResumenAsistentesDesdeTabla();
      });

      document.getElementById("btnGuardarAsistentes").addEventListener("click", guardarAsistentes);

      try {
        await cargarConfigEvento();
        const ok = await cargarReserva();
        if (!ok) return;
        await cargarVisitantes();
      } catch (error) {
        console.error(error);
        mostrarMensaje("error", "Error al cargar la página de asistentes.");
      }
    });
  </script>
</body>
</html>
