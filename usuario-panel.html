<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de reservas</title>
  <style>
    html, body { min-height: 100%; }
    body {
      font-family: Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.78) 12%, rgba(255,255,255,0.42) 26%, rgba(255,255,255,0.18) 42%, rgba(255,255,255,0.10) 100%),
        linear-gradient(180deg, rgba(244,246,248,0.18) 0%, rgba(244,246,248,0.24) 100%),
        url("assets/fondo_cabecera.png") top center / 100% auto no-repeat,
        #f4f6f8;
      background-blend-mode: normal, screen, normal;
      margin: 0;
      color: #222;
      overflow-x: hidden;
      overflow-y: auto;
      font-size: 14px;
    }
    .cabecera-global {
      position: relative;
      background: transparent;
      box-shadow: none;
      padding: 18px 20px 14px;
      z-index: 20;
    }
    .cabecera-global-inner {
      max-width: 1108px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .bloque-marca {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50px;
      flex-wrap: wrap;
      text-align: left;
    }
    .logo-cabecera {
      width: 77px;
      height: auto;
      display: block;
      transition: opacity 0.12s ease;
    }
    .logo-cabecera.logo-pendiente { opacity: 0; }
    .titulos-cabecera h1 {
      margin: 0;
      font-size: 24px;
      color: #123a63;
      line-height: 1.15;
      font-weight: 600;
    }
    .titulos-cabecera h2 {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: normal;
      color: #4a5a6a;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .contenedor {
      max-width: 1108px;
      margin: 14px auto 22px;
      padding: 0 16px 20px;
    }
    .barra-navegacion, .bloque {
      background: rgba(255,255,255,0.94);
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      backdrop-filter: blur(2px);
    }
    .barra-navegacion {
      position: relative;
      padding: 10px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 58px;
    }
    .barra-navegacion-izq {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: min(100%, 620px);
      pointer-events: none;
    }
    .panel-titulo {
      white-space: nowrap;
      font-size: 20px;
      font-weight: 700;
      color: #163c67;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }
    .barra-navegacion-der, .acciones-superiores {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .barra-navegacion-der { margin-left: auto; }
    .btn-icono {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }
    .btn-icono:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }
    .btn-icono:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      color: #8a98a8;
      background: #f8fafc;
    }
    .btn-icono svg, .btn-filtros-reset svg {
      width: 18px;
      height: 18px;
      display: block;
    }
    .btn-filtros-reset img {
      width: 22px;
      height: 22px;
      display: block;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .bloque {
      padding: 14px;
      margin-bottom: 10px;
    }
    .bloque h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #123a63;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #123a63;
      font-size: 13px;
    }
    input[type="text"], input[type="date"], select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      color: #1e2a36;
    }
    .filtros {
      display: grid;
      grid-template-columns: 282px 170px 150px minmax(180px, 1fr) auto;
      gap: 10px;
      align-items: end;
    }
    .filtro-acciones-rapidas {
      display: flex;
      align-items: end;
      justify-content: center;
      min-height: 40px;
    }
    .btn-filtros-reset {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      color: #4a5a6a;
    }
    .btn-filtros-reset:hover { color: #0b5ed7; }
    .btn-filtros-reset:hover img {
      transform: scale(1.06);
      opacity: 0.88;
    }
    .resumen-linea {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .resumen {
      font-weight: 700;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: #123a63;
      font-size: 13px;
    }
    .tabla-wrap { overflow-x: auto; }
    table {
      width: 100%;
      min-width: 910px;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
      font-size: 13px;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #dde4ea;
      padding: 9px 8px;
      text-align: left;
      vertical-align: middle;
      line-height: 1.3;
    }
    th {
      background: #eef4ff;
      color: #1d4f91;
      font-weight: bold;
    }
    th.sel-col, td.sel-col {
      width: 30px;
      min-width: 30px;
      max-width: 30px;
      text-align: center;
    }
    th.obs-col, td.obs-col {
      width: 32px;
      min-width: 32px;
      max-width: 32px;
      text-align: center;
    }
    th.actividad-col, td.actividad-col {
      width: 290px;
      min-width: 290px;
    }
    th.estado-col, td.estado-col {
      width: 114px;
      min-width: 114px;
      text-align: center;
    }
    .encabezado-estado {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .encabezado-estado-icono {
      width: 14px;
      height: 14px;
      display: inline-block;
      opacity: 0.8;
      flex: 0 0 auto;
    }
    th.tiempo-col, td.tiempo-col {
      width: 126px;
      min-width: 126px;
      text-align: center;
    }
    th.fecha-col, td.fecha-col {
      width: 82px;
      min-width: 82px;
      text-align: center;
    }
    th.horario-col, td.horario-col {
      width: 106px;
      min-width: 106px;
      text-align: center;
    }
    th.plazas-col, td.plazas-col {
      width: 166px;
      min-width: 166px;
      text-align: center;
    }
    .encabezado-columna {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .icono-info-tabla {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border: 1px solid #a9bdd4;
      border-radius: 999px;
      background: #fff;
      color: #1d4f91;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }
    .icono-info-tabla:hover {
      background: #f4f8ff;
      border-color: #7ea0c7;
    }
    .actividad-nombre {
      font-weight: 700;
      color: #123a63;
      overflow-wrap: anywhere;
    }
    .estado-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
    }
    .estado-badge.pendiente { background: #d39e00; }
    .estado-badge.confirmada { background: #198754; }
    .estado-badge.rechazada { background: #dc3545; }
    .estado-badge.suspendida { background: #b7791f; }
    .estado-badge.borrador { background: #5f6d7a; }
    .estado-badge.cancelada { background: #6c757d; }
    .estado-trigger {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .estado-trigger:hover .estado-badge,
    .estado-trigger:focus-visible .estado-badge {
      box-shadow: 0 0 0 2px rgba(11,94,215,0.16);
      transform: translateY(-1px);
    }
    .fila-seleccionada { background: #f2f7ff; }
    .muted { color: #6b7280; }
    .mensaje {
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
      font-size: 13px;
    }
    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }
    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }
    .icono-observacion {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
    }
    .icono-observacion svg {
      width: 16px;
      height: 16px;
      display: block;
    }
    .icono-observacion:hover { transform: scale(1.08); }
    td.sel-col input[type="radio"] {
      margin: 0;
      transform: scale(0.9);
    }
    .plazas-linea {
      display: block;
      white-space: nowrap;
    }
    .tiempo-restante {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e7f0ff;
      color: #1d4f91;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .tiempo-restante.finalizada {
      background: #f3e8e8;
      color: #9b1c1c;
    }
    .modal-fondo {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }
    .modal-fondo.activo { display: flex; }
    .modal {
      background: #fff;
      width: 100%;
      max-width: 720px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 22px;
    }
    .modal-encabezado {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .modal h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }
    .modal-subtitulo {
      margin-top: 3px;
      font-size: 15px;
      color: #4a5a6a;
      line-height: 1.3;
    }
    .modal-estado-superior {
      flex: 0 0 auto;
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
    }
    .modal-cerrar-superior {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid #cfd9e4;
      background: #fff;
      color: #5b6b7c;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      margin: 2px 0 0 auto;
      flex: 0 0 auto;
    }
    .modal-cerrar-superior:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }
    .modal-contenido {
      white-space: normal;
      word-break: break-word;
    }
    .estado-modal-badge {
      font-size: 13px;
      padding: 6px 14px;
      line-height: 1;
      min-width: 112px;
      text-align: center;
    }
    .estado-modal-bloque {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .estado-modal-linea {
      margin: 0;
      color: #21374d;
      line-height: 1.45;
      text-align: left;
    }
    .estado-modal-observaciones {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #fff8e6;
      border: 1px solid #f1d58b;
    }
    .estado-modal-observaciones strong {
      display: block;
      margin-bottom: 3px;
      color: #8a5b00;
      line-height: 1.25;
    }
    .estado-modal-observaciones-texto {
      color: #5a4630;
      line-height: 1.45;
      text-align: left;
    }
    .confirmacion-envio-contenido .estado-modal-bloque {
      padding: 10px 12px;
    }
    .confirmacion-envio-contenido .estado-modal-linea + .estado-modal-linea {
      margin-top: 4px;
    }
    .confirmacion-envio-contenido .estado-modal-linea {
      line-height: 1.35;
    }
    .mensaje-modal-panel {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d5e1ef;
      font-size: 14px;
      line-height: 1.35;
    }
    .mensaje-modal-panel.ok {
      background: #edf7ee;
      border-color: #b7dec0;
      color: #1f5d32;
    }
    .mensaje-modal-panel.error {
      background: #fff0f0;
      border-color: #efc2c2;
      color: #9b1c1c;
    }
    .btn-modal-icono {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-modal-icono svg {
      width: 16px;
      height: 16px;
    }
    .modal-acciones {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .btn-modal {
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #1e2a36;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-modal:hover { background: #f7f9fb; }
    .btn-modal.btn-modal-principal {
      background: #0b5ed7;
      border-color: #0b5ed7;
      color: #fff;
    }
    .btn-modal.btn-modal-principal:hover { background: #0a53be; }
    @media (max-width: 1200px) {
      .filtros { grid-template-columns: 1fr 1fr; }
      .bloque-marca { gap: 28px; }
    }
    @media (max-width: 980px) {
      .contenedor { max-width: 100%; }
      .barra-navegacion, .barra-navegacion-der { align-items: stretch; margin-left: 0; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr {
        margin-bottom: 16px;
        border: 1px solid #dde4ea;
        border-radius: 8px;
        overflow: hidden;
      }
      td {
        border-bottom: 1px solid #eef2f6;
        white-space: normal !important;
        text-align: left !important;
      }
      table { min-width: 100%; }
    }
    @media (max-width: 700px) {
      .modal-encabezado {
        flex-direction: column;
        align-items: flex-start;
      }
      .modal-estado-superior {
        align-items: flex-start;
        text-align: left;
      }
      .bloque-marca {
        flex-direction: column;
        text-align: center;
        gap: 10px;
      }
      .barra-navegacion {
        justify-content: center;
        padding-top: 16px;
        padding-bottom: 12px;
      }
      .barra-navegacion-izq {
        position: static;
        transform: none;
        width: 100%;
        order: -1;
        pointer-events: auto;
      }
      .barra-navegacion-der {
        width: 100%;
        justify-content: center;
      }
      .panel-titulo { font-size: 18px; }
      .titulos-cabecera h2 { text-align: center; }
      .logo-cabecera { width: 62px; }
      .resumen-linea {
        grid-template-columns: 1fr;
      }
      .acciones-superiores {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="cabecera-global">
    <div class="cabecera-global-inner">
      <div class="bloque-marca">
        <img src="logo.png" alt="Logo Armada" class="logo-cabecera logo-pendiente" id="logoCabeceraUsuarioPanel">
        <div class="titulos-cabecera">
          <h1>Actividades Publicas Institucionales</h1>
          <h2 id="subtituloCabecera">Usuario</h2>
        </div>
      </div>
    </div>
  </div>

  <div class="contenedor">
    <div class="barra-navegacion">
      <div class="barra-navegacion-izq">
        <span class="panel-titulo" id="subactividadActual">Panel de reservas</span>
      </div>
      <div class="barra-navegacion-der">
        <button type="button" class="btn-icono" id="btnCalendario" title="Calendario" aria-label="Calendario">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </button>
        <button type="button" class="btn-icono" id="btnPortal" title="Portal" aria-label="Portal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 10.5L12 3l9 7.5"></path>
            <path d="M5 9.5V21h14V9.5"></path>
            <path d="M9 21v-6h6v6"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="bloque">
      <h3>Filtros</h3>
      <div class="filtros">
        <div>
          <label for="filtroActividad">Actividad</label>
          <select id="filtroActividad">
            <option value="">Todas</option>
          </select>
        </div>
        <div>
          <label for="filtroEstado">Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="BORRADOR">Borrador</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="CONFIRMADA">Confirmada</option>
            <option value="SUSPENDIDA">Suspendida</option>
            <option value="RECHAZADA">Rechazada</option>
          </select>
        </div>
        <div>
          <label for="filtroFecha">Fecha</label>
          <input type="date" id="filtroFecha">
        </div>
        <div>
          <label for="filtroBuscar">Buscar</label>
          <input type="text" id="filtroBuscar" placeholder="Codigo, actividad u horario">
        </div>
        <div class="filtro-acciones-rapidas">
          <button type="button" class="btn-filtros-reset" id="btnLimpiarFiltros" title="Quitar filtros" aria-label="Quitar filtros">
            <img src="assets/remove_filter_icon_216117.svg" alt="" aria-hidden="true">
          </button>
        </div>
      </div>
    </div>

    <div class="bloque">
      <div class="resumen-linea">
        <div class="resumen" id="resumenPanel"></div>
        <div class="acciones-superiores">
          <button type="button" class="btn-icono" id="btnEnviarSolicitud" title="Enviar solicitud" aria-label="Enviar solicitud" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 2 11 13"></path>
              <path d="M22 2 15 22 11 13 2 9 22 2z"></path>
            </svg>
          </button>
          <button type="button" class="btn-icono" id="btnEditar" title="Editar reserva" aria-label="Editar reserva" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
            </svg>
          </button>
          <button type="button" class="btn-icono" id="btnAsistentes" title="Gestionar asistentes" aria-label="Gestionar asistentes" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </button>
          <button type="button" class="btn-icono" id="btnAnularSolicitud" title="Anular solicitud" aria-label="Anular solicitud" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th class="sel-col"></th>
              <th class="obs-col"></th>
              <th class="actividad-col">Actividad</th>
              <th class="tiempo-col">
                <span class="encabezado-columna">
                  <span>Tiempo restante</span>
                  <button type="button" class="icono-info-tabla" id="btnInfoTiempoRestante" aria-label="Informacion sobre tiempo restante" title="Informacion sobre tiempo restante">i</button>
                </span>
              </th>
              <th class="estado-col">
                <span class="encabezado-estado">
                  <img src="assets/icono-estado-clicable.svg" alt="" aria-hidden="true" class="encabezado-estado-icono">
                  <span>Estado</span>
                </span>
              </th>
              <th class="fecha-col">Fecha</th>
              <th class="horario-col">Horario</th>
              <th class="plazas-col">Plazas</th>
            </tr>
          </thead>
          <tbody id="tbodyReservas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modalObservaciones" class="modal-fondo" aria-hidden="true">
    <div class="modal">
      <div class="modal-encabezado">
        <div>
          <h3 id="modalObservacionesTitulo">Observaciones</h3>
          <div id="modalObservacionesSubtitulo" class="modal-subtitulo"></div>
        </div>
        <div id="modalEstadoSuperior" class="modal-estado-superior" hidden></div>
        <button type="button" class="modal-cerrar-superior" id="btnCerrarModalObservacionesSuperior" aria-label="Cerrar">X</button>
      </div>
      <div id="modalObservacionesContenido" class="modal-contenido"></div>
      <div id="modalObservacionesAcciones" class="modal-acciones">
        <button type="button" class="btn-modal" id="btnCerrarModalObservaciones">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    let reservasActuales = [];
    let reservaSeleccionada = null;
    let nombreUsuarioPanel = "Usuario";
    let temporizadorRecargaPanel = null;

    function normalizarEstadoReserva(estado) {
      const valor = String(estado || "").trim().toUpperCase();
      if (valor === "CONDICIONADA_DOCUMENTACION") return "SUSPENDIDA";
      return valor;
    }

    function claseEstado(estado) {
      const e = normalizarEstadoReserva(estado).toLowerCase();
      if (e === "borrador") return "borrador";
      if (e === "pendiente") return "pendiente";
      if (e === "confirmada") return "confirmada";
      if (e === "suspendida") return "suspendida";
      if (e === "rechazada") return "rechazada";
      if (e === "cancelada") return "cancelada";
      return "";
    }

    function textoEstadoVisible(estado) {
      const e = normalizarEstadoReserva(estado);
      if (e === "BORRADOR") return "Borrador";
      if (e === "PENDIENTE") return "Pendiente";
      if (e === "CONFIRMADA") return "Confirmada";
      if (e === "SUSPENDIDA") return "Suspendida";
      if (e === "RECHAZADA") return "Rechazada";
      if (e === "CANCELADA") return "Cancelada";
      return e || "-";
    }

    function mostrarMensaje(tipo, texto) {
      const m = document.getElementById("mensaje");
      m.className = "mensaje " + tipo;
      m.style.display = "block";
      m.textContent = texto;
    }

    function limpiarMensaje() {
      const m = document.getElementById("mensaje");
      m.className = "mensaje";
      m.style.display = "none";
      m.textContent = "";
    }

    function aplicarLogoCabeceraUsuario() {
      const logo = document.getElementById("logoCabeceraUsuarioPanel");
      if (!logo) return;
      logo.src = "logo.png";
      logo.classList.remove("logo-pendiente");
    }

    function actualizarTituloPanel() {
      document.getElementById("subactividadActual").textContent = `Panel de reservas de ${String(nombreUsuarioPanel || "Usuario").toUpperCase()}`;
    }

    async function cargarSesionCabecera() {
      try {
        const res = await fetch("/api/usuario/session", { credentials: "same-origin" });
        const data = await res.json().catch(() => null);
        aplicarLogoCabeceraUsuario();
        if (!res.ok || !data?.ok || !data?.authenticated || !data?.user) return;
        const nombre = data.user.centro || data.user.nombre || data.user.email || "Usuario";
        nombreUsuarioPanel = String(nombre || "Usuario").trim() || "Usuario";
        document.getElementById("subtituloCabecera").textContent = `Usuario: ${nombreUsuarioPanel}`;
        actualizarTituloPanel();
      } catch (_) {
        aplicarLogoCabeceraUsuario();
      }
    }

    function formatearFechaCorta(fechaIso) {
      const texto = String(fechaIso || "").trim();
      if (!texto) return "-";
      const partes = texto.split("-");
      if (partes.length !== 3) return texto;
      return `${partes[2].slice(-2)}/${partes[1].slice(-2)}/${partes[0].slice(-2)}`;
    }

    function parsearFechaServidor(fechaTexto) {
      const texto = String(fechaTexto || "").trim();
      if (!texto) return null;
      const normalizada = texto.includes("T") ? texto : texto.replace(" ", "T");
      const fecha = new Date(`${normalizada}Z`);
      if (Number.isNaN(fecha.getTime())) return null;
      return fecha;
    }

    function formatearTiempoRestante(reserva) {
      const estado = normalizarEstadoReserva(reserva?.estado);
      if (["BORRADOR", "RECHAZADA", "CANCELADA"].includes(estado)) {
        return { texto: "", finalizada: false };
      }
      const expiraEn = parsearFechaServidor(reserva?.prereserva_expira_en);

      if (!expiraEn) {
        return { texto: "", finalizada: false };
      }

      const diferenciaMs = expiraEn.getTime() - Date.now();
      if (diferenciaMs <= 0 || !reserva?.prereserva_vigente) {
        return { texto: "Agotado", finalizada: true };
      }

      const totalMinutos = Math.max(1, Math.ceil(diferenciaMs / 60000));
      const horas = Math.floor(totalMinutos / 60);
      const minutos = totalMinutos % 60;

      if (horas > 0) {
        return {
          texto: `${horas} h ${String(minutos).padStart(2, "0")} min`,
          finalizada: false
        };
      }

      return {
        texto: `${totalMinutos} min`,
        finalizada: false
      };
    }

    function pintarResumen(lista) {
      const borradores = lista.filter((r) => normalizarEstadoReserva(r.estado) === "BORRADOR").length;
      const pendientes = lista.filter((r) => normalizarEstadoReserva(r.estado) === "PENDIENTE").length;
      const confirmadas = lista.filter((r) => normalizarEstadoReserva(r.estado) === "CONFIRMADA").length;
      const suspendidas = lista.filter((r) => normalizarEstadoReserva(r.estado) === "SUSPENDIDA").length;
      const rechazadas = lista.filter((r) => normalizarEstadoReserva(r.estado) === "RECHAZADA").length;

      document.getElementById("resumenPanel").innerHTML = `
        <span>Total reservas: ${lista.length}</span>
        <span>|</span>
        <span>Borradores: ${borradores}</span>
        <span>|</span>
        <span>Pendientes: ${pendientes}</span>
        <span>|</span>
        <span>Confirmadas: ${confirmadas}</span>
        <span>|</span>
        <span>Suspendidas: ${suspendidas}</span>
        <span>|</span>
        <span>Rechazadas: ${rechazadas}</span>
      `;
    }

    function poblarActividadesFiltro(lista) {
      const select = document.getElementById("filtroActividad");
      const actual = select.value || "";
      const actividades = Array.from(
        new Set(
          (lista || [])
            .map((r) => String(r.actividad || "").trim())
            .filter(Boolean)
        )
      ).sort((a, b) => a.localeCompare(b, "es"));

      select.innerHTML = `<option value="">Todas</option>`;
      actividades.forEach((actividad) => {
        const opt = document.createElement("option");
        opt.value = actividad;
        opt.textContent = actividad;
        if (actividad === actual) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function filtrarReservas(lista) {
      const actividad = document.getElementById("filtroActividad").value.trim();
      const estado = document.getElementById("filtroEstado").value.trim().toUpperCase();
      const fecha = document.getElementById("filtroFecha").value.trim();
      const buscar = document.getElementById("filtroBuscar").value.trim().toLowerCase();

      return lista.filter((r) => {
        if (actividad && String(r.actividad || "").trim() !== actividad) return false;
        if (estado && normalizarEstadoReserva(r.estado) !== estado) return false;
        if (fecha && String(r.fecha || "") !== fecha) return false;
        if (buscar) {
          const texto = `${r.actividad || ""} ${r.fecha || ""} ${r.hora_inicio || ""} ${r.hora_fin || ""}`.toLowerCase();
          if (!texto.includes(buscar)) return false;
        }
        return true;
      });
    }

    function actualizarBotones() {
      const hay = !!reservaSeleccionada;
      const estado = normalizarEstadoReserva(reservaSeleccionada?.estado);
      document.getElementById("btnEnviarSolicitud").disabled = !hay || !["BORRADOR", "RECHAZADA"].includes(estado);
      document.getElementById("btnEditar").disabled = !hay || !["BORRADOR", "RECHAZADA"].includes(estado);
      document.getElementById("btnAsistentes").disabled = !hay || estado === "CANCELADA" || estado === "RECHAZADA";
      document.getElementById("btnAnularSolicitud").disabled = !hay;
    }

    function seleccionarReserva(id) {
      reservaSeleccionada = reservasActuales.find((r) => Number(r.id) === Number(id)) || null;
      const filtradas = filtrarReservas(reservasActuales);
      pintarReservas(filtradas);
      actualizarBotones();
    }

    function abrirModalObservaciones(id) {
      const reserva = reservasActuales.find((r) => Number(r.id) === Number(id));
      if (!reserva || !reserva.observaciones || !String(reserva.observaciones).trim()) return;
      document.getElementById("modalObservacionesTitulo").textContent = "Observaciones";
      document.getElementById("modalObservacionesSubtitulo").textContent = reserva.actividad || "Reserva";
      const estadoSuperior = document.getElementById("modalEstadoSuperior");
      estadoSuperior.hidden = true;
      estadoSuperior.innerHTML = "";
      document.getElementById("modalObservacionesContenido").className = "modal-contenido";
      document.getElementById("modalObservacionesContenido").innerHTML = `
        <div class="estado-modal-observaciones">
          <div class="estado-modal-observaciones-texto">${escapeHtml(reserva.observaciones)}</div>
        </div>
      `;
      document.getElementById("modalObservacionesAcciones").innerHTML = "";
      document.getElementById("modalObservaciones").classList.add("activo");
      document.getElementById("modalObservaciones").setAttribute("aria-hidden", "false");
    }

    function cerrarModalObservaciones() {
      document.getElementById("modalObservaciones").classList.remove("activo");
      document.getElementById("modalObservaciones").setAttribute("aria-hidden", "true");
    }

    function abrirModalConfirmacionEnvio(reserva, onConfirmar) {
      document.getElementById("modalObservacionesTitulo").textContent = "Confirmación de envío";
      document.getElementById("modalObservacionesSubtitulo").textContent = reserva.actividad || "Solicitud";
      const estadoSuperior = document.getElementById("modalEstadoSuperior");
      estadoSuperior.hidden = true;
      estadoSuperior.innerHTML = "";
      document.getElementById("modalObservacionesContenido").className = "modal-contenido confirmacion-envio-contenido";
      document.getElementById("modalObservacionesContenido").innerHTML = `
        <div class="estado-modal-bloque">
          <p class="estado-modal-linea">Va a enviar una solicitud para <strong>${escapeHtml(reserva.actividad || "esta actividad")}</strong> con <strong>${Number(reserva.plazas_prereservadas || 0)}</strong> plazas reservadas.</p>
          <p class="estado-modal-linea">El tiempo de consolidación calculado para esta solicitud será de <strong>${Number(reserva.minutos_restantes_prereserva || 0)} minutos</strong> y comenzará a contar a partir del momento en que confirme el envío.</p>
          <p class="estado-modal-linea">Transcurrido ese plazo, las plazas reservadas no asignadas volverán a quedar disponibles.</p>
          <p class="estado-modal-linea">Además, se permitirá ampliar la lista de asistentes mientras sigan existiendo plazas disponibles reales en la franja horaria.</p>
        </div>
        <div id="mensajeConfirmacionEnvio" class="mensaje-modal-panel" hidden></div>
      `;
      document.getElementById("modalObservacionesAcciones").innerHTML = `
        <button type="button" class="btn-modal btn-modal-principal btn-modal-icono" id="btnConfirmarEnvioSolicitud">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 2 11 13"></path>
            <path d="M22 2 15 22 11 13 2 9 22 2z"></path>
          </svg>
          <span>Enviar solicitud</span>
        </button>
      `;
      document.getElementById("btnConfirmarEnvioSolicitud").addEventListener("click", async () => {
        await onConfirmar();
      });
      document.getElementById("modalObservaciones").classList.add("activo");
      document.getElementById("modalObservaciones").setAttribute("aria-hidden", "false");
    }

    function mostrarMensajeConfirmacionEnvio(tipo, texto) {
      const el = document.getElementById("mensajeConfirmacionEnvio");
      if (!el) return;
      el.hidden = false;
      el.className = `mensaje-modal-panel ${tipo}`;
      el.textContent = texto;
    }

    function abrirModalTiempoRestante() {
      document.getElementById("modalObservacionesTitulo").textContent = "Tiempo restante";
      document.getElementById("modalObservacionesSubtitulo").textContent = "Informacion sobre la asignacion de plazas";
      const estadoSuperior = document.getElementById("modalEstadoSuperior");
      estadoSuperior.hidden = true;
      estadoSuperior.innerHTML = "";
      document.getElementById("modalObservacionesContenido").innerHTML = `
        <div class="estado-modal-bloque">
          <p class="estado-modal-linea">Este tiempo restante indica el plazo disponible para realizar las asignaciones nominales de las plazas reservadas.</p>
        </div>
        <div class="estado-modal-observaciones">
          <strong>Importante</strong>
          <div class="estado-modal-observaciones-texto">Una vez finalizado este tiempo, solo podrás seguir asignando plazas mientras queden disponibles en la franja horaria seleccionada para la actividad, sin necesidad de crear una nueva reserva complementaria. A partir de ese momento, ya no existirá garantía de reserva previa sobre las plazas añadidas tras haber finalizado el tiempo disponible para la asignación.</div>
        </div>
      `;
      document.getElementById("modalObservacionesAcciones").innerHTML = `
        <button type="button" class="btn-modal" id="btnCerrarModalObservaciones">Cerrar</button>
      `;
      document.getElementById("btnCerrarModalObservaciones").addEventListener("click", cerrarModalObservaciones);
      document.getElementById("modalObservaciones").classList.add("activo");
      document.getElementById("modalObservaciones").setAttribute("aria-hidden", "false");
    }

    function escapeHtml(texto) {
      return String(texto || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
    function descripcionEstadoReserva(reserva) {
      const estado = normalizarEstadoReserva(reserva?.estado);
      const observacionesAdmin = String(reserva?.observaciones_admin || "").trim();
      if (estado === "BORRADOR") {
        return "Esta solicitud está guardada como borrador. Todavía no ha sido enviada, no bloquea plazas ni ha iniciado el tiempo de prereserva. Puedes editarla, guardarla de nuevo o enviarla cuando la tengas lista.";
      }
      if (estado === "CONFIRMADA") {
        if (observacionesAdmin) {
          return `Tu solicitud ha sido readmitida y aceptada nuevamente por el administrador. Motivo indicado: ${observacionesAdmin}`;
        }
        return "La solicitud ha sido aceptada y ya no requiere ninguna corrección por tu parte.";
      }
      if (estado === "PENDIENTE") {
        return "Su solicitud está en proceso de revisión. Si lo desea, puede actualizar/revisar la documentación obligatoria para la realización de la actividad o acceder al panel de asistentes.";
      }
      if (estado === "SUSPENDIDA") {
        return "La solicitud está suspendida porque la documentación obligatoria asociada a esta actividad ha quedado desactualizada y debes regularizarla para que pueda volver a quedar en proceso.";
      }
      if (estado === "RECHAZADA") {
        if (observacionesAdmin) {
          return `Tu solicitud ha sido rechazada por el administrador. Motivo indicado: ${observacionesAdmin}`;
        }
        return "La solicitud ha sido rechazada. Revisa el motivo indicado y corrige la información necesaria para volver a dejarla en proceso.";
      }
      if (estado === "CANCELADA") {
        return "La solicitud está anulada y ya no admite cambios.";
      }
      return "Consulta el estado actual de tu solicitud y corrige la informaciÃ³n necesaria si procede.";
    }

    function construirAccionesEstado(reserva) {
      const acciones = [];
      const estado = normalizarEstadoReserva(reserva?.estado);
      if (estado === "BORRADOR") {
        if (reserva?.token_edicion) {
          acciones.push({
            label: "Editar borrador",
            principal: true,
            onClick: () => editarReserva(reserva.token_edicion, estado)
          });
        }
        return acciones;
      }
      if (estado === "SUSPENDIDA") {
        if (Number(reserva?.admin_id || 0) > 0) {
          acciones.push({
            label: "Ir a documentación",
            principal: true,
            onClick: () => {
              location.href = `usuario-perfil.html?admin_id=${encodeURIComponent(reserva.admin_id)}&tab=documentos`;
            }
          });
        }
        return acciones;
      }

      if (estado === "RECHAZADA") {
        if (reserva?.token_edicion) {
          acciones.push({
            label: "Editar solicitud",
            principal: true,
            onClick: () => editarReserva(reserva.token_edicion, estado)
          });
        }
        return acciones;
      }

      if (reserva?.token_edicion && estado !== "CANCELADA" && estado !== "CONFIRMADA") {
        acciones.push({
          label: "Gestionar asistentes",
          onClick: () => abrirAsistentes(reserva.token_edicion)
        });
      }
      if (Number(reserva?.admin_id || 0) > 0 && estado !== "CONFIRMADA" && estado !== "CANCELADA") {
        acciones.push({
          label: "Ir a documentación",
          onClick: () => {
            location.href = `usuario-perfil.html?admin_id=${encodeURIComponent(reserva.admin_id)}&tab=documentos`;
          }
        });
      }
      return acciones;
    }

    function abrirModalEstado(id) {
      const reserva = reservasActuales.find((r) => Number(r.id) === Number(id));
      if (!reserva) return;

      const estadoTexto = textoEstadoVisible(reserva.estado);
      const estadoClase = claseEstado(reserva.estado);
      const descripcion = descripcionEstadoReserva(reserva);
      const observaciones = String(reserva.observaciones_admin || "").trim();
      const acciones = construirAccionesEstado(reserva);

      document.getElementById("modalObservacionesTitulo").textContent = "Estado de la solicitud";
      document.getElementById("modalObservacionesSubtitulo").textContent = reserva.actividad || "Reserva";
      const estadoSuperior = document.getElementById("modalEstadoSuperior");
      estadoSuperior.hidden = false;
      estadoSuperior.innerHTML = `<span class="estado-badge estado-modal-badge ${estadoClase}">${escapeHtml(estadoTexto)}</span>`;
      document.getElementById("modalObservacionesContenido").innerHTML = `
        <div class="estado-modal-bloque">
          <p class="estado-modal-linea">${escapeHtml(descripcion)}</p>
        </div>
        ${
          observaciones
            ? `<div class="estado-modal-observaciones">
                <strong>Observaciones del administrador</strong>
                <div class="estado-modal-observaciones-texto">${escapeHtml(observaciones)}</div>
              </div>`
            : ""
        }
      `;

      const accionesHtml = acciones.map((accion, indice) => `
        <button type="button" class="btn-modal${accion.principal ? " btn-modal-principal" : ""}" data-accion-estado="${indice}">${escapeHtml(accion.label)}</button>
      `).join("");

      document.getElementById("modalObservacionesAcciones").innerHTML = accionesHtml;

      acciones.forEach((accion, indice) => {
        const boton = document.querySelector(`[data-accion-estado="${indice}"]`);
        if (boton) {
          boton.addEventListener("click", () => {
            cerrarModalObservaciones();
            accion.onClick();
          });
        }
      });
      document.getElementById("modalObservaciones").classList.add("activo");
      document.getElementById("modalObservaciones").setAttribute("aria-hidden", "false");
    }

    function pintarReservas(lista) {
      const tbody = document.getElementById("tbodyReservas");

      if (reservaSeleccionada) {
        const sigue = lista.find((r) => Number(r.id) === Number(reservaSeleccionada.id));
        reservaSeleccionada = sigue || null;
      }

      if (!lista.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="muted">No hay reservas que coincidan con los filtros.</td></tr>`;
        actualizarBotones();
        return;
      }

      tbody.innerHTML = lista.map((r) => {
        const tieneObservaciones = !!(r.observaciones && String(r.observaciones).trim());
        const tiempoRestante = formatearTiempoRestante(r);
        return `
          <tr class="${reservaSeleccionada && Number(reservaSeleccionada.id) === Number(r.id) ? "fila-seleccionada" : ""}">
            <td class="sel-col">
              <input type="radio" name="seleccionReserva" ${reservaSeleccionada && Number(reservaSeleccionada.id) === Number(r.id) ? "checked" : ""} onchange="seleccionarReserva(${r.id})">
            </td>
            <td class="obs-col">
              ${tieneObservaciones ? `
                <button type="button" class="icono-observacion" title="Esta reserva tiene observaciones" onclick="abrirModalObservaciones(${r.id})">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3L22 20H2L12 3Z" fill="#FFC107" stroke="#CC9A06" stroke-width="1" stroke-linejoin="round"></path>
                    <rect x="11" y="9" width="2" height="6" fill="#222"></rect>
                    <rect x="11" y="16.5" width="2" height="2" fill="#222"></rect>
                  </svg>
                </button>
              ` : ``}
            </td>
            <td class="actividad-col"><div class="actividad-nombre">${r.actividad || ""}</div></td>
            <td class="tiempo-col">
              ${tiempoRestante.texto
                ? `<span class="tiempo-restante${tiempoRestante.finalizada ? " finalizada" : ""}">${escapeHtml(tiempoRestante.texto)}</span>`
                : ""}
            </td>
            <td class="estado-col">
              <button type="button" class="estado-trigger" onclick="abrirModalEstado(${r.id})" title="Ver estado y acciones disponibles">
                <span class="estado-badge ${claseEstado(r.estado)}">${textoEstadoVisible(r.estado)}</span>
              </button>
            </td>
            <td class="fecha-col">${formatearFechaCorta(r.fecha)}</td>
            <td class="horario-col">${r.hora_inicio || "-"} - ${r.hora_fin || "-"}</td>
            <td class="plazas-col">
              <span class="plazas-linea">Reservadas: ${Number(r.plazas_reservadas_historicas || 0)}</span>
              <span class="plazas-linea">Pendientes: ${Number(r.plazas_pendientes || 0)}</span>
              <span class="plazas-linea">Asignadas: ${Number(r.plazas_asignadas || 0)}</span>
            </td>
          </tr>
        `;
      }).join("");

      actualizarBotones();
    }

    async function cargarPanel({ silencioso = false } = {}) {
      if (!silencioso) limpiarMensaje();
      try {
        const res = await fetch("/api/usuario/reservas", {
          credentials: "include"
        });

        if (res.status === 401) {
          location.href = "portal.html";
          return;
        }

        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.ok) {
          throw new Error(data?.error || "No se pudieron cargar las reservas.");
        }

        reservasActuales = Array.isArray(data.data) ? data.data : [];
        poblarActividadesFiltro(reservasActuales);
        const filtradas = filtrarReservas(reservasActuales);
        pintarResumen(filtradas);
        pintarReservas(filtradas);
      } catch (error) {
        if (!silencioso) {
          mostrarMensaje("error", error.message || "No se pudieron cargar las reservas.");
        }
      }
    }

    function iniciarRecargaAutomaticaPanel() {
      if (temporizadorRecargaPanel) {
        clearInterval(temporizadorRecargaPanel);
      }
      temporizadorRecargaPanel = window.setInterval(() => {
        cargarPanel({ silencioso: true });
      }, 60000);
    }

    function aplicarFiltros() {
      reservaSeleccionada = null;
      const filtradas = filtrarReservas(reservasActuales);
      pintarResumen(filtradas);
      pintarReservas(filtradas);
    }

    function limpiarFiltros() {
      document.getElementById("filtroActividad").value = "";
      document.getElementById("filtroEstado").value = "";
      document.getElementById("filtroFecha").value = "";
      document.getElementById("filtroBuscar").value = "";
      aplicarFiltros();
    }

    function editarReserva(token, estado = "") {
      if (normalizarEstadoReserva(estado) === "BORRADOR") {
        location.href = `solicitud-reserva.html?token=${encodeURIComponent(token)}`;
        return;
      }
      location.href = `editar.html?token=${encodeURIComponent(token)}`;
    }

    function abrirAsistentes(token) {
      location.href = `asistentes.html?token=${encodeURIComponent(token)}`;
    }

    async function enviarSolicitudSeleccionada() {
      if (!reservaSeleccionada) return;
      const estado = normalizarEstadoReserva(reservaSeleccionada.estado);
      if (!["BORRADOR", "RECHAZADA"].includes(estado)) return;
      if (!reservaSeleccionada.token_edicion) {
        mostrarMensaje("error", "El borrador seleccionado no incluye un token de edición válido.");
        return;
      }
      if (estado === "RECHAZADA") {
        editarReserva(reservaSeleccionada.token_edicion, estado);
        return;
      }

      limpiarMensaje();
      const btnEnviar = document.getElementById("btnEnviarSolicitud");

      try {
        if (btnEnviar) btnEnviar.disabled = true;

        const detalleResponse = await fetch(`/api/reserva?token=${encodeURIComponent(reservaSeleccionada.token_edicion)}`, {
          credentials: "include"
        });
        const detalleData = await detalleResponse.json().catch(() => null);
        if (!detalleResponse.ok || !detalleData?.ok || !detalleData?.reserva) {
          throw new Error(detalleData?.error || "No se pudo recuperar el borrador seleccionado.");
        }

        const reserva = detalleData.reserva;
        abrirModalConfirmacionEnvio(reserva, async () => {
          const btnConfirmar = document.getElementById("btnConfirmarEnvioSolicitud");
          if (btnConfirmar) btnConfirmar.disabled = true;
          try {
            const payload = {
              token_edicion: reservaSeleccionada.token_edicion,
              accion: "enviar_borrador",
              centro: reserva.centro || "",
              contacto: reserva.contacto || "",
              telefono: reserva.telefono || "",
              email: reserva.email || "",
              observaciones: reserva.observaciones || "",
              franja: reserva.franja_id == null ? "" : reserva.franja_id,
              plazas_reservadas: Number(reserva.plazas_prereservadas || 0)
            };

            const response = await fetch("/api/reserva-actualizar", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify(payload)
            });
            const data = await response.json().catch(() => null);
            if (!response.ok || !data?.ok) {
              throw new Error(data?.error || data?.detalle || "No se pudo enviar la solicitud.");
            }

            mostrarMensajeConfirmacionEnvio("ok", data.mensaje || "Solicitud enviada correctamente.");
            document.getElementById("modalObservacionesAcciones").innerHTML = "";
            reservaSeleccionada = null;
            await cargarPanel();
          } catch (error) {
            mostrarMensajeConfirmacionEnvio("error", error.message || "No se pudo enviar la solicitud.");
            if (btnConfirmar) btnConfirmar.disabled = false;
          } finally {
            actualizarBotones();
          }
        });
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo enviar la solicitud.");
      } finally {
        if (btnEnviar) btnEnviar.disabled = false;
        actualizarBotones();
      }
    }
async function anularSolicitudSeleccionada() {
      if (!reservaSeleccionada) return;
      const nombreActividad = reservaSeleccionada.actividad || "esta actividad";
      if (!window.confirm(`Â¿Deseas anular tu solicitud para ${nombreActividad}?`)) return;

      limpiarMensaje();
      try {
        const res = await fetch("/api/reserva-cancelar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            token_edicion: reservaSeleccionada.token_edicion || "",
            reserva_id: Number(reservaSeleccionada.id || 0)
          })
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.ok) {
          throw new Error(data?.error || "No se pudo anular la solicitud.");
        }
        mostrarMensaje("ok", data.mensaje || "Solicitud anulada correctamente.");
        reservaSeleccionada = null;
        await cargarPanel();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo anular la solicitud.");
      }
    }

    async function salir() {
      await fetch("/api/usuario/logout", {
        method: "POST",
        credentials: "include"
      });
      location.href = "portal.html";
    }

    function irPortal() {
      location.href = "portal.html";
    }

    function irCalendario() {
      location.href = "admin-calendario.html";
    }

    document.getElementById("filtroActividad").addEventListener("change", aplicarFiltros);
    document.getElementById("filtroEstado").addEventListener("change", aplicarFiltros);
    document.getElementById("filtroFecha").addEventListener("change", aplicarFiltros);
    document.getElementById("filtroBuscar").addEventListener("input", aplicarFiltros);
    document.getElementById("btnLimpiarFiltros").addEventListener("click", limpiarFiltros);
    document.getElementById("btnCalendario").addEventListener("click", irCalendario);
    document.getElementById("btnPortal").addEventListener("click", irPortal);
    document.getElementById("btnEditar").addEventListener("click", () => {
      if (reservaSeleccionada) editarReserva(reservaSeleccionada.token_edicion, reservaSeleccionada.estado);
    });
    document.getElementById("btnEnviarSolicitud").addEventListener("click", enviarSolicitudSeleccionada);
    document.getElementById("btnAsistentes").addEventListener("click", () => {
      if (reservaSeleccionada) abrirAsistentes(reservaSeleccionada.token_edicion);
    });
    document.getElementById("btnAnularSolicitud").addEventListener("click", anularSolicitudSeleccionada);
    document.getElementById("btnInfoTiempoRestante").addEventListener("click", abrirModalTiempoRestante);
    document.getElementById("btnCerrarModalObservacionesSuperior").addEventListener("click", cerrarModalObservaciones);
    document.getElementById("modalObservaciones").addEventListener("click", function (e) {
      if (e.target.id === "modalObservaciones") cerrarModalObservaciones();
    });

    window.seleccionarReserva = seleccionarReserva;
    window.abrirModalObservaciones = abrirModalObservaciones;
    window.abrirModalEstado = abrirModalEstado;

    (async function init() {
      await cargarSesionCabecera();
      actualizarTituloPanel();
      await cargarPanel();
      iniciarRecargaAutomaticaPanel();
    })();
  </script>
</body>
</html>
