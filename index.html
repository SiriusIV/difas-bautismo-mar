<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo...</title>
  <meta http-equiv="refresh" content="0; url=portal.html" />
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const tieneSolicitud = params.has("actividad_id") || params.has("franja_id");
      const destino = tieneSolicitud ? "solicitud-reserva.html" : "portal.html";
      const query = window.location.search || "";
      window.location.replace(`${destino}${query}`);
    })();
  </script>
</head>
<body></body>
</html>
