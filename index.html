<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitud de bautismo de mar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 720px;
      margin: 40px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    h2 {
      margin-top: 6px;
      font-size: 22px;
      font-weight: normal;
    }

    p {
      line-height: 1.5;
    }

    .campo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: #0b5ed7;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #094db1;
    }

    button:disabled {
      background: #7aa7e8;
      cursor: not-allowed;
    }

    .cabecera {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
      min-height: 120px;
    }

    .logo {
      position: absolute;
      left: 0;
      max-width: 120px;
      height: auto;
    }

    .titulos {
      text-align: center;
    }

    .mensaje {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .info-plazas {
      margin-top: 8px;
      font-size: 14px;
      color: #444;
    }

    .mensaje.aviso {
      display: block;
      background: #eef4ff;
      color: #1d4f91;
      border: 1px solid #c9dcff;
    }

    .mensaje.alerta {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }
    
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">
      <div class="titulos">
        <h1>DIFAS 2026 – Arsenal de Ferrol</h1>
        <h2>Solicitud de bautismo de mar</h2>
      </div>
    </div>

    <p>Complete este formulario para solicitar la actividad.</p>

    <form id="formularioSolicitud">
      <div class="campo">
        <label for="centro">Centro solicitante</label>
        <input type="text" id="centro" name="centro" required>
      </div>

      <div class="campo">
        <label for="contacto">Persona de contacto</label>
        <input type="text" id="contacto" name="contacto" required>
      </div>

      <div class="campo">
        <label for="telefono">Teléfono de contacto</label>
        <input type="tel" id="telefono" name="telefono" required>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico de contacto</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="campo">
        <label for="mayores10">Número de visitantes mayores de 10 años</label>
        <input type="number" id="mayores10" name="mayores10" min="0" value="0" required>
      </div>

      <div class="campo">
        <label for="menores10">Número de visitantes menores de 10 años</label>
        <input type="number" id="menores10" name="menores10" min="0" value="0" required>
      </div>

      <div class="campo">
        <label for="franja">Franja horaria solicitada</label>
        <select id="franja" name="franja" required>
          <option value="">Cargando franjas...</option>
        </select>
        <div id="infoPlazas" class="info-plazas"></div>
        <div id="avisoCapacidad" class="mensaje" style="margin-top:10px;"></div>
      </div>

      <div class="campo">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" name="observaciones"></textarea>
      </div>

      <input type="hidden" id="idempotencyKey" name="idempotencyKey" value="">

      <button type="submit" id="btnEnviar">Enviar solicitud</button>

      <div id="mensaje" class="mensaje"></div>
    </form>
  </div>

  <script>
  let franjasCache = [];
  let envioEnCurso = false;

  function nuevaIdempotencyKey() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    return "idem-" + Date.now() + "-" + Math.random().toString(36).slice(2);
  }

  function prepararNuevaClave() {
    const campo = document.getElementById("idempotencyKey");
    campo.value = nuevaIdempotencyKey();
  }

  function obtenerFranjaSeleccionada() {
    const franjaId = parseInt(document.getElementById("franja").value, 10);
    if (!franjaId) return null;
    return franjasCache.find(f => Number(f.id) === franjaId) || null;
  }

  function totalSolicitado() {
    const mayores10 = parseInt(document.getElementById("mayores10").value || "0", 10);
    const menores10 = parseInt(document.getElementById("menores10").value || "0", 10);
    return mayores10 + menores10;
  }

  function actualizarInfoPlazas() {
    const info = document.getElementById("infoPlazas");
    const franja = obtenerFranjaSeleccionada();

    if (!franja) {
      info.textContent = "";
      return;
    }

    info.textContent = `Plazas disponibles en esta franja: ${franja.disponibles}`;
  }

  function actualizarAvisoCapacidad() {
    const aviso = document.getElementById("avisoCapacidad");
    const boton = document.getElementById("btnEnviar");
    const franja = obtenerFranjaSeleccionada();
    const total = totalSolicitado();

    aviso.className = "mensaje";
    aviso.style.display = "none";
    aviso.textContent = "";

    // Si no hay franja elegida, no mostramos nada
    if (!franja) {
      if (!envioEnCurso) boton.disabled = false;
      return;
    }

    // Si no han escrito visitantes todavía, no mostramos alerta
    if (total <= 0) {
      if (!envioEnCurso) boton.disabled = false;
      return;
    }

    const disponibles = Number(franja.disponibles);

    if (total > disponibles) {
      aviso.className = "mensaje alerta";
      aviso.style.display = "block";
      aviso.textContent = `Está solicitando ${total} plazas, pero solo quedan ${disponibles} disponibles en esta franja.`;

      if (!envioEnCurso) boton.disabled = true;
      return;
    }

    aviso.className = "mensaje aviso";
    aviso.style.display = "block";
    aviso.textContent = `Está solicitando ${total} plazas y quedan ${disponibles} disponibles. La solicitud puede tramitarse.`;

    if (!envioEnCurso) boton.disabled = false;
  }

  async function cargarFranjas(franjaSeleccionadaId = "") {
    const select = document.getElementById("franja");
    const info = document.getElementById("infoPlazas");

    try {
      const response = await fetch("/api/franjas");

      if (!response.ok) {
        throw new Error("No se pudieron cargar las franjas");
      }

      const franjas = await response.json();
      franjasCache = franjas;

      select.innerHTML = '<option value="">Seleccione una opción</option>';

      if (franjas.length === 0) {
        select.innerHTML = '<option value="">No hay franjas disponibles</option>';
        info.textContent = "";
        actualizarAvisoCapacidad();
        return;
      }

      let sigueExistiendo = false;

      franjas.forEach(f => {
        const option = document.createElement("option");
        option.value = f.id;
        option.textContent = `${f.fecha} - ${f.hora_inicio} a ${f.hora_fin} (${f.disponibles} plazas disponibles)`;

        if (String(f.id) === String(franjaSeleccionadaId)) {
          option.selected = true;
          sigueExistiendo = true;
        }

        select.appendChild(option);
      });

      if (!sigueExistiendo) {
        select.value = "";
      }

      actualizarInfoPlazas();
      actualizarAvisoCapacidad();

    } catch (error) {
      select.innerHTML = '<option value="">Error al cargar franjas</option>';
      info.textContent = "";
      console.error(error);
    }
  }

  async function enviarFormulario(event) {
    event.preventDefault();

    if (envioEnCurso) return;

    const mensaje = document.getElementById("mensaje");
    const boton = document.getElementById("btnEnviar");
    const franjaActual = document.getElementById("franja").value;
    const idem = document.getElementById("idempotencyKey").value;

    const datos = {
      centro: document.getElementById("centro").value.trim(),
      contacto: document.getElementById("contacto").value.trim(),
      telefono: document.getElementById("telefono").value.trim(),
      email: document.getElementById("email").value.trim(),
      mayores10: parseInt(document.getElementById("mayores10").value || "0", 10),
      menores10: parseInt(document.getElementById("menores10").value || "0", 10),
      franja: document.getElementById("franja").value,
      observaciones: document.getElementById("observaciones").value.trim(),
      idempotencyKey: idem
    };

    mensaje.className = "mensaje";
    mensaje.style.display = "none";
    mensaje.textContent = "";

    try {
      envioEnCurso = true;
      boton.disabled = true;
      boton.textContent = "Enviando...";

      const response = await fetch("/api/reservar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(datos)
      });

      const resultado = await response.json();

      if (!response.ok || !resultado.ok) {
        mensaje.className = "mensaje error";
        mensaje.style.display = "block";
        mensaje.textContent = resultado.error || "No se pudo registrar la solicitud.";
        await cargarFranjas(franjaActual);
        return;
      }

      mensaje.className = "mensaje ok";
mensaje.style.display = "block";

if (resultado.duplicate) {
  const urlEditar = `${window.location.origin}/editar.html?token=${encodeURIComponent(resultado.token_edicion)}`;
  const urlAsistentes = `${window.location.origin}/asistentes.html?token=${encodeURIComponent(resultado.token_edicion)}`;

  mensaje.innerHTML = `
    <strong>La solicitud ya había sido procesada previamente.</strong><br><br>
    <strong>Código de reserva:</strong> ${resultado.codigo_reserva}<br><br>
    <strong>Editar solicitud:</strong><br>
    <a href="${urlEditar}" target="_blank">${urlEditar}</a><br><br>
    <strong>Gestionar asistentes:</strong><br>
    <a href="${urlAsistentes}" target="_blank">${urlAsistentes}</a>
  `;
} else {
  const urlEditar = `${window.location.origin}/editar.html?token=${encodeURIComponent(resultado.token_edicion)}`;
  const urlAsistentes = `${window.location.origin}/asistentes.html?token=${encodeURIComponent(resultado.token_edicion)}`;

  mensaje.innerHTML = `
    <strong>Solicitud registrada correctamente.</strong><br>
    Quedan ${resultado.disponibles_despues} plazas disponibles en la franja seleccionada.<br><br>
    <strong>Código de reserva:</strong> ${resultado.codigo_reserva}<br><br>
    <strong>Guarde estos enlaces para poder modificar su solicitud más adelante:</strong><br><br>
    <strong>Editar solicitud:</strong><br>
    <a href="${urlEditar}" target="_blank">${urlEditar}</a><br><br>
    <strong>Gestionar asistentes:</strong><br>
    <a href="${urlAsistentes}" target="_blank">${urlAsistentes}</a>
  `;
}

      document.getElementById("formularioSolicitud").reset();
      document.getElementById("mayores10").value = 0;
      document.getElementById("menores10").value = 0;

      prepararNuevaClave();
      await cargarFranjas();

    } catch (error) {
      mensaje.className = "mensaje error";
      mensaje.style.display = "block";
      mensaje.textContent = "Error de conexión con el servidor.";
      console.error(error);
      await cargarFranjas(franjaActual);
    } finally {
      envioEnCurso = false;
      boton.textContent = "Enviar solicitud";
      actualizarAvisoCapacidad();
    }
  }

  document.addEventListener("DOMContentLoaded", async function () {
    document.getElementById("franja").addEventListener("change", function () {
      actualizarInfoPlazas();
      actualizarAvisoCapacidad();
    });

    document.getElementById("mayores10").addEventListener("input", actualizarAvisoCapacidad);
    document.getElementById("menores10").addEventListener("input", actualizarAvisoCapacidad);

    document.getElementById("formularioSolicitud").addEventListener("submit", enviarFormulario);

    prepararNuevaClave();
    await cargarFranjas();
  });
</script>
</body>
</html>
