<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitud de servicio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 720px;
      margin: 40px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      line-height: 1.5;
    }

    .campo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: #0b5ed7;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #094db1;
    }

    .cabecera {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
    }

    .logo {
      position: absolute;
      left: 0;
      max-width: 120px;
    }

    .titulos {
      text-align: center;
    }

    .logo {
      max-width: 140px;
      display: block;
      margin: 0 auto 10px auto;
    }

    .nota {
      font-size: 14px;
      color: #555;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">
      <div class="titulos">
        <h1>DIFAS 2026 – Arsenal de Ferrol</h1>
        <h2>Solicitud de bautismo de mar</h2>
      </div>
    </div>
    <p>Complete este formulario para solicitar la actividad.</p>

    <form>
      <div class="campo">
        <label for="centro">Centro solicitante</label>
        <input type="text" id="centro" name="centro" required>
      </div>

      <div class="campo">
        <label for="contacto">Persona de contacto</label>
        <input type="text" id="contacto" name="contacto" required>
      </div>

      <div class="campo">
        <label for="telefono">Teléfono de contacto</label>
        <input type="tel" id="telefono" name="telefono" required>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico de contacto</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="campo">
        <label for="mayores10">Número de visitantes mayores de 10 años</label>
        <input type="number" id="mayores10" name="mayores10" min="0">
      </div>

      <div class="campo">
        <label for="menores10">Número de visitantes menores de 10 años</label>
        <input type="number" id="menores10" name="menores10" min="0">
      </div>

      <div class="campo">
        <label for="ventana">Ventana horaria solicitada</label>
        <select id="ventana" name="ventana" required>
          <option value="">Seleccione una opción</option>
          <option value="2026-05-13_10:00-12:00">13/05/2026 - 10:00 a 12:00</option>
          <option value="2026-05-13_12:30-13:00">13/05/2026 - 12:30 a 13:00</option>
          <option value="2026-05-13_13:30-14:00">13/05/2026 - 13:30 a 14:00</option>
          <option value="2026-05-14_10:00-12:00">14/05/2026 - 10:00 a 12:00</option>
          <option value="2026-05-14_12:30-13:00">14/05/2026 - 12:30 a 13:00</option>
          <option value="2026-05-14_13:30-14:00">14/05/2026 - 13:30 a 14:00</option>
        </select>
      </div>

      <div class="campo">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" name="observaciones"></textarea>
      </div>

      <button type="submit">Enviar solicitud</button>
    </form>

  </div>
</body>
</html>
