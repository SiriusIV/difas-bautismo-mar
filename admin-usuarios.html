<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de administradores</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    h1 {
      margin-top: 0;
      color: #123a63;
    }

    .contenedor {
      max-width: 1100px;
      margin: 0 auto;
    }

    .bloque {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 10px;
    }

    .campo label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .campo input,
    .campo select {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #0b5ed7;
      color: #fff;
    }

    .btn:hover {
      background: #094db1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    .mensaje {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.ok {
      background: #eaf7ea;
      color: #146c2e;
      display: block;
    }

    .mensaje.error {
      background: #fdeaea;
      color: #9b1c1c;
      display: block;
    }

    .lista-actividades {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .asignar {
      margin-top: 6px;
      display: flex;
      gap: 6px;
    }

    .asignar select {
      flex: 1;
    }
  </style>
</head>

<body>
<div class="contenedor">

  <h1>Gestión de administradores</h1>

  <div class="bloque">
    <h3>Crear nuevo administrador</h3>

    <div class="campo">
      <label for="nombre">Nombre</label>
      <input id="nombre">
    </div>

    <div class="campo">
      <label for="email">Email</label>
      <input id="email" type="email">
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password">
    </div>

    <div class="campo">
      <label for="actividad">Actividad inicial</label>
      <select id="actividad">
        <option value="">Seleccione una actividad</option>
      </select>
    </div>

    <button class="btn" onclick="crearUsuario()">Crear ADMIN</button>

    <div id="mensajeCrear" class="mensaje"></div>
  </div>

  <div class="bloque">
    <h3>Administradores y superadministrador</h3>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Actividades</th>
        </tr>
      </thead>
      <tbody id="tablaUsuarios"></tbody>
    </table>
  </div>

</div>

<script>
let actividadesDisponibles = [];

function mostrarMensajeCrear(tipo, texto) {
  const msg = document.getElementById("mensajeCrear");
  msg.className = "mensaje " + tipo;
  msg.textContent = texto;
  msg.style.display = "block";
}

function limpiarMensajeCrear() {
  const msg = document.getElementById("mensajeCrear");
  msg.className = "mensaje";
  msg.textContent = "";
  msg.style.display = "none";
}

function pintarSelectorActividad() {
  const select = document.getElementById("actividad");
  const valorActual = select.value || "";

  select.innerHTML = `<option value="">Seleccione una actividad</option>` +
    actividadesDisponibles.map(a =>
      `<option value="${a.id}" ${String(valorActual) === String(a.id) ? "selected" : ""}>${a.titulo_publico || a.nombre}</option>`
    ).join("");
}

async function cargarUsuarios() {
  const res = await fetch("/api/admin/usuarios-lista", {
    credentials: "include"
  });

  const data = await res.json();

  if (!res.ok || !data.ok) {
    throw new Error(data.error || "No se pudo cargar la lista de administradores");
  }

  actividadesDisponibles = Array.isArray(data.actividades_disponibles)
    ? data.actividades_disponibles
    : [];

  pintarSelectorActividad();

  const tbody = document.getElementById("tablaUsuarios");

  tbody.innerHTML = (data.usuarios || []).map(u => {
    const actividadesTexto = u.rol === "SUPERADMIN"
      ? "Todas"
      : (u.actividades || []).map(a => a.actividad_nombre).join(", ");

    const selector = u.rol === "ADMIN"
      ? `
        <div class="asignar">
          <select id="sel_${u.id}">
            ${actividadesDisponibles.map(a =>
              `<option value="${a.id}">${a.titulo_publico || a.nombre}</option>`
            ).join("")}
          </select>
          <button class="btn" onclick="asignar(${u.id})">+</button>
        </div>
      `
      : "";

    return `
      <tr>
        <td>${u.nombre || ""}</td>
        <td>${u.email || ""}</td>
        <td>${u.rol || ""}</td>
        <td>
          <div class="lista-actividades">
            ${actividadesTexto || "-"}
          </div>
          ${selector}
        </td>
      </tr>
    `;
  }).join("");
}

async function crearUsuario() {
  limpiarMensajeCrear();

  const nombre = document.getElementById("nombre").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const actividad_id = document.getElementById("actividad").value;

  if (!nombre || !email || !password || !actividad_id) {
    mostrarMensajeCrear("error", "Debe rellenar nombre, email, contraseña y actividad inicial.");
    return;
  }

  const res = await fetch("/api/admin/usuarios-crear", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    credentials: "include",
    body: JSON.stringify({
      nombre,
      email,
      password,
      rol: "ADMIN",
      actividad_id
    })
  });

  const data = await res.json();

  if (res.ok && data.ok) {
    mostrarMensajeCrear("ok", "Administrador creado");
    document.getElementById("nombre").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    document.getElementById("actividad").value = "";
    await cargarUsuarios();
  } else {
    mostrarMensajeCrear("error", data.error || "Error al crear el administrador");
  }
}

async function asignar(usuario_id) {
  const select = document.getElementById("sel_" + usuario_id);
  const actividad_id = select.value;

  if (!actividad_id) {
    alert("Seleccione una actividad.");
    return;
  }

  const res = await fetch("/api/admin/usuario-actividad-asignar", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    credentials: "include",
    body: JSON.stringify({ usuario_id, actividad_id })
  });

  const data = await res.json();

  if (res.ok && data.ok) {
    await cargarUsuarios();
  } else {
    alert(data.error || "Error al asignar actividad");
  }
}

(async function init() {
  try {
    await cargarUsuarios();
  } catch (error) {
    mostrarMensajeCrear("error", error.message || "Error al cargar la pantalla");
  }
})();
</script>

</body>
</html>
