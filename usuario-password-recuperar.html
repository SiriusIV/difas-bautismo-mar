<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Recuperar contrase&ntilde;a</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --border: #dde4ea;
      --text: #222;
      --muted: #5f6d7a;
      --brand: #123a63;
      --primary: #0b5ed7;
      --primary-dark: #094db1;
      --ok-bg: #eaf7ea;
      --ok-text: #146c2e;
      --ok-border: #b9e0c0;
      --err-bg: #fdeaea;
      --err-text: #9b1c1c;
      --err-border: #f5c2c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #eef3f8 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(18, 58, 99, 0.12);
      padding: 24px 24px 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      color: var(--brand);
    }

    .subtitulo {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #334250;
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 40px;
      padding: 8px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    .mensaje {
      margin: 0 0 14px;
      padding: 11px 13px;
      border-radius: 8px;
      display: none;
      border: 1px solid transparent;
      line-height: 1.5;
      font-size: 13px;
    }

    .mensaje.ok {
      display: block;
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
    }

    .mensaje.error {
      display: block;
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
    }

    .acciones {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: all 0.15s ease;
    }

    .btn:hover { background: var(--primary-dark); }

    .btn-secundario {
      background: #fff;
      color: #334250;
      border: 1px solid #c9cfd6;
    }

    .btn-secundario:hover {
      background: #f7f9fb;
    }
  </style>
  <link rel="stylesheet" href="assets/mobile-mensaje-flotante.css" />
</head>
<body>
  <div class="card">
    <h1>Recuperar contrase&ntilde;a</h1>
    <p class="subtitulo">Indica tu correo electr&oacute;nico y te enviaremos un enlace temporal para restablecer el acceso.</p>

    <div id="mensaje" class="mensaje"></div>

    <form id="formRecuperar" novalidate>
      <label for="email">Correo electr&oacute;nico</label>
      <input type="email" id="email" autocomplete="email" required />

      <div class="acciones">
        <button type="submit" class="btn" id="btnEnviar">Enviar enlace</button>
        <button type="button" class="btn btn-secundario" id="btnVolver">Volver</button>
      </div>
    </form>
  </div>

  <script>
    function mostrarMensaje(tipo, texto) {
      const box = document.getElementById("mensaje");
      box.className = "mensaje " + tipo;
      box.textContent = texto;
    }

    function limpiarMensaje() {
      const box = document.getElementById("mensaje");
      box.className = "mensaje";
      box.textContent = "";
    }

    async function enviarSolicitud(event) {
      event.preventDefault();
      limpiarMensaje();

      const email = document.getElementById("email").value.trim();
      if (!email) {
        mostrarMensaje("error", "Debes indicar un correo electrónico.");
        return;
      }

      const boton = document.getElementById("btnEnviar");

      try {
        boton.disabled = true;
        boton.textContent = "Enviando...";

        const res = await fetch("/api/usuario/password-recuperar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.ok) {
          mostrarMensaje("error", data?.error || "No se pudo iniciar la recuperación.");
          return;
        }

        mostrarMensaje("ok", data.mensaje || "Si el correo existe en la plataforma, recibirás un enlace para restablecer la contraseña.");
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo iniciar la recuperación.");
      } finally {
        boton.disabled = false;
        boton.textContent = "Enviar enlace";
      }
    }

    document.getElementById("formRecuperar").addEventListener("submit", enviarSolicitud);
    document.getElementById("btnVolver").addEventListener("click", function () {
      history.length > 1 ? history.back() : (location.href = "portal.html");
    });

    const emailInicial = new URLSearchParams(window.location.search).get("email") || "";
    if (emailInicial) {
      document.getElementById("email").value = emailInicial;
    }
  </script>
  <script src="assets/mobile-mensaje-flotante.js"></script>
</body>
</html>
