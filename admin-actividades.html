<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de actividades</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 1200px;
      margin: 30px auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 { margin: 0; font-size: 34px; }
    h2 { margin: 10px 0 0; font-size: 18px; font-weight: normal; color: #444; }

    .cabecera {
      position: relative;
      min-height: 150px;
      margin-bottom: 24px;
      border-bottom: 1px solid #d9e0e7;
      padding-bottom: 18px;
    }

    .logo {
      position: absolute;
      left: 0;
      top: 0;
      max-width: 110px;
      height: auto;
    }

    .titulos {
      text-align: center;
      padding: 0 180px;
    }

    .nav-centro {
      margin-top: 18px;
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .nav-btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #1e2a36;
      text-decoration: none;
      font-size: 14px;
      line-height: 1;
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: #f7f9fb;
    }

    .acciones-cabecera {
      position: absolute;
      right: 0;
      top: 0;
    }

    .btn-icono {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .btn-icono:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }

    .btn-icono svg {
      width: 18px;
      height: 18px;
    }

    .btn {
      background: #0b5ed7;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #094db1;
    }

    .panel {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .fila {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .fila-una {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .acciones-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mensaje {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .preview {
      background: #fff;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 14px;
      line-height: 1.6;
    }

    .preview img {
      max-width: 260px;
      max-height: 180px;
      object-fit: cover;
      display: block;
      margin-bottom: 12px;
      border-radius: 8px;
      background: #dfe7ef;
    }

    .oculto {
      display: none !important;
    }

    @media (max-width: 900px) {
      .fila {
        grid-template-columns: 1fr;
      }

      .titulos {
        padding: 120px 0 0 0;
      }

      .logo {
        position: static;
        display: block;
        margin: 0 auto 12px auto;
      }

      .acciones-cabecera {
        position: static;
        display: flex;
        justify-content: center;
        margin-top: 12px;
      }

      .cabecera {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor" id="app" style="display:none;">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">

      <div class="titulos">
        <h1 id="tituloCabecera">Actividades</h1>
        <h2 id="subtituloCabecera">Alta y edición de eventos</h2>

        <div class="nav-centro">
          <a class="nav-btn" href="mis-actividades.html">Actividades</a>
          <a class="nav-btn" href="portal.html">Portal</a>
        </div>
      </div>

      <div class="acciones-cabecera">
        <button type="button" class="btn-icono" id="btnCerrarSesion" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="mensajeActividad" class="mensaje"></div>

    <div class="panel">
      <h3 id="tituloFormulario">Nueva actividad / evento</h3>

      <form id="formActividad" novalidate>
        <input type="hidden" id="actividadId" value="">

        <div class="fila">
          <div>
            <label for="nombre">Nombre interno</label>
            <input type="text" id="nombre" required>
          </div>

          <div id="bloqueAdminResponsable">
            <label for="admin_id">Administrador responsable</label>
            <select id="admin_id"></select>
          </div>
        </div>

        <div class="fila">
          <div>
            <label for="organizador_publico">Organizador público</label>
            <input type="text" id="organizador_publico">
          </div>

          <div>
            <label for="tipo">Tipo</label>
            <select id="tipo">
              <option value="TEMPORAL">TEMPORAL</option>
              <option value="PERMANENTE">PERMANENTE</option>
            </select>
          </div>
        </div>

        <div class="fila">
          <div>
            <label for="usa_franjas">¿Usa franjas horarias?</label>
            <select id="usa_franjas">
              <option value="1">Sí</option>
              <option value="0">No</option>
            </select>
          </div>

        <div>
          <label for="requiere_reserva">¿Requiere reserva?</label>
          <select id="requiere_reserva">
            <option value="1">Sí</option>
            <option value="0">No</option>
          </select>
        </div>
      </div>

      <div class="fila">
        <div>
          <label for="aforo_limitado">¿Aforo limitado?</label>
          <select id="aforo_limitado">
            <option value="1">Sí</option>
            <option value="0">No</option>
          </select>
        </div>

        <div>
          <label for="provincia">Provincia</label>
          <input type="text" id="provincia">
        </div>
      </div>

    <div class="fila">
      <div>
        <label for="es_recurrente">¿Franja recurrente?</label>
        <select id="es_recurrente">
          <option value="0">No</option>
          <option value="1">Sí</option>
        </select>
      </div>

      <div>
        <label for="patron_recurrencia">Patrón (texto libre)</label>
        <input type="text" id="patron_recurrencia" placeholder="Ej: Todos los sábados">
      </div>
    </div>
        
    <div class="fila" id="bloqueFechas">
          <div>
            <label for="fecha_inicio">Fecha inicio</label>
            <input type="date" id="fecha_inicio">
          </div>

          <div>
            <label for="fecha_fin">Fecha fin</label>
            <input type="date" id="fecha_fin">
          </div>
        </div>

        <div class="fila">
          <div>
            <label for="titulo_publico">Título público</label>
            <input type="text" id="titulo_publico">
          </div>

          <div>
            <label for="subtitulo_publico">Subtítulo público</label>
            <input type="text" id="subtitulo_publico">
          </div>
        </div>

        <div class="fila">
          <div>
            <label for="lugar">Lugar</label>
            <input type="text" id="lugar">
          </div>

          <div>
            <label for="imagen_url">Imagen URL</label>
            <input type="text" id="imagen_url" placeholder="logo.png o URL completa">
          </div>
        </div>

        <div class="fila">
          <div>
            <label for="visible_portal">Visible en portal</label>
            <select id="visible_portal">
              <option value="1">Sí</option>
              <option value="0">No</option>
            </select>
          </div>

          <div>
            <label for="activa">Activa</label>
            <select id="activa">
              <option value="1">Sí</option>
              <option value="0">No</option>
            </select>
          </div>
        </div>

       
        
        <div class="fila">
          <div>
            <label for="orden_portal">Orden en portal</label>
            <input type="number" id="orden_portal" value="0" min="0" step="1">
          </div>

          <div>
            <label for="descripcion">Descripción interna</label>
            <input type="text" id="descripcion">
          </div>
        </div>

        <div class="fila-una">
          <div>
            <label for="descripcion_corta">Descripción corta</label>
            <textarea id="descripcion_corta"></textarea>
          </div>
        </div>

        <div class="fila-una">
          <div>
            <label for="descripcion_larga">Descripción larga</label>
            <textarea id="descripcion_larga"></textarea>
          </div>
        </div>

        <div class="acciones-form">
          <button type="submit" class="btn" id="btnGuardarActividad">Guardar actividad</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <h3>Vista previa básica</h3>
      <div class="preview">
        <img id="previewImagen" src="logo.png" alt="Vista previa">
        <div><strong>Título:</strong> <span id="previewTitulo">-</span></div>
        <div><strong>Organizador:</strong> <span id="previewOrganizador">-</span></div>
        <div><strong>Subtítulo:</strong> <span id="previewSubtitulo">-</span></div>
        <div><strong>Lugar:</strong> <span id="previewLugar">-</span></div>
        <div><strong>Tipo:</strong> <span id="previewTipo">-</span></div>
        <div><strong>Fechas:</strong> <span id="previewFechas">-</span></div>
        <div style="margin-top:8px;"><strong>Descripción corta:</strong></div>
        <div id="previewDescripcionCorta">-</div>
      </div>
    </div>
  </div>

  <script>
    let adminsCache = [];
    let actividadesCache = [];
    let usuarioSesion = null;
    let esSuperAdmin = false;
    let actividadEditandoId = null;

    function getActividadIdURL() {
      const params = new URLSearchParams(window.location.search);
      const v = parseInt(params.get("id") || "", 10);
      return Number.isInteger(v) && v > 0 ? v : null;
    }

    function mostrarMensaje(tipo, texto) {
      const m = document.getElementById("mensajeActividad");
      m.className = "mensaje " + tipo;
      m.style.display = "block";
      m.textContent = texto;
    }

    function limpiarMensaje() {
      const m = document.getElementById("mensajeActividad");
      m.className = "mensaje";
      m.style.display = "none";
      m.textContent = "";
    }

    function redirigirLogin() {
      window.location.href = "portal.html";
    }

    async function comprobarSesionAdmin() {
      const response = await fetch("/api/usuario/session", {
        method: "GET",
        credentials: "same-origin"
      });

      const data = await response.json().catch(() => null);

      if (!response.ok || !data?.ok || !data?.authenticated || !data?.user) {
        redirigirLogin();
        return false;
      }

      const rol = String(data.user.rol || "").toUpperCase();

      if (rol !== "ADMIN" && rol !== "SUPERADMIN") {
        redirigirLogin();
        return false;
      }

      usuarioSesion = data.user;
      esSuperAdmin = rol === "SUPERADMIN";

      const nombreCabecera = usuarioSesion.nombre || usuarioSesion.email || "Administrador";
      document.getElementById("tituloCabecera").textContent = "Actividades";
      document.getElementById("subtituloCabecera").textContent = nombreCabecera;

      return true;
    }

    async function cerrarSesion() {
      try {
        await fetch("/api/usuario/logout", {
          method: "POST",
          credentials: "same-origin"
        });
      } catch (_) {}
      redirigirLogin();
    }

    async function cargarAdminsSoloSiSuperadmin() {
      if (!esSuperAdmin) return;

      const res = await fetch("/api/admin/admins-lista", {
        credentials: "same-origin"
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data.error || "No se pudieron cargar los administradores.");
      }

      adminsCache = Array.isArray(data.admins) ? data.admins : [];

      const sel = document.getElementById("admin_id");
      sel.innerHTML = `<option value="">Seleccione administrador</option>` +
        adminsCache.map(a => `
          <option value="${a.id}">${a.nombre} (${a.email})</option>
        `).join("");
    }

    function configurarModoAdminResponsable() {
      const bloque = document.getElementById("bloqueAdminResponsable");
      const select = document.getElementById("admin_id");

      if (esSuperAdmin) {
        bloque.classList.remove("oculto");
        select.disabled = false;
        return;
      }

      bloque.classList.add("oculto");
      select.innerHTML = `<option value="${usuarioSesion.id}">${usuarioSesion.nombre || usuarioSesion.email}</option>`;
      select.value = String(usuarioSesion.id);
      select.disabled = true;
    }

    async function cargarActividades() {
      const res = await fetch("/api/admin/mis-actividades", {
        credentials: "same-origin"
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data.error || "No se pudieron cargar las actividades.");
      }

      actividadesCache = Array.isArray(data.actividades) ? data.actividades : [];
    }

    function rellenarFormulario(actividad) {
      document.getElementById("actividadId").value = actividad.id || "";
      document.getElementById("nombre").value = actividad.nombre || "";
      document.getElementById("admin_id").value = actividad.admin_id || "";
      document.getElementById("organizador_publico").value = actividad.organizador_publico || "";
      document.getElementById("tipo").value = actividad.tipo || "TEMPORAL";
      document.getElementById("fecha_inicio").value = actividad.fecha_inicio || "";
      document.getElementById("fecha_fin").value = actividad.fecha_fin || "";
      document.getElementById("activa").value = String(actividad.activa ?? 1);
      document.getElementById("descripcion").value = actividad.descripcion || "";
      document.getElementById("titulo_publico").value = actividad.titulo_publico || "";
      document.getElementById("subtitulo_publico").value = actividad.subtitulo_publico || "";
      document.getElementById("descripcion_corta").value = actividad.descripcion_corta || "";
      document.getElementById("descripcion_larga").value = actividad.descripcion_larga || "";
      document.getElementById("lugar").value = actividad.lugar || "";
      document.getElementById("imagen_url").value = actividad.imagen_url || "";
      document.getElementById("visible_portal").value = String(actividad.visible_portal ?? 1);
      document.getElementById("orden_portal").value = String(actividad.orden_portal ?? 0);
      document.getElementById("tituloFormulario").textContent = "Editar actividad / evento";
      document.getElementById("usa_franjas").value = String(actividad.usa_franjas ?? 1);
      document.getElementById("requiere_reserva").value = String(actividad.requiere_reserva ?? 1);
      document.getElementById("aforo_limitado").value = String(actividad.aforo_limitado ?? 1);
      document.getElementById("provincia").value = actividad.provincia || "";
      document.getElementById("es_recurrente").value = String(actividad.es_recurrente ?? 0);
      document.getElementById("patron_recurrencia").value = actividad.patron_recurrencia || "";
      actualizarBloqueFechas();
      actualizarPreview();
    }

    async function cargarActividadSiEsEdicion() {
      actividadEditandoId = getActividadIdURL();
      if (!actividadEditandoId) return;

      await cargarActividades();

      const actividad = actividadesCache.find(a => Number(a.id) === Number(actividadEditandoId));
      if (!actividad) {
        throw new Error("La actividad indicada no existe o no le pertenece.");
      }

      rellenarFormulario(actividad);
    }

    function actualizarBloqueFechas() {
      const tipo = document.getElementById("tipo").value;
      document.getElementById("bloqueFechas").style.display =
        tipo === "TEMPORAL" ? "grid" : "none";
    }

    function actualizarPreview() {
      const titulo = document.getElementById("titulo_publico").value.trim() || document.getElementById("nombre").value.trim() || "-";
      const organizador = document.getElementById("organizador_publico").value.trim() || "-";
      const subtitulo = document.getElementById("subtitulo_publico").value.trim() || "-";
      const lugar = document.getElementById("lugar").value.trim() || "-";
      const tipo = document.getElementById("tipo").value;
      const fecha_inicio = document.getElementById("fecha_inicio").value;
      const fecha_fin = document.getElementById("fecha_fin").value;
      const descripcion_corta = document.getElementById("descripcion_corta").value.trim() || "-";
      const imagen = document.getElementById("imagen_url").value.trim() || "logo.png";

      document.getElementById("previewTitulo").textContent = titulo;
      document.getElementById("previewOrganizador").textContent = organizador;
      document.getElementById("previewSubtitulo").textContent = subtitulo;
      document.getElementById("previewLugar").textContent = lugar;
      document.getElementById("previewTipo").textContent = tipo;
      document.getElementById("previewFechas").textContent =
        tipo === "TEMPORAL"
          ? `${fecha_inicio || "-"} a ${fecha_fin || "-"}`
          : "Permanente";
      document.getElementById("previewDescripcionCorta").textContent = descripcion_corta;
      document.getElementById("previewImagen").src = imagen;
    }

    async function guardarActividad(event) {
      event.preventDefault();
      limpiarMensaje();

      const payload = {
        id: document.getElementById("actividadId").value || null,
        nombre: document.getElementById("nombre").value.trim(),
        admin_id: document.getElementById("admin_id").value,
        organizador_publico: document.getElementById("organizador_publico").value.trim(),
        tipo: document.getElementById("tipo").value,
        fecha_inicio: document.getElementById("fecha_inicio").value,
        fecha_fin: document.getElementById("fecha_fin").value,
        activa: document.getElementById("activa").value,
        descripcion: document.getElementById("descripcion").value.trim(),
        titulo_publico: document.getElementById("titulo_publico").value.trim(),
        subtitulo_publico: document.getElementById("subtitulo_publico").value.trim(),
        descripcion_corta: document.getElementById("descripcion_corta").value.trim(),
        descripcion_larga: document.getElementById("descripcion_larga").value.trim(),
        lugar: document.getElementById("lugar").value.trim(),
        imagen_url: document.getElementById("imagen_url").value.trim(),
        visible_portal: document.getElementById("visible_portal").value,
        orden_portal: document.getElementById("orden_portal").value,
        usa_franjas: document.getElementById("usa_franjas").value,
        requiere_reserva: document.getElementById("requiere_reserva").value,
        aforo_limitado: document.getElementById("aforo_limitado").value,
        provincia: document.getElementById("provincia").value.trim(),
        es_recurrente: document.getElementById("es_recurrente").value,
        patron_recurrencia: document.getElementById("patron_recurrencia").value.trim()
      };

      if (!payload.nombre) {
        mostrarMensaje("error", "Debe indicar al menos el nombre de la actividad.");
        return;
      }

      if (esSuperAdmin && !payload.admin_id) {
        mostrarMensaje("error", "Debe indicar el administrador responsable.");
        return;
      }

      if (!esSuperAdmin) {
        payload.admin_id = String(usuarioSesion.id);
      }

      const esEdicion = !!payload.id;

      const res = await fetch("/api/admin/actividades-guardar", {
        method: esEdicion ? "PUT" : "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        mostrarMensaje("ok", data.mensaje || "Actividad guardada correctamente.");

        if (!esEdicion && data.id) {
          document.getElementById("actividadId").value = data.id;
          history.replaceState(null, "", `admin-actividades.html?id=${encodeURIComponent(data.id)}`);
          document.getElementById("tituloFormulario").textContent = "Editar actividad / evento";
        }
      } else {
        mostrarMensaje("error", data.error || "No se pudo guardar la actividad.");
      }
    }

    document.addEventListener("DOMContentLoaded", async function () {
      const ok = await comprobarSesionAdmin();
      if (!ok) return;

      document.getElementById("app").style.display = "block";

      document.getElementById("btnCerrarSesion").addEventListener("click", cerrarSesion);
      document.getElementById("formActividad").addEventListener("submit", guardarActividad);
      document.getElementById("tipo").addEventListener("change", function () {
        actualizarBloqueFechas();
        actualizarPreview();
      });

      [
        "nombre",
        "admin_id",
        "organizador_publico",
        "fecha_inicio",
        "fecha_fin",
        "titulo_publico",
        "subtitulo_publico",
        "descripcion_corta",
        "lugar",
        "imagen_url",
        "tipo"
      ].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("input", actualizarPreview);
        el.addEventListener("change", actualizarPreview);
      });

      try {
        configurarModoAdminResponsable();
        await cargarAdminsSoloSiSuperadmin();
        configurarModoAdminResponsable();
        await cargarActividadSiEsEdicion();
        actualizarBloqueFechas();
        actualizarPreview();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo inicializar el panel.");
      }
    });
  </script>
</body>
</html>
