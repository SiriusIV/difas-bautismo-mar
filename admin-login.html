<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso administración</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 460px;
      margin: 80px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      text-align: center;
    }

    h2 {
      margin-top: 6px;
      font-size: 18px;
      font-weight: normal;
      text-align: center;
      color: #555;
    }

    .campo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      background: #0b5ed7;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #094db1;
    }

    button:disabled {
      background: #7aa7e8;
      cursor: not-allowed;
    }

    .mensaje {
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Administración</h1>
    <h2>Acceso restringido</h2>

    <div id="mensaje" class="mensaje"></div>

    <form id="formLogin" novalidate>
      <div class="campo">
        <label for="username">Usuario</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>

      <button type="submit" id="btnEntrar">Entrar</button>
    </form>
  </div>

  <script>
    let envioEnCurso = false;

    function mostrarMensaje(tipo, texto) {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje " + tipo;
      mensaje.style.display = "block";
      mensaje.textContent = texto;
    }

    function limpiarMensaje() {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje";
      mensaje.style.display = "none";
      mensaje.textContent = "";
    }

    async function comprobarSesionExistente() {
      try {
        const response = await fetch("/api/admin/session", {
          method: "GET",
          credentials: "same-origin"
        });

        if (response.ok) {
          const destino = new URLSearchParams(window.location.search).get("next") || "/admin-reservas.html";
          window.location.href = destino;
        }
      } catch {
        // sin acción
      }
    }

    async function iniciarSesion(event) {
      event.preventDefault();
      if (envioEnCurso) return;

      limpiarMensaje();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        mostrarMensaje("error", "Debe introducir usuario y contraseña.");
        return;
      }

      const boton = document.getElementById("btnEntrar");

      try {
        envioEnCurso = true;
        boton.disabled = true;
        boton.textContent = "Entrando...";

        const response = await fetch("/api/admin/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          mostrarMensaje("error", data.error || "No se pudo iniciar sesión.");
          return;
        }

        const destino = new URLSearchParams(window.location.search).get("next") || "/admin-reservas.html";
        window.location.href = destino;

      } catch (error) {
        mostrarMensaje("error", "Error de conexión con el servidor.");
      } finally {
        envioEnCurso = false;
        boton.disabled = false;
        boton.textContent = "Entrar";
      }
    }

    document.addEventListener("DOMContentLoaded", async function () {
      document.getElementById("formLogin").addEventListener("submit", iniciarSesion);
      await comprobarSesionExistente();
    });
  </script>
</body>
</html>
