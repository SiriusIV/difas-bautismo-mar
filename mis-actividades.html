<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actividades</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 1200px;
      margin: 30px auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .cabecera {
      position: relative;
      min-height: 140px;
      margin-bottom: 24px;
      border-bottom: 1px solid #d9e0e7;
      padding-bottom: 18px;
    }

    .logo {
      position: absolute;
      left: 0;
      top: 0;
      max-width: 110px;
      height: auto;
    }

    .cabecera-centro {
      text-align: center;
      padding: 0 180px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    h2 {
      margin: 10px 0 0;
      font-size: 18px;
      font-weight: normal;
      color: #444;
    }

    .cabecera-acciones {
      position: absolute;
      right: 0;
      top: 0;
    }

    .nav-centro {
      margin-top: 18px;
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .nav-btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #1e2a36;
      text-decoration: none;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .nav-btn:hover {
      background: #f7f9fb;
    }

    .nav-btn.activo {
      background: #0b5ed7;
      color: #fff;
      border-color: #0b5ed7;
    }

    .btn-icono {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .btn-icono:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }

    .btn-icono:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      color: #8a98a8;
      background: #f8fafc;
    }

    .btn-icono svg {
      width: 18px;
      height: 18px;
    }

    .panel {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .barra-acciones {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .mensaje {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .tabla-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid #dde4ea;
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
      line-height: 1.3;
    }

    th {
      background: #eef4ff;
      color: #1d4f91;
      font-weight: bold;
    }

    th.sel-col, td.sel-col {
      width: 40px;
      text-align: center;
    }

    th.nombre-col, td.nombre-col {
      width: 28%;
    }

    th.tipo-col, td.tipo-col {
      width: 14%;
    }

    th.fechas-col, td.fechas-col {
      width: 24%;
    }

    th.estado-col, td.estado-col {
      width: 17%;
    }

    th.visible-col, td.visible-col {
      width: 17%;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
    }

    .badge.ok { background: #198754; }
    .badge.no { background: #6c757d; }

    .fila-seleccionada {
      background: #f2f7ff;
    }

    .muted {
      color: #6b7280;
    }

    @media (max-width: 1000px) {
      .cabecera-centro {
        padding: 120px 0 0 0;
      }

      .logo {
        position: static;
        display: block;
        margin: 0 auto 12px auto;
      }

      .cabecera-acciones {
        position: static;
        display: flex;
        justify-content: center;
        margin-top: 12px;
      }

      .cabecera {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">

      <div class="cabecera-centro">
        <h1 id="tituloPagina">Actividades</h1>
        <h2 id="subtituloPagina">Administrador</h2>

        <div class="nav-centro">
          <button type="button" class="nav-btn activo" id="btnNuevaTexto">Nueva</button>
          <button type="button" class="nav-btn" id="btnPortalTexto">Portal</button>
        </div>
      </div>

      <div class="cabecera-acciones">
        <button type="button" class="btn-icono" id="btnSalir" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="panel">
      <div class="barra-acciones">
        <button type="button" class="btn-icono" id="btnEditar" title="Editar actividad" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
          </svg>
        </button>

        <button type="button" class="btn-icono" id="btnFranjas" title="Franjas" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </button>

        <button type="button" class="btn-icono" id="btnReservas" title="Reservas" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </button>
      </div>

      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th class="sel-col"></th>
              <th class="nombre-col">Nombre</th>
              <th class="tipo-col">Tipo</th>
              <th class="fechas-col">Fechas</th>
              <th class="estado-col">Activa</th>
              <th class="visible-col">Visible</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let actividadesCache = [];
    let actividadSeleccionada = null;
    let usuarioSesion = null;

    function mostrarMensaje(tipo, texto) {
      const el = document.getElementById("mensaje");
      el.className = "mensaje " + tipo;
      el.style.display = "block";
      el.textContent = texto;
    }

    function limpiarMensaje() {
      const el = document.getElementById("mensaje");
      el.className = "mensaje";
      el.style.display = "none";
      el.textContent = "";
    }

    function actualizarBotones() {
      const hay = !!actividadSeleccionada;
      document.getElementById("btnEditar").disabled = !hay;
      document.getElementById("btnFranjas").disabled = !hay;
      document.getElementById("btnReservas").disabled = !hay;
    }

    function seleccionarActividad(id) {
      actividadSeleccionada = actividadesCache.find(a => Number(a.id) === Number(id)) || null;
      pintarTabla();
      actualizarBotones();
    }

    function pintarTabla() {
      const tbody = document.getElementById("tabla");

      if (!actividadesCache.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="muted">No hay actividades.</td></tr>`;
        actividadSeleccionada = null;
        actualizarBotones();
        return;
      }

      tbody.innerHTML = actividadesCache.map(a => `
        <tr class="${actividadSeleccionada && Number(actividadSeleccionada.id) === Number(a.id) ? "fila-seleccionada" : ""}">
          <td class="sel-col">
            <input
              type="radio"
              name="seleccionActividad"
              ${actividadSeleccionada && Number(actividadSeleccionada.id) === Number(a.id) ? "checked" : ""}
              onchange="seleccionarActividad(${a.id})"
            >
          </td>
          <td class="nombre-col">${a.titulo_publico || a.nombre || ""}</td>
          <td class="tipo-col">${a.tipo || ""}</td>
          <td class="fechas-col">${a.tipo === "TEMPORAL" ? `${a.fecha_inicio || "-"} → ${a.fecha_fin || "-"}` : "-"}</td>
          <td class="estado-col">
            <span class="badge ${Number(a.activa || 0) === 1 ? "ok" : "no"}">
              ${Number(a.activa || 0) === 1 ? "Sí" : "No"}
            </span>
          </td>
          <td class="visible-col">
            <span class="badge ${Number(a.visible_portal || 0) === 1 ? "ok" : "no"}">
              ${Number(a.visible_portal || 0) === 1 ? "Sí" : "No"}
            </span>
          </td>
        </tr>
      `).join("");

      actualizarBotones();
    }

    async function cargarSesion() {
      const res = await fetch("/api/usuario/session", { credentials: "same-origin" });
      const data = await res.json().catch(() => null);

      if (!res.ok || !data?.ok || !data?.authenticated || !data?.user) {
        location.href = "portal.html";
        return false;
      }

      const rol = String(data.user.rol || "").toUpperCase();
      if (rol !== "ADMIN" && rol !== "SUPERADMIN") {
        location.href = "portal.html";
        return false;
      }

      usuarioSesion = data.user;
      document.title = "Actividades";
      document.getElementById("tituloPagina").textContent = "Actividades";
      document.getElementById("subtituloPagina").textContent = usuarioSesion.nombre || usuarioSesion.email || "Administrador";
      return true;
    }

    async function cargarActividades() {
      limpiarMensaje();

      const res = await fetch("/api/admin/mis-actividades", { credentials: "same-origin" });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data.error || "No se pudieron cargar las actividades.");
      }

      actividadesCache = Array.isArray(data.actividades) ? data.actividades : [];
      actividadSeleccionada = null;
      pintarTabla();
    }

    function nueva() {
      location.href = "admin-actividades.html";
    }

    function portal() {
      location.href = "portal.html";
    }

    function editar() {
      if (!actividadSeleccionada) return;
      location.href = "admin-actividades.html?id=" + encodeURIComponent(actividadSeleccionada.id);
    }

    function franjas() {
      if (!actividadSeleccionada) return;
      location.href = "admin-franjas.html?actividad_id=" + encodeURIComponent(actividadSeleccionada.id);
    }

    function reservas() {
      if (!actividadSeleccionada) return;
      location.href = "admin-reservas.html?actividad_id=" + encodeURIComponent(actividadSeleccionada.id);
    }

    async function salir() {
      try {
        await fetch("/api/usuario/logout", {
          method: "POST",
          credentials: "same-origin"
        });
      } catch (_) {}
      location.href = "portal.html";
    }

    document.getElementById("btnNuevaTexto").addEventListener("click", nueva);
    document.getElementById("btnPortalTexto").addEventListener("click", portal);
    document.getElementById("btnSalir").addEventListener("click", salir);
    document.getElementById("btnEditar").addEventListener("click", editar);
    document.getElementById("btnFranjas").addEventListener("click", franjas);
    document.getElementById("btnReservas").addEventListener("click", reservas);

    window.seleccionarActividad = seleccionarActividad;

    (async function init() {
      const ok = await cargarSesion();
      if (!ok) return;

      try {
        await cargarActividades();
      } catch (error) {
        mostrarMensaje("error", error.message || "Error al cargar las actividades.");
      }
    })();
  </script>
</body>
</html>
