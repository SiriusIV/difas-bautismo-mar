<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de actividades</title>
  <link rel="stylesheet" href="assets/fondo-cabecera-movil-unificado.css">
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --border: #dde4ea;
      --text: #222;
      --muted: #5f6d7a;
      --brand: #123a63;
      --primary: #0b5ed7;
      --primary-dark: #094db1;
      --ok-bg: #198754;
      --no-bg: #6c757d;
      --warn-bg: #d97706;
      --info-bg: #0b5ed7;
      --danger-bg: #b42318;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.78) 12%, rgba(255,255,255,0.42) 26%, rgba(255,255,255,0.18) 42%, rgba(255,255,255,0.10) 100%),
        linear-gradient(180deg, rgba(244,246,248,0.18) 0%, rgba(244,246,248,0.24) 100%),
        url("assets/fondo_cabecera.png") top center / 100% auto no-repeat,
        var(--bg);
      background-blend-mode: normal, screen, normal;
      margin: 0;
      color: var(--text);
      display: block;
      overflow-x: hidden;
      overflow-y: auto;
      font-size: 14px;
    }

    .cabecera {
      background: transparent;
      box-shadow: none;
      padding: 18px 20px 14px;
      position: relative;
      z-index: 50;
    }

    .cabecera-inner {
      max-width: 1108px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bloque-marca {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50px;
      flex-wrap: wrap;
      text-align: left;
    }

    .logo-cabecera {
      width: 101px;
      height: auto;
      display: block;
      flex: 0 0 auto;
      transition: opacity 0.12s ease;
    }
    .logo-cabecera.logo-admin-personal { width: 101px; }
    .logo-cabecera.logo-pendiente { opacity: 0; }

    .titulos-cabecera {
      text-align: left;
      min-width: 0;
    }

    .titulos-cabecera h1 {
      margin: 0;
      font-size: 24px;
      color: var(--brand);
      line-height: 1.15;
      font-weight: 600;
    }

    .titulos-cabecera h2 {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: normal;
      color: #4a5a6a;
    }

    .app-scroll {
      width: 100%;
      min-height: 0;
      overflow: visible;
    }

    .contenedor {
      max-width: 1120px;
      margin: 14px auto 22px;
      padding: 0 16px 20px;
    }

    .panel-principal {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      padding: 14px;
    }

    .barra-superior {
      position: relative;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 58px;
      padding-bottom: 12px;
      margin-bottom: 14px;
      border-bottom: 1px solid #d9e0e7;
    }

    .barra-superior-izq {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 560px);
      min-width: 0;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #163c67;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .barra-superior-der {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .nav-btn {
      display: inline-block;
      padding: 8px 15px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #1e2a36;
      text-decoration: none;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .nav-btn:hover {
      background: #f7f9fb;
    }

    .nav-btn.activo {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-icono {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
      text-decoration: none;
      flex: 0 0 40px;
    }

    .btn-icono:hover {
      background: #f7f9fb;
      color: var(--primary);
      border-color: #9fb2c7;
    }

    .btn-icono:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      color: #8a98a8;
      background: #f8fafc;
    }

    .btn-icono.peligro:hover {
      color: var(--danger-bg);
      border-color: #e7b1ac;
      background: #fff5f4;
    }

    .btn-icono svg {
      width: 18px;
      height: 18px;
    }

    .mensaje {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
      font-size: 13px;
      line-height: 1.45;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .panel {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .panel-topbar-izq {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel-topbar-der {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .panel-topbar label {
      font-size: 13px;
      font-weight: 700;
      color: var(--brand);
    }

    .filtro-grupo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel-topbar select {
      min-width: 240px;
      padding: 8px 38px 8px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      color: #1e2a36;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #5f6d7a 50%),
        linear-gradient(135deg, #5f6d7a 50%, transparent 50%);
      background-position:
        calc(100% - 22px) calc(50% - 2px),
        calc(100% - 14px) calc(50% - 2px);
      background-size: 8px 8px, 8px 8px;
      background-repeat: no-repeat;
    }

    .tabla-wrap {
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 0;
      max-height: 690px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #dde4ea;
      padding: 9px 8px;
      text-align: left;
      vertical-align: middle;
      line-height: 1.3;
    }

    th {
      background: #eef4ff;
      color: #1d4f91;
      font-weight: bold;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th.sel-col, td.sel-col {
      width: 34px;
      text-align: center;
      padding-left: 6px;
      padding-right: 6px;
    }

    th.nombre-col, td.nombre-col {
      width: 29.5%;
    }

    th.tipo-col, td.tipo-col {
      width: 12.5%;
    }

    th.programa-col, td.programa-col {
      width: 17.5%;
    }

    th.inicio-col, td.inicio-col {
      width: 11%;
      text-align: center;
    }

    th.fin-col, td.fin-col {
      width: 11%;
      text-align: center;
    }

    th.estado-col, td.estado-col {
      width: 18.5%;
      text-align: center;
    }

    td.activa-col {
      display: none;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
    }

    .badge.ok { background: var(--ok-bg); }
    .badge.no { background: var(--no-bg); }
    .badge.warn { background: var(--warn-bg); }
    .badge.info { background: var(--info-bg); }

    .estado-extra {
      margin-top: 4px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.2;
      text-align: center;
    }

    .fila-seleccionada {
      background: #f2f7ff;
    }

    tr.fila-inactiva td:not(.sel-col) {
      color: #8a95a3;
      background: #f5f7fa;
    }

    tr.fila-inactiva .badge:not(.estado-badge) {
      background: #a2abb6;
      color: #ffffff;
    }

    tr.fila-inactiva .estado-badge {
      opacity: 0.7;
      filter: saturate(0.55);
    }

    tr.fila-inactiva .estado-extra {
      color: #8a95a3;
    }

    .muted {
      color: #6b7280;
    }

    @media (max-width: 900px) {
      .logo-cabecera {
      width: 82px;
      }
    .logo-cabecera.logo-admin-personal { width: 82px; }

      .titulos-cabecera h1 {
        font-size: 21px;
      }

      .bloque-marca {
        gap: 28px;
      }
    }

    @media (max-width: 700px) {
      body {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.968) 0%, rgba(255,255,255,0.81) 12%, rgba(255,255,255,0.45) 26%, rgba(255,255,255,0.23) 42%, rgba(255,255,255,0.145) 100%),
          linear-gradient(180deg, rgba(244,246,248,0.18) 0%, rgba(244,246,248,0.25) 100%),
          url("assets/fondo_cabecera.png") top center / 165% auto no-repeat,
          var(--bg);
        background-blend-mode: normal, screen, normal;
      }

      .logo-cabecera {
      width: 76px;
      }
    .logo-cabecera.logo-admin-personal { width: 76px; }

      .bloque-marca {
        gap: 18px;
      }

      .panel-principal {
        padding: 12px;
      }

      .contenedor {
        margin: 10px auto 18px;
        padding: 0 10px 12px;
      }

      .panel-topbar {
        align-items: stretch;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 4;
        margin: -14px -14px 12px;
        padding: 14px 14px 12px;
        background: #f7f9fb;
        border-bottom: 1px solid #dde4ea;
        border-radius: 10px 10px 0 0;
      }

      .panel-topbar-der {
        justify-content: center;
        margin-left: 0;
        width: 100%;
        gap: 8px;
      }

      .panel-topbar-izq {
        width: 100%;
      }

      .filtro-grupo {
        width: 100%;
      }

      .panel-topbar-der .btn-icono {
        flex: 0 0 auto;
      }

      .filtro-grupo select,
      .filtro-grupo select { width: 100%; }

      .panel-topbar select {
        min-width: 0;
        width: 100%;
      }

      .barra-superior {
        align-items: stretch;
      }

      .barra-superior {
        justify-content: center;
        padding-top: 16px;
      }

      .barra-superior-izq {
        position: static;
        transform: none;
        width: 100%;
        font-size: 18px;
      }

      .barra-superior-der {
        width: 100%;
        justify-content: center;
        margin-left: 0;
        gap: 8px;
      }

      .barra-superior-der .nav-btn {
        flex: 1 1 auto;
        text-align: center;
      }

      .tabla-wrap {
        overflow-x: hidden;
        overflow-y: auto;
        max-height: calc(100vh - 355px);
        padding-right: 2px;
      }

      table,
      tbody {
        display: block;
        width: 100%;
      }

      thead {
        display: none;
      }

      table {
        min-width: 0;
        background: transparent;
      }

      #tabla tr {
        display: block;
        width: 100%;
        margin: 0 0 12px;
        padding: 12px;
        border: 1px solid #dde4ea;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        cursor: pointer;
      }

      #tabla tr.fila-seleccionada {
        background: #f2f7ff;
        border-color: #bfd7ff;
        box-shadow: 0 5px 18px rgba(28, 91, 183, 0.12);
      }

      #tabla td {
        display: block;
        width: 100% !important;
        border: 0;
        padding: 0;
        text-align: left !important;
      }

      th.sel-col,
      td.sel-col,
      td.activa-col {
        display: none !important;
      }

      #tabla td.nombre-col {
        margin-bottom: 10px;
        font-size: 18px;
        line-height: 1.28;
        font-weight: 700;
        color: #123a63;
        text-align: center !important;
      }

      #tabla td.tipo-col,
      #tabla td.programa-col,
      #tabla td.inicio-col,
      #tabla td.fin-col,
      #tabla td.estado-col {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 7px 0;
      }

      #tabla td.tipo-col::before,
      #tabla td.programa-col::before,
      #tabla td.inicio-col::before,
      #tabla td.fin-col::before,
      #tabla td.estado-col::before {
        content: attr(data-label);
        flex: 0 0 108px;
        max-width: 108px;
        font-size: 12px;
        line-height: 1.3;
        font-weight: 700;
        color: #5f6d7a;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      #tabla td.tipo-col > span,
      #tabla td.programa-col > span,
      #tabla td.inicio-col > span,
      #tabla td.fin-col > span,
      #tabla td.estado-col > span,
      #tabla td.estado-col > div,
      #tabla td.estado-col > .estado-mobile-wrap {
        flex: 1 1 auto;
        min-width: 0;
      }

      #tabla td.programa-col .valor-vacio,
      #tabla td.inicio-col .valor-vacio,
      #tabla td.fin-col .valor-vacio {
        color: #6b7280;
      }

      #tabla td.estado-col {
        align-items: center;
        justify-content: flex-start;
      }

      #tabla td.estado-col .estado-mobile-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      #tabla td.estado-col .badge {
        align-self: flex-start;
      }

      #tabla td.estado-col .estado-extra {
        margin-top: 0;
        text-align: left;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/mobile-mensaje-flotante.css" />
</head>
<body class="fondo-cabecera-unificada">
  <div class="cabecera">
    <div class="cabecera-inner">
      <div class="bloque-marca">
        <img src="logo.png" alt="Logo" class="logo-cabecera logo-pendiente">

        <div class="titulos-cabecera">
          <h1 id="tituloCabecera">Panel de actividades</h1>
          <h2 id="subtituloCabecera">Administrador</h2>
        </div>
      </div>
    </div>
  </div>

  <div class="app-scroll">
    <div class="contenedor">
      <div class="panel-principal">
        <div class="barra-superior">
          <div class="barra-superior-izq" id="tituloListado">Listado de actividades</div>

          <div class="barra-superior-der">
            <button type="button" class="nav-btn activo" id="btnNuevaTexto">Nueva actividad</button>
            <button type="button" class="nav-btn" id="btnPlantillasTexto">Plantillas</button>

            <a class="btn-icono" href="portal.html" title="Inicio" aria-label="Inicio" id="btnPortalCasa">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 10.5L12 3l9 7.5"></path>
                <path d="M5 9.5V21h14V9.5"></path>
                <path d="M9 21v-6h6v6"></path>
              </svg>
            </a>
          </div>
        </div>

        <div id="mensaje" class="mensaje"></div>

        <div class="panel">
          <div class="panel-topbar">
            <div class="panel-topbar-izq">
              <div class="filtro-grupo">
                <label for="filtroTipoActividad">Tipo actividad</label>
                <select id="filtroTipoActividad">
                  <option value="activas" selected>Actividades activas</option>
                  <option value="inactivas">Actividades inactivas</option>
                  <option value="todas">Todas</option>
                </select>
              </div>

              <div class="filtro-grupo">
                <label for="filtroPrograma">Programa</label>
                <select id="filtroPrograma">
                  <option value="">Todos</option>
                </select>
              </div>
            </div>

            <div class="panel-topbar-der">
              <button type="button" class="btn-icono" id="btnEditar" title="Editar actividad" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
                </svg>
              </button>

              <button type="button" class="btn-icono" id="btnFranjas" title="Calendario" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
              </button>

              <button type="button" class="btn-icono" id="btnReservas" title="Reservas" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
              </button>

              <button type="button" class="btn-icono peligro" id="btnEliminar" title="Eliminar actividad" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="tabla-wrap">
            <table>
              <thead>
                <tr>
                  <th class="sel-col"></th>
                  <th class="nombre-col">Nombre</th>
                  <th class="tipo-col">Tipo</th>
                  <th class="programa-col">Programa</th>
                  <th class="inicio-col">Comienza</th>
                  <th class="fin-col">Finaliza</th>
                  <th class="estado-col">Estado</th>
                </tr>
              </thead>
              <tbody id="tabla"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let actividadesCache = [];
    let actividadesFiltradas = [];
    let actividadSeleccionada = null;
    let usuarioSesion = null;
    function aplicarLogoAdminArfer(img, usuario = {}) {
      if (!img) return;
      img.style.width = "";
      const logoUsuario = String(usuario?.logo_url || "").trim();
      img.classList.remove("logo-admin-personal");
      if (logoUsuario) img.src = logoUsuario;
      else img.src = "logo.png";
      if (logoUsuario) img.classList.add("logo-admin-personal");
      img.classList.remove("logo-pendiente");
    }
    let filtroPrograma = "";
    let filtroTipoActividad = "activas";

    function mostrarMensaje(tipo, texto) {
      const el = document.getElementById("mensaje");
      el.className = "mensaje " + tipo;
      el.style.display = "block";
      el.textContent = texto;
    }

    function limpiarMensaje() {
      const el = document.getElementById("mensaje");
      el.className = "mensaje";
      el.style.display = "none";
      el.textContent = "";
    }

    function formatearFechaES(fecha) {
      if (!fecha) return "-";
      const partes = String(fecha).split("-");
      if (partes.length !== 3) return fecha;
      return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

      const d = String(ahora.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function calcularEstadoActividad(a) {
      const hoy = obtenerHoyISO();

      if (a.tipo === "TEMPORAL" && a.fecha_fin && a.fecha_fin < hoy) {
        return { texto: "FINALIZADA", clase: "no" };
      }

      if (
        Number(a.aforo_limitado || 0) === 1 &&
        Number(a.usa_franjas || 0) === 1 &&
        Number(a.plazas_totales || 0) > 0 &&
        Number(a.plazas_disponibles || 0) <= 0
      ) {
        return { texto: "COMPLETO", clase: "warn" };
      }

      return { texto: "DISPONIBLE", clase: "info" };
    }

    function obtenerFechaOrdenActividad(a) {
      return String(
        a.fecha_inicio ||
        a.fecha_fin ||
        a.created_at ||
        a.updated_at ||
        ""
      );
    }

    function obtenerGrupoOrdenActividad(a) {
      const visible = Number(a.visible_portal || 0) === 1;
      const activa = Number(a.activa || 0) === 1;

      if (!visible || !activa) return 2;
      if (String(a.tipo || "").toUpperCase() === "PERMANENTE") return 0;
      return 1;
    }

    function compararActividadesPanel(a, b) {
      const grupoA = obtenerGrupoOrdenActividad(a);
      const grupoB = obtenerGrupoOrdenActividad(b);

      if (grupoA !== grupoB) return grupoA - grupoB;

      const fechaA = obtenerFechaOrdenActividad(a);
      const fechaB = obtenerFechaOrdenActividad(b);

      if (fechaA && fechaB && fechaA !== fechaB) {
        return fechaA < fechaB ? 1 : -1;
      }

      if (fechaA && !fechaB) return -1;
      if (!fechaA && fechaB) return 1;

      return String(a.titulo_publico || a.nombre || "").localeCompare(
        String(b.titulo_publico || b.nombre || ""),
        "es"
      );
    }

    function actualizarBotones() {
      const hay = !!actividadSeleccionada;
      const admiteReservas = hay && Number(actividadSeleccionada.requiere_reserva || 0) === 1;
      document.getElementById("btnEditar").disabled = !hay;
      document.getElementById("btnFranjas").disabled = !hay;
      document.getElementById("btnReservas").disabled = !admiteReservas;
      document.getElementById("btnReservas").title = !hay
        ? "Reservas"
        : (admiteReservas ? "Reservas" : "Esta actividad no admite reservas");
      document.getElementById("btnEliminar").disabled = !hay;
    }

    function esActividadVisibleActiva(a) {
      return Number(a.visible_portal || 0) === 1 && Number(a.activa || 0) === 1;
    }

    function aplicarFiltroPrograma() {
      actividadesFiltradas = actividadesCache.filter(a => {
        if (filtroPrograma && String(a.subtitulo_publico || "").trim() !== filtroPrograma) {
          return false;
        }

        const esActiva = esActividadVisibleActiva(a);
        const esInactiva = !esActiva;
        if (filtroTipoActividad === "activas") return esActiva;
        if (filtroTipoActividad === "inactivas") return esInactiva;
        return true;
      });

      if (
        actividadSeleccionada &&
        !actividadesFiltradas.find(a => Number(a.id) === Number(actividadSeleccionada.id))
      ) {
        actividadSeleccionada = null;
      }
    }

    function poblarFiltroPrograma() {
      const select = document.getElementById("filtroPrograma");

      const programas = [...new Set(
        actividadesCache
          .map(a => String(a.subtitulo_publico || "").trim())
          .filter(v => v !== "")
      )].sort((a, b) => a.localeCompare(b, "es"));

      select.innerHTML =
        `<option value="">Todos</option>` +
        programas.map(p => `<option value="${p}">${p}</option>`).join("");

      if (filtroPrograma && !programas.includes(filtroPrograma)) {
        filtroPrograma = "";
      }

      select.value = filtroPrograma;
    }

    function seleccionarActividad(id) {
      actividadSeleccionada = actividadesFiltradas.find(a => Number(a.id) === Number(id)) || null;
      pintarTabla();
      actualizarBotones();
    }

    function manejarSeleccionFilaActividad(event, id) {
      if (!window.matchMedia("(max-width: 700px)").matches) return;
      if (event?.target?.closest("input, button, a, label, select, textarea")) return;
      seleccionarActividad(id);
    }

    function pintarTabla() {
      const tbody = document.getElementById("tabla");

      if (!actividadesFiltradas.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="muted">No hay actividades.</td></tr>`;
        actividadSeleccionada = null;
        actualizarBotones();
        return;
      }

      tbody.innerHTML = actividadesFiltradas.map(a => {
        const estado = calcularEstadoActividad(a);
        const estaVisible = esActividadVisibleActiva(a);
        const filaClases = [
          actividadSeleccionada && Number(actividadSeleccionada.id) === Number(a.id) ? "fila-seleccionada" : "",
          estaVisible ? "" : "fila-inactiva"
        ].filter(Boolean).join(" ");
        const tipoTexto = String(a.tipo || "").toUpperCase() === "PENDIENTE" ? "PENDIENTE" : (a.tipo || "");
        const programaTexto = a.subtitulo_publico ? a.subtitulo_publico : `<span class="valor-vacio">-</span>`;
        const inicioTexto = a.tipo === "TEMPORAL" && a.fecha_inicio ? formatearFechaES(a.fecha_inicio) : `<span class="valor-vacio">-</span>`;
        const finTexto = a.tipo === "TEMPORAL" && a.fecha_fin ? formatearFechaES(a.fecha_fin) : `<span class="valor-vacio">-</span>`;
        const estadoExtra = Number(a.aforo_limitado || 0) === 1 &&
          Number(a.usa_franjas || 0) === 1 &&
          Number(a.plazas_totales || 0) > 0
            ? `<div class="estado-extra">Plazas: ${Number(a.plazas_disponibles || 0)} disponibles de ${Number(a.plazas_totales || 0)}</div>`
            : ``;

        return `
          <tr class="${filaClases}" onclick="manejarSeleccionFilaActividad(event, ${a.id})">
            <td class="sel-col">
              <input
                type="radio"
                name="seleccionActividad"
                ${actividadSeleccionada && Number(actividadSeleccionada.id) === Number(a.id) ? "checked" : ""}
                onchange="seleccionarActividad(${a.id})"
              >
            </td>
            <td class="nombre-col">${a.titulo_publico || a.nombre || ""}</td>
            <td class="tipo-col" data-label="Tipo"><span>${tipoTexto}</span></td>
            <td class="programa-col" data-label="Programa"><span>${programaTexto}</span></td>
            <td class="inicio-col" data-label="Comienza"><span>${inicioTexto}</span></td>
            <td class="fin-col" data-label="Finaliza"><span>${finTexto}</span></td>
            <td class="estado-col" data-label="Estado">
              <div class="estado-mobile-wrap">
                <span class="badge estado-badge ${estado.clase}">${estado.texto}</span>
                ${estadoExtra}
              </div>
            </td>
            <td class="activa-col">
              <span class="badge ${Number(a.activa || 0) === 1 ? "ok" : "no"}">
                ${Number(a.activa || 0) === 1 ? "SÃ­" : "No"}
              </span>
            </td>
          </tr>
        `;
      }).join("");

      actualizarBotones();
    }

    async function cargarSesion() {
      const res = await fetch("/api/usuario/session", { credentials: "same-origin" });
      const data = await res.json().catch(() => null);

      if (!res.ok || !data?.ok || !data?.authenticated || !data?.user) {
        location.href = "portal.html";
        return false;
      }

      const rol = String(data.user.rol || "").toUpperCase();
      if (rol !== "ADMIN" && rol !== "SUPERADMIN") {
        location.href = "portal.html";
        return false;
      }

      usuarioSesion = data.user;

      const nombreAdmin = usuarioSesion.nombre || usuarioSesion.email || "Administrador";

      document.title = "Panel de actividades";
      document.getElementById("tituloCabecera").textContent = "Panel de actividades";
      document.getElementById("subtituloCabecera").textContent = nombreAdmin;
      document.getElementById("tituloListado").textContent = `Listado de actividades de ${nombreAdmin}`;
      aplicarLogoAdminArfer(document.querySelector(".logo-cabecera"), usuarioSesion);

      return true;
    }

    async function cargarActividades() {
      limpiarMensaje();

      const res = await fetch("/api/admin/mis-actividades", { credentials: "same-origin" });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data.error || "No se pudieron cargar las actividades.");
      }

      actividadesCache = (Array.isArray(data.actividades) ? data.actividades : [])
        .sort(compararActividadesPanel);

      poblarFiltroPrograma();
      const selectTipo = document.getElementById("filtroTipoActividad");
      if (selectTipo) selectTipo.value = filtroTipoActividad;
      aplicarFiltroPrograma();
      actividadSeleccionada = null;
      pintarTabla();
    }

    function nueva() {
      location.href = "admin-actividades.html";
    }

    function plantillas() {
      location.href = "admin-plantillas.html";
    }

    function editar() {
      if (!actividadSeleccionada) return;
      location.href = "admin-actividades.html?id=" + encodeURIComponent(actividadSeleccionada.id);
    }

    function franjas() {
      if (!actividadSeleccionada) return;
      location.href = "admin-calendario.html?actividad_id=" + encodeURIComponent(actividadSeleccionada.id);
    }

    function reservas() {
      if (!actividadSeleccionada) return;
      if (Number(actividadSeleccionada.requiere_reserva || 0) !== 1) return;
      location.href = "admin-reservas.html?actividad_id=" + encodeURIComponent(actividadSeleccionada.id);
    }

    async function eliminarActividad() {
      if (!actividadSeleccionada) return;

      const id = actividadSeleccionada.id;

      try {
        const resPrevio = await fetch("/api/admin/actividades-eliminar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ id })
        });

        const dataPrevio = await resPrevio.json().catch(() => null);

        if (!resPrevio.ok && !dataPrevio?.requiere_confirmacion) {
          mostrarMensaje("error", dataPrevio?.error || "No se pudo comprobar si la actividad puede eliminarse.");
          return;
        }

        if (dataPrevio?.bloqueado) {
          mostrarMensaje("error", dataPrevio.error || "La actividad no se puede eliminar.");
          return;
        }

        let textoConfirmacion = "Â¿Seguro que deseas eliminar esta actividad?";

        if (dataPrevio?.requiere_confirmacion) {
          textoConfirmacion = dataPrevio.mensaje || textoConfirmacion;
        }

        const confirmar = confirm(textoConfirmacion);
        if (!confirmar) return;

        const resFinal = await fetch("/api/admin/actividades-eliminar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            id,
            confirmado: true
          })
        });

        const dataFinal = await resFinal.json().catch(() => null);

        if (!resFinal.ok || !dataFinal?.ok) {
          mostrarMensaje("error", dataFinal?.error || "No se pudo eliminar la actividad.");
          return;
        }

        mostrarMensaje("ok", dataFinal.mensaje || "Actividad eliminada correctamente.");

        actividadSeleccionada = null;
        await cargarActividades();
      } catch (error) {
        mostrarMensaje("error", error?.message || "Error al eliminar la actividad.");
      }
    }

    async function eliminarActividadCorregida() {
      if (!actividadSeleccionada) return;

      const id = actividadSeleccionada.id;
      const nombreActividad = actividadSeleccionada.titulo_publico || actividadSeleccionada.nombre || "esta actividad";

      try {
        const resPrevio = await fetch("/api/admin/actividades-eliminar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ id })
        });

        const dataPrevio = await resPrevio.json().catch(() => null);

        if (!resPrevio.ok && !dataPrevio?.requiere_confirmacion) {
          mostrarMensaje("error", dataPrevio?.error || "No se pudo comprobar si la actividad puede eliminarse.");
          return;
        }

        if (dataPrevio?.bloqueado) {
          mostrarMensaje("error", dataPrevio.error || "La actividad no se puede eliminar.");
          return;
        }

        let textoConfirmacion = `Se eliminara la actividad "${nombreActividad}". Esta accion puede cancelar reservas relacionadas y notificara a los usuarios afectados.`;
        let requiereObservaciones = false;

        if (dataPrevio?.requiere_confirmacion) {
          textoConfirmacion = dataPrevio.mensaje || textoConfirmacion;
          requiereObservaciones = !!dataPrevio.requiere_observaciones;
        }

        const confirmar = confirm(`${textoConfirmacion}\n\nÂ¿Deseas continuar?`);
        if (!confirmar) return;

        if (resPrevio.ok && dataPrevio?.ok && !dataPrevio?.requiere_confirmacion) {
          mostrarMensaje("ok", dataPrevio.mensaje || "Actividad eliminada correctamente.");
          actividadSeleccionada = null;
          await cargarActividades();
          return;
        }

        let observacionesAdmin = "";
        if (requiereObservaciones) {
          observacionesAdmin = String(prompt("Indica el motivo de la anulacion que se enviara a los usuarios afectados:", "") || "").trim();
          if (!observacionesAdmin) {
            mostrarMensaje("error", "Debes indicar el motivo de la anulacion para continuar.");
            return;
          }
        }

        const resFinal = await fetch("/api/admin/actividades-eliminar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            id,
            confirmado: true,
            observaciones_admin: observacionesAdmin
          })
        });

        const dataFinal = await resFinal.json().catch(() => null);

        if (!resFinal.ok || !dataFinal?.ok) {
          mostrarMensaje("error", dataFinal?.error || "No se pudo eliminar la actividad.");
          return;
        }

        mostrarMensaje("ok", dataFinal.mensaje || "Actividad eliminada correctamente.");
        actividadSeleccionada = null;
        await cargarActividades();
      } catch (error) {
        mostrarMensaje("error", error?.message || "Error al eliminar la actividad.");
      }
    }

    document.getElementById("btnNuevaTexto").addEventListener("click", nueva);
    document.getElementById("btnPlantillasTexto").addEventListener("click", plantillas);
    document.getElementById("btnEditar").addEventListener("click", editar);
    document.getElementById("btnFranjas").addEventListener("click", franjas);
    document.getElementById("btnReservas").addEventListener("click", reservas);
    document.getElementById("btnEliminar").addEventListener("click", eliminarActividadCorregida);

    document.getElementById("filtroPrograma").addEventListener("change", function () {
      filtroPrograma = this.value;
      aplicarFiltroPrograma();
      pintarTabla();
    });

    document.getElementById("filtroTipoActividad").addEventListener("change", function () {
      filtroTipoActividad = this.value || "activas";
      aplicarFiltroPrograma();
      pintarTabla();
    });

    window.seleccionarActividad = seleccionarActividad;
    window.manejarSeleccionFilaActividad = manejarSeleccionFilaActividad;

    (async function init() {
      const ok = await cargarSesion();
      if (!ok) return;

      try {
        await cargarActividades();
      } catch (error) {
        mostrarMensaje("error", error.message || "Error al cargar las actividades.");
      }
    })();
  </script>
  <script src="assets/mobile-mensaje-flotante.js"></script>
</body>
