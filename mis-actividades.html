<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividades</title>

<style>
:root {
  --bg:#f4f6f8;
  --border:#dde4ea;
  --brand:#123a63;
  --primary:#0b5ed7;
  --ok:#198754;
  --no:#6c757d;
  --warn:#d97706;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  font-size:14px;
}

/* CABECERA */
.cabecera{
  background:#fff;
  position:sticky;
  top:0;
  padding:16px;
}

.cabecera-inner{
  max-width:1120px;
  margin:auto;
  position:relative;
  text-align:center;
}

.logo-cabecera{
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  width:70px;
}

.titulos-cabecera h1{margin:0;color:var(--brand);}
.titulos-cabecera h2{margin:0;font-size:13px;color:#555}

/* CONTENIDO */
.contenedor{max-width:1120px;margin:auto;padding:16px;}

.panel{background:#fff;border-radius:12px;padding:14px}

/* BARRA SUPERIOR */
.barra-superior{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.barra-der{display:flex;gap:10px;align-items:center}

/* BOTONES */
.nav-btn{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

.btn-icono{
  width:40px;height:40px;
  border-radius:50%;
  border:1px solid #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  cursor:pointer;
}

/* TABLA */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  padding:8px;
  border-bottom:1px solid #eee;
}

th{background:#eef4ff}

.badge{
  padding:4px 8px;
  border-radius:999px;
  color:#fff;
  font-size:12px;
}

.ok{background:var(--ok)}
.no{background:var(--no)}
.warn{background:var(--warn)}
.info{background:var(--primary)}

.fila-seleccionada{background:#eef5ff}
</style>
</head>

<body>

<div class="cabecera">
  <div class="cabecera-inner">
    <img src="logo.png" class="logo-cabecera">
    <div class="titulos-cabecera">
      <h1 id="tituloCabecera">Actividades</h1>
      <h2 id="subtituloCabecera"></h2>
    </div>
  </div>
</div>

<div class="contenedor">
<div class="panel">

<!-- BARRA SUPERIOR -->
<div class="barra-superior">
  <div id="tituloListado"></div>

  <div class="barra-der">
    <button class="nav-btn" id="btnNueva">Nueva actividad</button>

    <a href="portal.html" class="btn-icono">
      🏠
    </a>
  </div>
</div>

<!-- FILTRO -->
<select id="filtroPrograma"></select>

<!-- BOTONES ACCIÓN -->
<div class="barra-der" style="margin-top:10px">
  <button class="btn-icono" id="btnEditar">✏️</button>
  <button class="btn-icono" id="btnFranjas">📅</button>
  <button class="btn-icono" id="btnReservas">💬</button>
  <button class="btn-icono" id="btnEliminar">🗑️</button>
</div>

<!-- TABLA -->
<table>
<thead>
<tr>
<th></th>
<th>Nombre</th>
<th>Tipo</th>
<th>Programa</th>
<th>Comienza</th>
<th>Finaliza</th>
<th>Estado</th>
<th>Activa</th>
<th>Visible</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>
</div>

<script>
let actividades=[];
let seleccion=null;

function fechaES(f){
 if(!f)return "-";
 let [y,m,d]=f.split("-");
 return d+"/"+m+"/"+y;
}

function estado(a){
 const hoy = new Date().toISOString().slice(0,10);

 if (a.tipo === "TEMPORAL" && a.fecha_fin && a.fecha_fin < hoy) {
  return ["FINALIZADA","no"];
 }

 if (
  Number(a.aforo_limitado || 0) === 1 &&
  Number(a.usa_franjas || 0) === 1 &&
  Number(a.plazas_totales || 0) > 0 &&
  Number(a.plazas_disponibles || 0) <= 0
 ) {
  return ["COMPLETO","warn"];
 }

 return ["DISPONIBLE","info"];
}

function pintar(){
 let t=document.getElementById("tabla");

 t.innerHTML=actividades.map(a=>{
  let e=estado(a);

  return `<tr class="${seleccion?.id==a.id?'fila-seleccionada':''}">
<td><input type="radio" onchange="sel(${a.id})"></td>
<td>${a.nombre}</td>
<td>${a.tipo}</td>
<td>${a.subtitulo_publico||"-"}</td>
<td>${fechaES(a.fecha_inicio)}</td>
<td>${fechaES(a.fecha_fin)}</td>
<td>
  <span class="badge ${e[1]}">${e[0]}</span>
  <div style="font-size:11px;color:#666;">
    ${a.plazas_disponibles}/${a.plazas_totales}
  </div>
</td>
<td>${a.activa?"Sí":"No"}</td>
<td>${a.visible_portal?"Sí":"No"}</td>
</tr>`
 }).join("");
}

function sel(id){
 seleccion=actividades.find(a=>a.id==id);
}

async function eliminar(){
 if(!seleccion)return;

 let r1=await fetch("/api/admin/actividades-eliminar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:seleccion.id})
 });

 let d1=await r1.json();

 if(d1.bloqueado){
  alert(d1.error);
  return;
 }

 let txt=d1.requiere_confirmacion?d1.mensaje:"¿Eliminar actividad?";
 if(!confirm(txt))return;

 let r2=await fetch("/api/admin/actividades-eliminar",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:seleccion.id,confirmado:true})
 });

 let d2=await r2.json();

 if(!d2.ok){
  alert(d2.error);
  return;
 }

 cargar();
}

document.getElementById("btnEliminar").onclick=eliminar;

async function cargar(){
 let r=await fetch("/api/admin/mis-actividades");
 let d=await r.json();

 actividades=d.actividades.sort((a,b)=>b.fecha_inicio.localeCompare(a.fecha_inicio));
 pintar();
}

cargar();
</script>

</body>
</html>
