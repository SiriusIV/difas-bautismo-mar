<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Restablecer contrase&ntilde;a</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --border: #dde4ea;
      --text: #222;
      --muted: #5f6d7a;
      --brand: #123a63;
      --primary: #0b5ed7;
      --primary-dark: #094db1;
      --ok-bg: #eaf7ea;
      --ok-text: #146c2e;
      --ok-border: #b9e0c0;
      --err-bg: #fdeaea;
      --err-text: #9b1c1c;
      --err-border: #f5c2c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #eef3f8 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(18, 58, 99, 0.12);
      padding: 24px 24px 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      color: var(--brand);
    }

    .subtitulo {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #334250;
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 40px;
      padding: 8px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      margin-bottom: 12px;
    }

    input:disabled {
      background: #f7f9fb;
      color: #6b7785;
    }

    .nota {
      margin: -2px 0 14px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .mensaje {
      margin: 0 0 14px;
      padding: 11px 13px;
      border-radius: 8px;
      display: none;
      border: 1px solid transparent;
      line-height: 1.5;
      font-size: 13px;
    }

    .mensaje.ok {
      display: block;
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
    }

    .mensaje.error {
      display: block;
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
    }

    .acciones {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: all 0.15s ease;
    }

    .btn:hover { background: var(--primary-dark); }

    .btn-secundario {
      background: #fff;
      color: #334250;
      border: 1px solid #c9cfd6;
    }

    .btn-secundario:hover {
      background: #f7f9fb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Restablecer contrase&ntilde;a</h1>
    <p class="subtitulo">Define una nueva contrase&ntilde;a segura para recuperar el acceso a tu cuenta.</p>

    <div id="mensaje" class="mensaje"></div>

    <form id="formReset" novalidate>
      <label for="email">Cuenta</label>
      <input type="email" id="email" disabled />

      <label for="password">Nueva contrase&ntilde;a</label>
      <input type="password" id="password" autocomplete="new-password" required />

      <label for="passwordConfirmacion">Confirmar nueva contrase&ntilde;a</label>
      <input type="password" id="passwordConfirmacion" autocomplete="new-password" required />

      <p class="nota">La contrase&ntilde;a debe tener al menos 8 caracteres e incluir una may&uacute;scula, una min&uacute;scula, un n&uacute;mero y un car&aacute;cter especial.</p>

      <div class="acciones">
        <button type="submit" class="btn" id="btnGuardar">Guardar nueva contraseña</button>
        <button type="button" class="btn btn-secundario" id="btnIrLogin">Ir al acceso</button>
      </div>
    </form>
  </div>

  <script>
    let tokenRecuperacion = "";
    let tokenValido = false;

    function mostrarMensaje(tipo, texto) {
      const box = document.getElementById("mensaje");
      box.className = "mensaje " + tipo;
      box.textContent = texto;
    }

    function limpiarMensaje() {
      const box = document.getElementById("mensaje");
      box.className = "mensaje";
      box.textContent = "";
    }

    function validarPoliticaPassword(password) {
      const valor = String(password || "");
      if (valor.length < 8) return false;
      if (!/[A-ZÁÉÍÓÚÜÑ]/.test(valor)) return false;
      if (!/[a-záéíóúüñ]/.test(valor)) return false;
      if (!/[0-9]/.test(valor)) return false;
      if (!/[^A-Za-z0-9ÁÉÍÓÚÜÑáéíóúüñ]/.test(valor)) return false;
      return true;
    }

    function deshabilitarFormulario() {
      document.getElementById("password").disabled = true;
      document.getElementById("passwordConfirmacion").disabled = true;
      document.getElementById("btnGuardar").disabled = true;
    }

    async function validarTokenInicial() {
      tokenRecuperacion = new URLSearchParams(window.location.search).get("token") || "";

      if (!tokenRecuperacion) {
        deshabilitarFormulario();
        mostrarMensaje("error", "Falta el token de recuperación.");
        return;
      }

      try {
        const res = await fetch(`/api/usuario/password-restablecer?token=${encodeURIComponent(tokenRecuperacion)}`);
        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.ok) {
          deshabilitarFormulario();
          mostrarMensaje("error", data?.error || "El enlace de recuperación no es válido o ha caducado.");
          return;
        }

        tokenValido = true;
        document.getElementById("email").value = data.email || "";
      } catch (error) {
        deshabilitarFormulario();
        mostrarMensaje("error", error.message || "No se pudo validar el enlace de recuperación.");
      }
    }

    async function guardarNuevaPassword(event) {
      event.preventDefault();
      limpiarMensaje();

      if (!tokenValido) {
        mostrarMensaje("error", "El enlace de recuperación no es válido o ha caducado.");
        return;
      }

      const password = document.getElementById("password").value;
      const confirmacion = document.getElementById("passwordConfirmacion").value;

      if (!password || !confirmacion) {
        mostrarMensaje("error", "Debes completar la nueva contraseña y su confirmación.");
        return;
      }

      if (password !== confirmacion) {
        mostrarMensaje("error", "La nueva contraseña y su confirmación no coinciden.");
        return;
      }

      if (!validarPoliticaPassword(password)) {
        mostrarMensaje("error", "La contraseña debe tener al menos 8 caracteres e incluir una mayúscula, una minúscula, un número y un carácter especial.");
        return;
      }

      const boton = document.getElementById("btnGuardar");

      try {
        boton.disabled = true;
        boton.textContent = "Guardando...";

        const res = await fetch("/api/usuario/password-restablecer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token: tokenRecuperacion,
            password_nueva: password
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.ok) {
          mostrarMensaje("error", data?.error || "No se pudo restablecer la contraseña.");
          return;
        }

        mostrarMensaje("ok", data.mensaje || "Contraseña restablecida correctamente.");
        document.getElementById("password").value = "";
        document.getElementById("passwordConfirmacion").value = "";
        tokenValido = false;
        deshabilitarFormulario();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo restablecer la contraseña.");
      } finally {
        boton.textContent = "Guardar nueva contraseña";
      }
    }

    document.getElementById("formReset").addEventListener("submit", guardarNuevaPassword);
    document.getElementById("btnIrLogin").addEventListener("click", function () {
      location.href = "portal.html";
    });

    validarTokenInicial();
  </script>
</body>
</html>
