<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Restablecer contrase&ntilde;a</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --border: #dde4ea;
      --text: #222;
      --muted: #5f6d7a;
      --brand: #123a63;
      --primary: #0b5ed7;
      --primary-dark: #094db1;
      --ok-bg: #eaf7ea;
      --ok-text: #146c2e;
      --ok-border: #b9e0c0;
      --err-bg: #fdeaea;
      --err-text: #9b1c1c;
      --err-border: #f5c2c2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f6f8fb 0%, #eef3f8 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(18, 58, 99, 0.12);
      padding: 24px 24px 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      color: var(--brand);
    }

    .subtitulo {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #334250;
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 40px;
      padding: 8px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      margin-bottom: 12px;
    }

    .campo-password {
      position: relative;
      margin-bottom: 12px;
    }

    .campo-password input {
      margin-bottom: 0;
      padding-right: 50px;
    }

    .btn-toggle-password {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #5f6d7a;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .btn-toggle-password:hover {
      background: #f1f5f9;
      color: #123a63;
    }

    .btn-toggle-password svg {
      width: 18px;
      height: 18px;
      display: block;
      fill: currentColor;
    }

    input:disabled {
      background: #f7f9fb;
      color: #6b7785;
    }

    .nota {
      margin: -2px 0 14px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .mensaje {
      margin: 0 0 14px;
      padding: 11px 13px;
      border-radius: 8px;
      display: none;
      border: 1px solid transparent;
      line-height: 1.5;
      font-size: 13px;
    }

    .mensaje.ok {
      display: block;
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
    }

    .mensaje.error {
      display: block;
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
    }

    .acciones {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      transition: all 0.15s ease;
    }

    .btn:hover { background: var(--primary-dark); }

    .btn-secundario {
      background: #fff;
      color: #334250;
      border: 1px solid #c9cfd6;
    }

    .btn-secundario:hover {
      background: #f7f9fb;
    }
  </style>
  <link rel="stylesheet" href="assets/mobile-mensaje-flotante.css" />
</head>
<body>
  <div class="card">
    <h1>Restablecer contrase&ntilde;a</h1>
    <p class="subtitulo">Define una nueva contrase&ntilde;a segura para recuperar el acceso a tu cuenta.</p>

    <div id="mensaje" class="mensaje"></div>

    <form id="formReset" novalidate>
      <label for="email">Cuenta</label>
      <input type="email" id="email" disabled />

      <label for="password">Nueva contrase&ntilde;a</label>
      <div class="campo-password">
        <input type="password" id="password" autocomplete="new-password" required />
        <button type="button" class="btn-toggle-password" id="btnTogglePassword" aria-label="Mostrar contraseﾃｱa" title="Mostrar contraseﾃｱa"></button>
      </div>

      <label for="passwordConfirmacion">Confirmar nueva contrase&ntilde;a</label>
      <div class="campo-password">
        <input type="password" id="passwordConfirmacion" autocomplete="new-password" required />
        <button type="button" class="btn-toggle-password" id="btnTogglePasswordConfirmacion" aria-label="Mostrar contraseﾃｱa" title="Mostrar contraseﾃｱa"></button>
      </div>

      <p class="nota">La contrase&ntilde;a debe tener al menos 8 caracteres e incluir una may&uacute;scula, una min&uacute;scula, un n&uacute;mero y un car&aacute;cter especial.</p>

      <div class="acciones">
        <button type="submit" class="btn" id="btnGuardar">Guardar nueva contraseﾃｱa</button>
        <button type="button" class="btn btn-secundario" id="btnIrLogin">Ir al acceso</button>
      </div>
    </form>
  </div>

  <script>
    let tokenRecuperacion = "";
    let tokenValido = false;
    const ICONO_PASSWORD_VISIBLE = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g><path d="M61.9219,31.6118C61.8389,31.416,53.416,12,32,12S2.1611,31.416,2.0781,31.6118a1.005,1.005,0,0,0,0,.7764C2.1611,32.584,10.584,52,32,52S61.8389,32.584,61.9219,32.3882A1.005,1.005,0,0,0,61.9219,31.6118ZM32,50C13.5811,50,5.3828,34.6592,4.1016,32,5.3828,29.3408,13.5811,14,32,14S58.6172,29.3408,59.8984,32C58.6172,34.6592,50.4189,50,32,50Z"/><path d="M32,20A12,12,0,1,0,44,32,12.0137,12.0137,0,0,0,32,20Zm0,22A10,10,0,1,1,42,32,10.0111,10.0111,0,0,1,32,42Z"/></g></svg>`;
    const ICONO_PASSWORD_OCULTO = `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M5.992,18.611l-2.679,2.682c-0.39,0.391 -0.39,1.024 0,1.414c0.391,0.391 1.025,0.39 1.415,-0l3.027,-3.031c2.098,1.149 4.577,2.094 7.249,2.288l0.016,4.04c0.002,0.552 0.452,0.998 1.004,0.996c0.552,-0.002 0.998,-0.452 0.996,-1.004l-0.016,-4.033c2.281,-0.166 4.421,-0.88 6.302,-1.8c0.002,0.002 0.004,0.004 0.007,0.006l3.533,3.538c0.391,0.39 1.024,0.391 1.415,0c0.39,-0.39 0.39,-1.023 0,-1.414l-3.126,-3.13c3.415,-2.063 5.61,-4.496 5.61,-4.496c0.368,-0.411 0.333,-1.043 -0.078,-1.412c-0.411,-0.368 -1.043,-0.333 -1.412,0.078c0,-0 -5.93,6.667 -13.255,6.667c-7.325,0 -13.255,-6.667 -13.255,-6.667c-0.369,-0.411 -1.001,-0.446 -1.412,-0.078c-0.411,0.369 -0.446,1.001 -0.078,1.412c0,0 1.826,2.024 4.737,3.944Z"/></svg>`;

    function mostrarMensaje(tipo, texto) {
      const box = document.getElementById("mensaje");
      box.className = "mensaje " + tipo;
      box.textContent = texto;
    }

    function limpiarMensaje() {
      const box = document.getElementById("mensaje");
      box.className = "mensaje";
      box.textContent = "";
    }

    function validarPoliticaPassword(password) {
      const valor = String(password || "");
      if (valor.length < 8) return false;
      if (!/[A-Zﾃ⊋嘉催禿堙愿曽/.test(valor)) return false;
      if (!/[a-zﾃ｡ﾃｩﾃｭﾃｳﾃｺﾃｼﾃｱ]/.test(valor)) return false;
      if (!/[0-9]/.test(valor)) return false;
      if (!/[^A-Za-z0-9ﾃ⊋嘉催禿堙愿妥｡ﾃｩﾃｭﾃｳﾃｺﾃｼﾃｱ]/.test(valor)) return false;
      return true;
    }

    function deshabilitarFormulario() {
      document.getElementById("password").disabled = true;
      document.getElementById("passwordConfirmacion").disabled = true;
      document.getElementById("btnGuardar").disabled = true;
    }

    function actualizarBotonTogglePassword(inputId, buttonId) {
      const input = document.getElementById(inputId);
      const button = document.getElementById(buttonId);
      const visible = input.type === "text";

      button.innerHTML = visible ? ICONO_PASSWORD_VISIBLE : ICONO_PASSWORD_OCULTO;
      button.setAttribute("aria-label", visible ? "Ocultar contraseﾃｱa" : "Mostrar contraseﾃｱa");
      button.setAttribute("title", visible ? "Ocultar contraseﾃｱa" : "Mostrar contraseﾃｱa");
    }

    function alternarPassword(inputId, buttonId) {
      const input = document.getElementById(inputId);
      input.type = input.type === "password" ? "text" : "password";
      actualizarBotonTogglePassword(inputId, buttonId);
    }

    async function validarTokenInicial() {
      tokenRecuperacion = new URLSearchParams(window.location.search).get("token") || "";

      if (!tokenRecuperacion) {
        deshabilitarFormulario();
        mostrarMensaje("error", "Falta el token de recuperaciﾃｳn.");
        return;
      }

      try {
        const res = await fetch(`/api/usuario/password-restablecer?token=${encodeURIComponent(tokenRecuperacion)}`);
        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.ok) {
          deshabilitarFormulario();
          mostrarMensaje("error", data?.error || "El enlace de recuperaciﾃｳn no es vﾃ｡lido o ha caducado.");
          return;
        }

        tokenValido = true;
        document.getElementById("email").value = data.email || "";
      } catch (error) {
        deshabilitarFormulario();
        mostrarMensaje("error", error.message || "No se pudo validar el enlace de recuperaciﾃｳn.");
      }
    }

    async function guardarNuevaPassword(event) {
      event.preventDefault();
      limpiarMensaje();

      if (!tokenValido) {
        mostrarMensaje("error", "El enlace de recuperaciﾃｳn no es vﾃ｡lido o ha caducado.");
        return;
      }

      const password = document.getElementById("password").value;
      const confirmacion = document.getElementById("passwordConfirmacion").value;

      if (!password || !confirmacion) {
        mostrarMensaje("error", "Debes completar la nueva contraseﾃｱa y su confirmaciﾃｳn.");
        return;
      }

      if (password !== confirmacion) {
        mostrarMensaje("error", "La nueva contraseﾃｱa y su confirmaciﾃｳn no coinciden.");
        return;
      }

      if (!validarPoliticaPassword(password)) {
        mostrarMensaje("error", "La contraseﾃｱa debe tener al menos 8 caracteres e incluir una mayﾃｺscula, una minﾃｺscula, un nﾃｺmero y un carﾃ｡cter especial.");
        return;
      }

      const boton = document.getElementById("btnGuardar");

      try {
        boton.disabled = true;
        boton.textContent = "Guardando...";

        const res = await fetch("/api/usuario/password-restablecer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token: tokenRecuperacion,
            password_nueva: password
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.ok) {
          mostrarMensaje("error", data?.error || "No se pudo restablecer la contraseﾃｱa.");
          return;
        }

        mostrarMensaje("ok", data.mensaje || "Contraseﾃｱa restablecida correctamente.");
        document.getElementById("password").value = "";
        document.getElementById("passwordConfirmacion").value = "";
        tokenValido = false;
        deshabilitarFormulario();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo restablecer la contraseﾃｱa.");
      } finally {
        boton.textContent = "Guardar nueva contraseﾃｱa";
      }
    }

    document.getElementById("formReset").addEventListener("submit", guardarNuevaPassword);
    document.getElementById("btnTogglePassword").addEventListener("click", function () {
      alternarPassword("password", "btnTogglePassword");
    });
    document.getElementById("btnTogglePasswordConfirmacion").addEventListener("click", function () {
      alternarPassword("passwordConfirmacion", "btnTogglePasswordConfirmacion");
    });
    document.getElementById("btnIrLogin").addEventListener("click", function () {
      location.href = "portal.html";
    });

    actualizarBotonTogglePassword("password", "btnTogglePassword");
    actualizarBotonTogglePassword("passwordConfirmacion", "btnTogglePasswordConfirmacion");
    validarTokenInicial();
  </script>
  <script src="assets/mobile-mensaje-flotante.js"></script>
</body>
</html>
