<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuentas de SECRETARÍA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/superadmin-theme.css">
  <link rel="stylesheet" href="assets/fondo-cabecera-movil-unificado.css">
  <style>
    .cabecera-seccion {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .cabecera-seccion h2 { margin: 0; color: #123a63; font-size: 24px; }
    #logoCabecera { width: 120px; height: auto; }
    .super-titulos h1 { font-size: 24px; line-height: 1.15; }
    .super-titulos h2 { font-size: 14px; line-height: 1.15; }
    .cabecera-seccion p { margin: 4px 0 0; color: #5f6d7a; font-size: 13px; line-height: 1.4; }
    .acciones-seccion { display: flex; gap: 10px; align-items: center; }
    .btn-volver-circulo {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid #c9cfd6;
      background: #fff;
      color: #5b6d7f;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: all .15s ease;
    }
    .btn-volver-circulo svg { width: 16px; height: 16px; display: block; }
    .btn-volver-circulo:hover { background: #f7f9fb; border-color: #aebdcd; color: #123a63; }
    .btn-futuro {
      border: 1px dashed #b6c4d3;
      color: #7a8795;
      background: #f8fafc;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      cursor: not-allowed;
    }
    .tabla-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid #dde4ea; background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5ebf0; text-align: left; font-size: 13px; vertical-align: middle; }
    thead th { background: #f7f9fb; color: #35506a; font-size: 12px; text-transform: uppercase; letter-spacing: .02em; }
    .tabla-wrap th:nth-child(1), .tabla-wrap td:nth-child(1) { width: 38%; }
    .tabla-wrap th:nth-child(2), .tabla-wrap td:nth-child(2) { width: 24%; }
    .tabla-wrap th:nth-child(3), .tabla-wrap td:nth-child(3) { width: 14%; white-space: nowrap; }
    .tabla-wrap th:nth-child(4), .tabla-wrap td:nth-child(4) { width: 10%; text-align: center; }
    .tabla-wrap th:nth-child(5), .tabla-wrap td:nth-child(5) { width: 14%; white-space: nowrap; text-align: center; }
    .fila-seleccionada { background: #eef5ff; }
    .fila-secretaria { cursor: pointer; transition: background .15s ease; }
    .fila-secretaria:hover { background: #f8fbff; }
    .btn-icono-circulo {
      width: 36px; height: 36px; border-radius: 999px; border: 1px solid #c9cfd6; background: #fff; color: #9b1c1c;
      display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; transition: all .15s ease;
    }
    .btn-icono-circulo:hover { background: #fff6f6; border-color: #e0b4b4; }
    .btn-icono-circulo:disabled { opacity: .45; cursor: not-allowed; }
    .btn-icono-circulo svg { width: 17px; height: 17px; display: block; }
    .estado-switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      vertical-align: middle;
    }
    .estado-switch input { opacity: 0; width: 0; height: 0; }
    .estado-slider {
      position: absolute;
      inset: 0;
      background-color: #c7d0da;
      border-radius: 999px;
    }
    .estado-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    .estado-switch input:checked + .estado-slider { background: #2db95b; }
    .estado-switch input:checked + .estado-slider::before { transform: translateX(16px); }
    .mensaje { display:none; border-radius:10px; padding:10px 12px; margin-bottom:10px; font-size:13px; }
    .mensaje.ok { display:block; background:#eaf7ea; color:#146c2e; }
    .mensaje.error { display:block; background:#fdeaea; color:#9b1c1c; }
    @media (max-width: 760px) {
      .cabecera-seccion h2 { font-size: 20px; }
      .super-titulos h1 { font-size: 21px; }
      .super-titulos h2 { font-size: 14px; }
      .tabla-wrap { overflow: visible; border: none; background: transparent; }
      .tabla-wrap table, .tabla-wrap thead, .tabla-wrap tbody, .tabla-wrap tr, .tabla-wrap th, .tabla-wrap td { display: block; width: 100%; }
      .tabla-wrap thead { display: none; }
      .tabla-wrap tbody { display: grid; gap: 10px; }
      .tabla-wrap tr { border: 1px solid #dde4ea; border-radius: 16px; background: #fff; padding: 12px; }
      .tabla-wrap td { border: none; padding: 0; display:grid; grid-template-columns:minmax(108px,40%) 1fr; gap:10px; align-items:start; }
      .tabla-wrap td + td { margin-top: 8px; }
      .tabla-wrap td::before { content: attr(data-label); color:#5f6d7a; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; }
    }
  </style>
</head>
<body class="superadmin-body fondo-cabecera-unificada">
  <header class="super-cabecera">
    <div class="super-cabecera-inner">
      <div class="super-bloque-marca">
        <img src="" alt="Organizador" class="super-logo" id="logoCabecera">
        <div class="super-titulos">
          <h1 id="tituloCabecera">Cuentas de SECRETARÍA</h1>
          <h2 id="subtituloCabecera">Administrador</h2>
        </div>
      </div>
    </div>
  </header>

  <main class="super-shell">
    <section class="super-franja">
      <div class="super-franja-texto">
        <h3>Gestión de cuentas de Secretaría</h3>
        <p>Pertenece al comité documental.</p>
      </div>
      <button type="button" class="btn-volver-circulo" id="btnVolverPerfil" title="Volver al perfil" aria-label="Volver al perfil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
      </button>
    </section>

    <section class="super-card">
      <div class="cabecera-seccion">
        <div>
          <h2 style="font-size:24px;">Listado de cuentas de Secretaría</h2>
          <p>Aquí se muestran únicamente las cuentas vinculadas a tu sesión de administrador.</p>
        </div>
        <div class="acciones-seccion">
          <button type="button" class="btn-futuro" disabled title="Pendiente de definir formulario">Nueva cuenta (pendiente)</button>
          <button type="button" class="btn-icono-circulo" id="btnEliminarSecretaria" disabled title="Eliminar cuenta seleccionada" aria-label="Eliminar cuenta seleccionada">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M6 6l1 14h10l1-14"></path><path d="M10 10v7"></path><path d="M14 10v7"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="mensajePantalla" class="mensaje"></div>
      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Estado</th>
              <th>Fecha de alta</th>
            </tr>
          </thead>
          <tbody id="tablaSecretarias"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    let secretarias = [];
    let secretariaSeleccionada = null;

    function escapeHtml(valor) {
      return String(valor || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatearFecha(valor) {
      if (!valor) return "-";
      const fecha = new Date(String(valor).replace(" ", "T"));
      if (Number.isNaN(fecha.getTime())) return String(valor);
      return fecha.toLocaleDateString("es-ES");
    }

    function mostrarMensaje(tipo, texto) {
      const box = document.getElementById("mensajePantalla");
      box.className = `mensaje ${tipo}`;
      box.textContent = texto;
    }

    function limpiarMensaje() {
      const box = document.getElementById("mensajePantalla");
      box.className = "mensaje";
      box.textContent = "";
    }

    function actualizarAcciones() {
      document.getElementById("btnEliminarSecretaria").disabled = !secretariaSeleccionada;
    }

    function seleccionarSecretaria(id) {
      secretariaSeleccionada = secretarias.find((item) => Number(item.id) === Number(id)) || null;
      renderTabla();
      actualizarAcciones();
    }

    function renderTabla() {
      const tbody = document.getElementById("tablaSecretarias");
      if (!secretarias.length) {
        tbody.innerHTML = `<tr><td colspan="5">No hay cuentas de secretaría vinculadas a este administrador.</td></tr>`;
        return;
      }
      tbody.innerHTML = secretarias.map((item) => `
        <tr class="fila-secretaria ${secretariaSeleccionada && Number(secretariaSeleccionada.id) === Number(item.id) ? "fila-seleccionada" : ""}" onclick="seleccionarSecretaria(${Number(item.id)})">
          <td data-label="Nombre">${escapeHtml(item.nombre_publico || item.nombre || `Secretaría ${item.id}`)}</td>
          <td data-label="Email">${escapeHtml(item.email || "-")}</td>
          <td data-label="Teléfono">${escapeHtml(item.telefono_contacto || "-")}</td>
          <td data-label="Estado">
            <label class="estado-switch" aria-label="Estado de cuenta">
              <input type="checkbox" ${Number(item.activo || 0) === 1 ? "checked" : ""} disabled>
              <span class="estado-slider"></span>
            </label>
          </td>
          <td data-label="Fecha de alta">${formatearFecha(item.fecha_alta)}</td>
        </tr>
      `).join("");
    }

    async function cargarSecretarias() {
      limpiarMensaje();
      const res = await fetch("/api/admin/secretarias-gestion", { credentials: "include" });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data?.ok) {
        throw new Error(data?.error || "No se pudieron cargar las cuentas de secretaría.");
      }
      secretarias = Array.isArray(data.secretarias) ? data.secretarias : [];
      if (secretariaSeleccionada) {
        secretariaSeleccionada = secretarias.find((item) => Number(item.id) === Number(secretariaSeleccionada.id)) || null;
      }
      renderTabla();
      actualizarAcciones();
    }

    async function cargarCabeceraPerfil() {
      try {
        const params = new URLSearchParams(window.location.search);
        const nombreDesdeUrl = String(params.get("admin_nombre_publico") || "").trim();
        const logoDesdeUrl = String(params.get("admin_logo") || "").trim();
        if (nombreDesdeUrl) {
          document.getElementById("subtituloCabecera").textContent = nombreDesdeUrl;
        }
        if (logoDesdeUrl) {
          document.getElementById("logoCabecera").src = logoDesdeUrl;
        }

        const res = await fetch("/api/usuario/perfil", { credentials: "include" });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.ok || !data?.perfil) return;
        const perfil = data.perfil || {};
        const subtitulo = perfil.nombre_publico || perfil.nombre || "Administrador";
        document.getElementById("subtituloCabecera").textContent = String(subtitulo);
        if (perfil.logo_url) {
          document.getElementById("logoCabecera").src = perfil.logo_url;
        } else if (!document.getElementById("logoCabecera").src) {
          document.getElementById("logoCabecera").src = "logo.png";
        }
      } catch (_) {}
    }

    async function eliminarSecretariaSeleccionada() {
      if (!secretariaSeleccionada) return;
      const nombre = secretariaSeleccionada.nombre_publico || secretariaSeleccionada.nombre || "esta secretaría";
      const confirmar = window.confirm(`Se desactivará la cuenta ${nombre}. ¿Deseas continuar?`);
      if (!confirmar) return;

      const res = await fetch("/api/admin/secretarias-gestion", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ secretaria_usuario_id: Number(secretariaSeleccionada.id) })
      });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data?.ok) {
        throw new Error(data?.error || "No se pudo eliminar la cuenta de secretaría.");
      }

      secretarias = Array.isArray(data.secretarias) ? data.secretarias : [];
      secretariaSeleccionada = null;
      renderTabla();
      actualizarAcciones();
      mostrarMensaje("ok", data.mensaje || "Cuenta eliminada.");
    }

    document.getElementById("btnVolverPerfil").addEventListener("click", () => {
      window.location.href = "usuario-perfil.html";
    });
    document.getElementById("btnEliminarSecretaria").addEventListener("click", async () => {
      try {
        await eliminarSecretariaSeleccionada();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo eliminar la cuenta de secretaría.");
      }
    });
    window.seleccionarSecretaria = seleccionarSecretaria;

    (async function init() {
      await cargarCabeceraPerfil();
      try {
        await cargarSecretarias();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo cargar la pantalla.");
      }
    })();
  </script>
</body>
</html>
