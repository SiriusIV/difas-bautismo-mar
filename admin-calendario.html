<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario administrativo</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.78) 12%, rgba(255,255,255,0.42) 26%, rgba(255,255,255,0.18) 42%, rgba(255,255,255,0.10) 100%),
        linear-gradient(180deg, rgba(244,246,248,0.18) 0%, rgba(244,246,248,0.24) 100%),
        url("assets/fondo_cabecera.png") top center / 100% auto no-repeat,
        #f4f6f8;
      background-blend-mode: normal, screen, normal;
      margin: 0;
      padding: 0;
      color: #222;
      overflow-x: hidden;
    }

    .contenedor {
      max-width: 1240px;
      margin: 0 auto;
      background: transparent;
      padding: 16px 20px 20px;
      border-radius: 0;
      box-shadow: none;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      color: #123a63;
      line-height: 1.15;
    }

    h2 {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: normal;
      color: #4a5a6a;
    }

    .cabecera {
      position: relative;
      min-height: 96px;
      margin-bottom: 10px;
      border-bottom: none;
      padding: 2px 0 8px;
      background: transparent;
    }

    .logo {
      position: absolute;
      left: 0;
      top: 0;
      width: 77px;
      height: auto;
      transition: opacity 0.12s ease;
    }
    .logo.logo-admin-personal { width: 77px; }
    .logo.logo-pendiente { opacity: 0; }

    .cabecera-centro {
      text-align: center;
      padding: 0 150px 0 150px;
    }

    .subactividad {
      margin-top: 8px;
      font-size: 13px;
      color: #4a5a6a;
      text-align: center;
    }

    .nav-admin {
      margin-top: 14px;
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .nav-admin a,
    .nav-admin span {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #1e2a36;
      text-decoration: none;
      font-size: 13px;
      line-height: 1;
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .nav-admin a:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }

    .nav-admin .activo {
      background: #0b5ed7;
      color: #fff;
      border-color: #0b5ed7;
      cursor: default;
    }

    .cabecera-acciones {
      position: absolute;
      right: 0;
      top: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-icono {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .btn-icono:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }

    .btn-icono svg {
      width: 16px;
      height: 16px;
    }

    .panel {
      background: #fff;
      border: 1px solid rgba(221,228,234,0.95);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .mensaje {
      margin-top: 16px;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .mensaje.info {
      display: block;
      background: #eef4ff;
      color: #1d4f91;
      border: 1px solid #c9dcff;
    }

    .filtros {
      display: grid;
      grid-template-columns: 240px 290px 156px 176px;
      gap: 10px;
      align-items: end;
    }

    .selector-vista {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .selector-vista button {
      flex: 1 1 0;
      width: auto;
      background: #fff;
      color: #1d4f91;
      border: 1px solid #c9dcff;
      font-weight: 600;
      min-height: 40px;
      height: 40px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .selector-vista button.activo {
      background: #0b5ed7;
      color: #fff;
      border-color: #0b5ed7;
    }

    .oculto {
      display: none !important;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      margin: 0;
      min-height: 40px;
      font-size: 13px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      font-size: 13px;
    }

    select, input, button, .btn-enlace {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
    }

    button, .btn-enlace {
      background: #0b5ed7;
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    button:hover, .btn-enlace:hover {
      background: #094db1;
    }

    button:disabled {
      background: #7aa7e8;
      cursor: not-allowed;
    }

    .btn-secundario {
      background: #6c757d;
      color: white;
    }

    .btn-secundario:hover {
      background: #565e64;
    }

    .btn-confirmar {
      background: #198754;
      color: white;
    }

    .btn-confirmar:hover {
      background: #13653f;
    }

    .resumen-estados {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .tarjeta-estado {
      background: #fff;
      border: 1px solid #dde4ea;
      border-radius: 10px;
      padding: 10px 11px;
    }

    .tarjeta-estado .etiqueta {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }

    .tarjeta-estado .valor {
      font-size: 20px;
      font-weight: bold;
    }

    .leyenda {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .leyenda-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .leyenda-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: inline-block;
    }

    #calendar {
      background: white;
      border-radius: 10px;
      padding: 8px;
    }

    .fc .fc-toolbar.fc-header-toolbar {
      margin-bottom: 1.1em;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .fc-toolbar-chunk {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fc .fc-toolbar-title {
      font-size: 1.45rem;
    }

    .fc .fc-button {
      padding: 0.5em 0.85em;
      font-size: 0.95rem;
    }

    .modal-fondo {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal-fondo.activo {
      display: flex;
    }

    .modal {
      background: #fff;
      width: 100%;
      max-width: 720px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 24px;
    }

    .modal h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 24px;
    }

    .detalle {
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .detalle-bloque {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .acciones-modal {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .bloque-estado {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }

    .fila-estado {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      align-items: end;
    }

    .estado {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .estado.pendiente { background: #d39e00; }
    .estado.confirmada { background: #198754; }
    .estado.rechazada { background: #dc3545; }
    .estado.suspendida { background: #b7791f; }

    @media (max-width: 1200px) {
      .cabecera-centro {
        padding: 120px 0 0 0;
      }

      .logo {
        position: static;
        display: block;
        margin: 0 auto 12px auto;
      }

      .cabecera-acciones {
        position: static;
        justify-content: center;
        margin-top: 14px;
      }

      .cabecera {
        min-height: auto;
      }
    }

    @media (max-width: 1100px) {
      .filtros {
        grid-template-columns: 1fr;
      }

      .fila-estado {
        grid-template-columns: 1fr;
      }

      .resumen-estados {
        grid-template-columns: 1fr 1fr;
      }

      .fc .fc-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .fc .fc-toolbar.fc-header-toolbar {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor" id="app" style="display:none;">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo logo-pendiente">

      <div class="cabecera-centro">
        <h1 id="tituloEvento">Cargando evento...</h1>
        <h2 id="subtituloEvento">Calendario administrativo</h2>
        <div class="subactividad">Bautismos de mar</div>

        <div class="nav-admin">
          <a href="admin-reservas.html">Reservas</a>
          <span class="activo">Calendario</span>
        </div>
      </div>

      <div class="cabecera-acciones">
        <button
          type="button"
          id="btnRecargarIcono"
          class="btn-icono"
          title="Recargar calendario"
          aria-label="Recargar calendario"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <polyline points="21 3 21 9 15 9"></polyline>
          </svg>
        </button>

        <button
          type="button"
          id="btnCerrarSesion"
          class="btn-icono"
          title="Cerrar sesión"
          aria-label="Cerrar sesión"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

      <div class="panel">
        <div class="filtros">
          <div>
            <label>Vista</label>
            <div class="selector-vista">
              <button type="button" id="btnVistaSolicitudes" class="activo">Solicitudes</button>
              <button type="button" id="btnVistaActividades">Actividades programadas</button>
            </div>
          </div>

          <div id="bloqueFiltroEstado">
            <label for="filtroEstado">Estado</label>
            <select id="filtroEstado">
              <option value="">PENDIENTE + CONFIRMADA</option>
              <option value="PENDIENTE">Solo PENDIENTE</option>
              <option value="CONFIRMADA">Solo CONFIRMADA</option>
              <option value="SUSPENDIDA">Solo SUSPENDIDA</option>
              <option value="RECHAZADA">Solo RECHAZADA</option>
            </select>
          </div>

          <div id="bloqueChkRechazadas">
            <label class="checkbox-label">
              <input type="checkbox" id="chkRechazadas">
              Incluir rechazadas
            </label>
          </div>
        </div>
      </div>

      <div class="panel" id="panelResumenReservas">
        <div class="resumen-estados" id="bloqueResumenEstados">
          <div class="tarjeta-estado">
            <div class="etiqueta">Pendientes</div>
            <div class="valor" id="contadorPendientes">0</div>
        </div>
        <div class="tarjeta-estado">
          <div class="etiqueta">Confirmadas</div>
          <div class="valor" id="contadorConfirmadas">0</div>
        </div>
        <div class="tarjeta-estado">
          <div class="etiqueta">Suspendidas</div>
          <div class="valor" id="contadorSuspendidas">0</div>
        </div>
        <div class="tarjeta-estado">
          <div class="etiqueta">Rechazadas</div>
          <div class="valor" id="contadorRechazadas">0</div>
        </div>
      </div>

        <div class="leyenda" id="bloqueLeyendaReservas">
          <span class="leyenda-item"><span class="leyenda-color" style="background:#d39e00;"></span>PENDIENTE</span>
          <span class="leyenda-item"><span class="leyenda-color" style="background:#198754;"></span>CONFIRMADA</span>
          <span class="leyenda-item"><span class="leyenda-color" style="background:#b7791f;"></span>SUSPENDIDA</span>
          <span class="leyenda-item"><span class="leyenda-color" style="background:#dc3545;"></span>RECHAZADA</span>
          <span class="leyenda-item oculto" id="leyendaActividadDisponible"><span class="leyenda-color" style="background:#0b5ed7;"></span>DISPONIBLE</span>
          <span class="leyenda-item oculto" id="leyendaActividadUltimas"><span class="leyenda-color" style="background:#d97706;"></span>ÚLTIMAS PLAZAS</span>
          <span class="leyenda-item oculto" id="leyendaActividadCompleta"><span class="leyenda-color" style="background:#dc3545;"></span>COMPLETA</span>
          <span class="leyenda-item oculto" id="leyendaActividadFinalizada"><span class="leyenda-color" style="background:#5f6d7a;"></span>FINALIZADA</span>
        </div>

      <div id="calendar"></div>
    </div>
  </div>

  <div id="modalEvento" class="modal-fondo" aria-hidden="true">
    <div class="modal">
      <h3 id="modalTitulo">Detalle de solicitud</h3>

      <div id="modalDetalle" class="detalle"></div>

        <div class="bloque-estado" id="bloqueEstadoReserva">
          <div class="fila-estado">
            <div>
              <label for="selectEstadoDestino">Cambiar estado</label>
            <select id="selectEstadoDestino"></select>
          </div>
          <div>
            <button type="button" id="btnAplicarEstado" class="btn-confirmar">Aplicar cambio</button>
          </div>
        </div>
      </div>

        <div class="acciones-modal" id="accionesModalReserva">
          <a href="#" id="btnAbrirEditar" class="btn-enlace" target="_blank">Editar</a>
          <a href="#" id="btnAbrirAsistentes" class="btn-enlace btn-secundario" target="_blank">Asistentes</a>
          <button type="button" id="btnCerrarModal" class="btn-secundario">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script>
    let calendar;
    let eventoSeleccionado = null;
    let accionEnCurso = false;
    let fechaInicialCalendario = null;
    let vistaCalendarioActual = "reservas";
    async function aplicarLogoCabeceraAdmin() {
      const logo = document.querySelector(".logo");
      if (!logo) return;
      try {
        const response = await fetch("/api/usuario/session", { credentials: "same-origin" });
        const data = await response.json().catch(() => null);
        const user = data?.user;
        const logoUsuario = String(user?.logo_url || "").trim();
        logo.classList.remove("logo-admin-personal");
        if (logoUsuario) logo.src = logoUsuario;
        else logo.src = "logo.png";
        if (logoUsuario) logo.classList.add("logo-admin-personal");
      } catch (_) {}
      logo.classList.remove("logo-pendiente");
    }

    function redirigirLogin() {
      const next = encodeURIComponent(window.location.pathname);
      window.location.href = `admin-login.html?next=${next}`;
    }

    async function comprobarSesionAdmin() {
      const response = await fetch("/api/admin/session", {
        method: "GET",
        credentials: "same-origin"
      });

      if (!response.ok) {
        redirigirLogin();
        return false;
      }

      return true;
    }

    async function cerrarSesion() {
      try {
        await fetch("/api/admin/logout", {
          method: "POST",
          credentials: "same-origin"
        });
      } catch {}

      redirigirLogin();
    }

    function mostrarMensaje(tipo, texto) {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje " + tipo;
      mensaje.style.display = "block";
      mensaje.textContent = texto;
    }

    function limpiarMensaje() {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje";
      mensaje.style.display = "none";
      mensaje.textContent = "";
    }

    function formatearFechaHora(valor) {
      if (!valor) return "No disponible";
      return String(valor).replace("T", " ");
    }

    async function cargarConfigEvento() {
      try {
        const response = await fetch("/api/config-evento", {
          credentials: "same-origin"
        });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar la configuración del evento.");
        }

        const config = data.config || {};

        document.title = "Calendario administrativo";
        document.getElementById("tituloEvento").textContent = config.nombre_evento || "Evento no configurado";
        document.getElementById("subtituloEvento").textContent = "Calendario administrativo";
      } catch (error) {
        console.error(error);
        document.getElementById("tituloEvento").textContent = "Evento no disponible";
      }
    }

    function aplicarVistaCalendario(vista, { recargar = true } = {}) {
      vistaCalendarioActual = vista === "actividades" ? "actividades" : "reservas";

      const esVistaActividades = vistaCalendarioActual === "actividades";
      document.getElementById("btnVistaSolicitudes").classList.toggle("activo", !esVistaActividades);
      document.getElementById("btnVistaActividades").classList.toggle("activo", esVistaActividades);
      document.getElementById("bloqueFiltroEstado").classList.toggle("oculto", esVistaActividades);
      document.getElementById("bloqueChkRechazadas").classList.toggle("oculto", esVistaActividades);
      document.getElementById("bloqueResumenEstados").classList.toggle("oculto", esVistaActividades);
      document.getElementById("leyendaActividadDisponible").classList.toggle("oculto", !esVistaActividades);
      document.getElementById("leyendaActividadUltimas").classList.toggle("oculto", !esVistaActividades);
      document.getElementById("leyendaActividadCompleta").classList.toggle("oculto", !esVistaActividades);
      document.getElementById("leyendaActividadFinalizada").classList.toggle("oculto", !esVistaActividades);

      if (recargar && calendar) {
        limpiarMensaje();
        calendar.refetchEvents();
        void actualizarContadores();
      }
    }

    async function obtenerFechaInicialConEventos() {
      try {
        const params = new URLSearchParams();
        params.set("start", "2000-01-01");
        params.set("end", "2100-12-31");
        params.set("vista", vistaCalendarioActual);

        if (vistaCalendarioActual === "reservas") {
          const estado = document.getElementById("filtroEstado").value;
          const incluirRechazadas = document.getElementById("chkRechazadas").checked;

          if (estado) {
            params.set("estado", estado);
          } else if (incluirRechazadas) {
            params.set("incluir_rechazadas", "1");
          }
        }

        const response = await fetch(`/api/admin/calendario?${params.toString()}`, {
          credentials: "same-origin"
        });

        if (response.status === 401) {
          redirigirLogin();
          return null;
        }

        const data = await response.json();

        if (!response.ok || !data.ok) {
          return null;
        }

        const eventos = Array.isArray(data.eventos) ? data.eventos : [];
        if (!eventos.length) return null;

        eventos.sort((a, b) => new Date(a.start) - new Date(b.start));
        return eventos[0].start.slice(0, 10);
      } catch {
        return null;
      }
    }

    async function actualizarContadores() {
      if (vistaCalendarioActual !== "reservas") {
        document.getElementById("contadorPendientes").textContent = "0";
        document.getElementById("contadorConfirmadas").textContent = "0";
        document.getElementById("contadorSuspendidas").textContent = "0";
        document.getElementById("contadorRechazadas").textContent = "0";
        return;
      }

      try {
        const params = new URLSearchParams();
        params.set("start", "2000-01-01");
        params.set("end", "2100-12-31");
        params.set("incluir_rechazadas", "1");
        params.set("vista", "reservas");

        const response = await fetch(`/api/admin/calendario?${params.toString()}`, {
          credentials: "same-origin"
        });

        if (!response.ok) return;

        const data = await response.json();
        const eventos = Array.isArray(data.eventos) ? data.eventos : [];

        const pendientes = eventos.filter(e => e.extendedProps?.estado === "PENDIENTE").length;
        const confirmadas = eventos.filter(e => e.extendedProps?.estado === "CONFIRMADA").length;
        const suspendidas = eventos.filter(e => e.extendedProps?.estado === "SUSPENDIDA").length;
        const rechazadas = eventos.filter(e => e.extendedProps?.estado === "RECHAZADA").length;

        document.getElementById("contadorPendientes").textContent = pendientes;
        document.getElementById("contadorConfirmadas").textContent = confirmadas;
        document.getElementById("contadorSuspendidas").textContent = suspendidas;
        document.getElementById("contadorRechazadas").textContent = rechazadas;
      } catch {
      }
    }

    function opcionesEstadoPara(estadoActual) {
      const opciones = [{ value: "", label: "Sin cambio" }];

      if (estadoActual === "PENDIENTE") {
        opciones.push({ value: "confirmar", label: "Pasar a CONFIRMADA" });
        opciones.push({ value: "rechazar", label: "Pasar a RECHAZADA" });
      } else if (estadoActual === "CONFIRMADA") {
        opciones.push({ value: "reabrir", label: "Pasar a PENDIENTE" });
      } else if (estadoActual === "SUSPENDIDA") {
        opciones.push({ value: "rechazar", label: "Pasar a RECHAZADA" });
      } else if (estadoActual === "RECHAZADA") {
        opciones.push({ value: "reabrir", label: "Pasar a PENDIENTE" });
      }

      return opciones;
    }

    function cargarSelectorEstado(estadoActual) {
      const select = document.getElementById("selectEstadoDestino");
      select.innerHTML = "";

      opcionesEstadoPara(estadoActual).forEach(op => {
        const option = document.createElement("option");
        option.value = op.value;
        option.textContent = op.label;
        select.appendChild(option);
      });
    }

    function abrirModalEvento(info) {
      eventoSeleccionado = info.event;
      const p = info.event.extendedProps;
      const tipoEvento = p.tipo_evento || "RESERVA";
      const bloqueEstado = document.getElementById("bloqueEstadoReserva");
      const btnEditar = document.getElementById("btnAbrirEditar");
      const btnAsistentes = document.getElementById("btnAbrirAsistentes");
      const estadoClass = String(p.estado || "").toLowerCase();

      if (tipoEvento === "ACTIVIDAD_PROGRAMADA") {
        const actividadId = Number(p.actividad_id || 0);
        if (actividadId > 0) {
          window.location.href = `admin-actividades.html?id=${encodeURIComponent(actividadId)}`;
          return;
        }
        document.getElementById("modalTitulo").textContent = p.actividad_nombre || info.event.title || "Actividad programada";
        document.getElementById("modalDetalle").innerHTML = `
          <div class="detalle-bloque">
            <strong>Organiza:</strong> ${p.organizador_publico || ""}<br>
            <strong>Lugar:</strong> ${p.lugar || ""}<br>
            <strong>Fecha:</strong> ${p.fecha || ""}<br>
            <strong>Horario:</strong> ${p.hora_inicio || ""} - ${p.hora_fin || ""}<br>
            <strong>Estado:</strong> ${p.estado_actividad || "DISPONIBLE"}<br>
            <strong>Capacidad:</strong> ${p.capacidad || 0}<br>
            <strong>Plazas disponibles:</strong> ${p.disponibles || 0}
          </div>
        `;
        bloqueEstado.classList.add("oculto");
        btnEditar.classList.add("oculto");
        btnAsistentes.classList.add("oculto");
        document.getElementById("modalEvento").classList.add("activo");
        document.getElementById("modalEvento").setAttribute("aria-hidden", "false");
        return;
      }

      const plazasReservadasPendientes = Number(p.plazas_reservadas || 0);
      const plazasAsignadas = Number(p.plazas_asignadas || 0);
      const plazasLibresFranja = Number(p.disponibles || 0);
      const observaciones = p.observaciones && String(p.observaciones).trim()
        ? p.observaciones
        : "Sin observaciones";

      document.getElementById("modalTitulo").textContent = p.codigo_reserva || "Detalle de solicitud";
      document.getElementById("modalDetalle").innerHTML = `
        <div class="detalle-bloque">
          <strong>Estado:</strong> <span class="estado ${estadoClass}">${p.estado}</span><br>
          <strong>Centro:</strong> ${p.centro || ""}<br>
          <strong>Contacto:</strong> ${p.contacto || ""}<br>
          <strong>Teléfono:</strong> ${p.telefono || ""}<br>
          <strong>Email:</strong> ${p.email || ""}<br>
          <strong>Franja:</strong> ${p.fecha} · ${p.hora_inicio} - ${p.hora_fin}<br>
          <strong>Capacidad de franja:</strong> ${p.capacidad || 0}
        </div>

        <div class="detalle-bloque">
          <strong>Plazas reservadas pendientes:</strong> ${plazasReservadasPendientes}<br>
          <strong>Plazas asignadas:</strong> ${plazasAsignadas}<br>
          <strong>Plazas libres en la franja:</strong> ${plazasLibresFranja}<br>
          <strong>Expira:</strong> ${formatearFechaHora(p.prereserva_expira_en)}
        </div>

        <div class="detalle-bloque">
          <strong>Observaciones:</strong><br>${observaciones}
        </div>
      `;

      btnEditar.href = `editar.html?token=${encodeURIComponent(p.token_edicion)}`;
      btnAsistentes.href = `asistentes.html?token=${encodeURIComponent(p.token_edicion)}`;
      bloqueEstado.classList.remove("oculto");
      btnEditar.classList.remove("oculto");
      btnAsistentes.classList.remove("oculto");

      cargarSelectorEstado(p.estado);

      document.getElementById("modalEvento").classList.add("activo");
      document.getElementById("modalEvento").setAttribute("aria-hidden", "false");
    }

    function cerrarModalEvento() {
      eventoSeleccionado = null;
      document.getElementById("modalEvento").classList.remove("activo");
      document.getElementById("modalEvento").setAttribute("aria-hidden", "true");
    }

    async function ejecutarAccionDesdeModal() {
      if (!eventoSeleccionado || accionEnCurso) return;
      if ((eventoSeleccionado.extendedProps?.tipo_evento || "RESERVA") !== "RESERVA") {
        cerrarModalEvento();
        return;
      }

      const accion = document.getElementById("selectEstadoDestino").value;
      if (!accion) {
        cerrarModalEvento();
        return;
      }

      let textoConfirmacion = "¿Desea ejecutar esta acción?";
      if (accion === "confirmar") textoConfirmacion = "¿Desea confirmar esta solicitud?";
      if (accion === "rechazar") textoConfirmacion = "¿Desea rechazar esta solicitud?";
      if (accion === "reabrir") textoConfirmacion = "¿Desea reabrir esta solicitud y dejarla pendiente?";

      const confirmar = window.confirm(textoConfirmacion);
      if (!confirmar) return;

      try {
        accionEnCurso = true;
        document.getElementById("btnAplicarEstado").disabled = true;

        const response = await fetch("/api/admin/reservas", {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({
            id: eventoSeleccionado.id,
            accion
          })
        });

        if (response.status === 401) {
          redirigirLogin();
          return;
        }

        const data = await response.json();

        if (!response.ok || !data.ok) {
          mostrarMensaje("error", data.error || "No se pudo ejecutar la acción.");
          return;
        }

        mostrarMensaje("ok", data.mensaje || "Acción realizada correctamente.");
        cerrarModalEvento();
        calendar.refetchEvents();
        await actualizarContadores();

      } catch (error) {
        mostrarMensaje("error", error.message || "Error de conexión con el servidor.");
      } finally {
        accionEnCurso = false;
        document.getElementById("btnAplicarEstado").disabled = false;
      }
    }

    function construirUrlEventos(fetchInfo) {
      const params = new URLSearchParams();
      params.set("start", fetchInfo.startStr);
      params.set("end", fetchInfo.endStr);
      params.set("vista", vistaCalendarioActual);

      if (vistaCalendarioActual === "reservas") {
        const estado = document.getElementById("filtroEstado").value;
        const incluirRechazadas = document.getElementById("chkRechazadas").checked;

        if (estado) {
          params.set("estado", estado);
        } else if (incluirRechazadas) {
          params.set("incluir_rechazadas", "1");
        }
      }

      return `/api/admin/calendario?${params.toString()}`;
    }

    function crearCalendario() {
      const calendarEl = document.getElementById("calendar");

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "timeGridWeek",
        initialDate: fechaInicialCalendario || undefined,
        locale: "es",
        firstDay: 1,
        height: "auto",
        headerToolbar: {
          left: "prev,next",
          center: "title",
          right: "today,dayGridMonth,timeGridWeek,timeGridDay,listWeek"
        },
        buttonText: {
          today: "Hoy",
          month: "Mes",
          week: "Semana",
          day: "Día",
          list: "Lista"
        },
        nowIndicator: true,
        allDaySlot: false,
        slotMinTime: "08:00:00",
        slotMaxTime: "22:00:00",
        eventTimeFormat: {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        },
        events: async function(fetchInfo, successCallback, failureCallback) {
          try {
            const url = construirUrlEventos(fetchInfo);

            const response = await fetch(url, {
              credentials: "same-origin"
            });

            if (response.status === 401) {
              redirigirLogin();
              return;
            }

            const data = await response.json();

            if (!response.ok || !data.ok) {
              throw new Error(data.error || "No se pudieron cargar los eventos.");
            }

            successCallback(data.eventos || []);
          } catch (error) {
            console.error(error);
            mostrarMensaje("error", error.message || "No se pudo cargar el calendario.");
            failureCallback(error);
          }
        },
        eventClick: function(info) {
          abrirModalEvento(info);
        }
      });

      calendar.render();

      if (fechaInicialCalendario) {
        calendar.gotoDate(fechaInicialCalendario);
      }
    }

    function activarRecargaAutomaticaFiltros() {
      document.getElementById("filtroEstado").addEventListener("change", async () => {
        if (vistaCalendarioActual !== "reservas") return;
        limpiarMensaje();
        calendar.refetchEvents();
        await actualizarContadores();
      });

      document.getElementById("chkRechazadas").addEventListener("change", async () => {
        if (vistaCalendarioActual !== "reservas") return;
        limpiarMensaje();
        calendar.refetchEvents();
        await actualizarContadores();
      });
    }

    document.addEventListener("DOMContentLoaded", async function () {
      const ok = await comprobarSesionAdmin();
      if (!ok) return;
      await aplicarLogoCabeceraAdmin();

      document.getElementById("app").style.display = "block";
      document.getElementById("btnCerrarSesion").addEventListener("click", cerrarSesion);
      document.getElementById("btnCerrarModal").addEventListener("click", cerrarModalEvento);
      document.getElementById("btnAplicarEstado").addEventListener("click", ejecutarAccionDesdeModal);
      document.getElementById("btnVistaSolicitudes").addEventListener("click", function() {
        aplicarVistaCalendario("reservas");
      });
      document.getElementById("btnVistaActividades").addEventListener("click", function() {
        aplicarVistaCalendario("actividades");
      });

      document.getElementById("btnRecargarIcono").addEventListener("click", async function() {
        limpiarMensaje();
        calendar.refetchEvents();
        await actualizarContadores();
      });

      document.getElementById("modalEvento").addEventListener("click", function(e) {
        if (e.target.id === "modalEvento") {
          cerrarModalEvento();
        }
      });

      try {
        await cargarConfigEvento();
        aplicarVistaCalendario("reservas", { recargar: false });
        fechaInicialCalendario = await obtenerFechaInicialConEventos();
        crearCalendario();
        activarRecargaAutomaticaFiltros();
        await actualizarContadores();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo inicializar el calendario.");
      }
    });
  </script>
</body>
