<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario administrativo</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 1400px;
      margin: 40px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    h2 {
      margin-top: 6px;
      font-size: 22px;
      font-weight: normal;
    }

    .cabecera {
      display: grid;
      grid-template-columns: 90px 1fr 90px;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    .logo {
      max-width: 90px;
      height: auto;
      justify-self: start;
    }

    .titulos {
      text-align: center;
    }

    .lugar-evento {
      margin-top: 8px;
      font-size: 15px;
      color: #444;
      text-align: center;
    }

    .cabecera-espacio {
      width: 90px;
    }

    .nav-admin {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e2e8ef;
    }

    .nav-admin a,
    .nav-admin span,
    .nav-admin button {
      border: 1px solid #cfd8e3;
      background: #fff;
      color: #334155;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
    }

    .nav-admin a:hover,
    .nav-admin button:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #b8c7d8;
    }

    .nav-admin .activo {
      background: #0b5ed7;
      color: white;
      border-color: #0b5ed7;
      cursor: default;
    }

    .nav-admin .cerrar {
      background: #f8fafc;
    }

    .panel {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .mensaje {
      margin-top: 16px;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .mensaje.info {
      display: block;
      background: #eef4ff;
      color: #1d4f91;
      border: 1px solid #c9dcff;
    }

    .filtros {
      display: grid;
      grid-template-columns: 320px 180px 180px 180px;
      gap: 14px;
      align-items: end;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      margin: 0;
      min-height: 42px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    select, input, button, .btn-enlace {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button, .btn-enlace {
      background: #0b5ed7;
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    button:hover, .btn-enlace:hover {
      background: #094db1;
    }

    button:disabled {
      background: #7aa7e8;
      cursor: not-allowed;
    }

    .btn-secundario {
      background: #6c757d;
      color: white;
    }

    .btn-secundario:hover {
      background: #565e64;
    }

    .btn-confirmar {
      background: #198754;
      color: white;
    }

    .btn-confirmar:hover {
      background: #13653f;
    }

    .resumen-estados {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .tarjeta-estado {
      background: #fff;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 12px;
    }

    .tarjeta-estado .etiqueta {
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    .tarjeta-estado .valor {
      font-size: 24px;
      font-weight: bold;
    }

    .leyenda {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .leyenda-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .leyenda-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: inline-block;
    }

    #calendar {
      background: white;
      border-radius: 8px;
      padding: 10px;
    }

    .fc .fc-toolbar.fc-header-toolbar {
      margin-bottom: 1.1em;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .fc-toolbar-chunk {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fc .fc-toolbar-title {
      font-size: 1.9rem;
    }

    .fc .fc-button {
      padding: 0.5em 0.85em;
      font-size: 0.95rem;
    }

    .modal-fondo {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal-fondo.activo {
      display: flex;
    }

    .modal {
      background: #fff;
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 24px;
    }

    .modal h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 24px;
    }

    .detalle {
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .acciones-modal {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .bloque-estado {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }

    .fila-estado {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      align-items: end;
    }

    .estado {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .estado.pendiente { background: #d39e00; }
    .estado.confirmada { background: #198754; }
    .estado.rechazada { background: #dc3545; }
    .estado.cancelada { background: #6c757d; }

    @media (max-width: 1100px) {
      .filtros {
        grid-template-columns: 1fr;
      }

      .cabecera {
        grid-template-columns: 1fr;
      }

      .logo,
      .cabecera-espacio {
        justify-self: center;
      }

      .fila-estado {
        grid-template-columns: 1fr;
      }

      .resumen-estados {
        grid-template-columns: 1fr 1fr;
      }

      .fc .fc-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .fc .fc-toolbar.fc-header-toolbar {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor" id="app" style="display:none;">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">
      <div class="titulos">
        <h1 id="tituloEvento">Cargando evento...</h1>
        <h2 id="subtituloEvento">Calendario administrativo</h2>
        <div id="lugarEvento" class="lugar-evento" style="display:none;"></div>
      </div>
      <div class="cabecera-espacio"></div>
    </div>

    <div class="nav-admin">
      <a href="admin-franjas.html">Franjas</a>
      <a href="admin-reservas.html">Reservas</a>
      <span class="activo">Calendario</span>
      <button type="button" id="btnCerrarSesion" class="cerrar">Cerrar sesión</button>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="panel">
      <div class="filtros">
        <div>
          <label for="filtroEstado">Estado</label>
          <select id="filtroEstado">
            <option value="">PENDIENTE + CONFIRMADA</option>
            <option value="PENDIENTE">Solo PENDIENTE</option>
            <option value="CONFIRMADA">Solo CONFIRMADA</option>
            <option value="RECHAZADA">Solo RECHAZADA</option>
            <option value="CANCELADA">Solo CANCELADA</option>
          </select>
        </div>

        <div>
          <label class="checkbox-label">
            <input type="checkbox" id="chkCanceladas">
            Incluir canceladas
          </label>
        </div>

        <div>
          <label class="checkbox-label">
            <input type="checkbox" id="chkRechazadas">
            Incluir rechazadas
          </label>
        </div>

        <div>
          <button type="button" id="btnRecargar">Recargar calendario</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="resumen-estados">
        <div class="tarjeta-estado">
          <div class="etiqueta">Pendientes</div>
          <div class="valor" id="contadorPendientes">0</div>
        </div>
        <div class="tarjeta-estado">
          <div class="etiqueta">Confirmadas</div>
          <div class="valor" id="contadorConfirmadas">0</div>
        </div>
        <div class="tarjeta-estado">
          <div class="etiqueta">Rechazadas</div>
          <div class="valor" id="contadorRechazadas">0</div>
        </div>
        <div class="tarjeta-estado">
          <div class="etiqueta">Canceladas</div>
          <div class="valor" id="contadorCanceladas">0</div>
        </div>
      </div>

      <div class="leyenda">
        <span class="leyenda-item"><span class="leyenda-color" style="background:#d39e00;"></span>PENDIENTE</span>
        <span class="leyenda-item"><span class="leyenda-color" style="background:#198754;"></span>CONFIRMADA</span>
        <span class="leyenda-item"><span class="leyenda-color" style="background:#dc3545;"></span>RECHAZADA</span>
        <span class="leyenda-item"><span class="leyenda-color" style="background:#6c757d;"></span>CANCELADA</span>
      </div>

      <div id="calendar"></div>
    </div>
  </div>

  <div id="modalEvento" class="modal-fondo" aria-hidden="true">
    <div class="modal">
      <h3 id="modalTitulo">Detalle de solicitud</h3>
      <div id="modalDetalle" class="detalle"></div>

      <div class="bloque-estado">
        <div class="fila-estado">
          <div>
            <label for="selectEstadoDestino">Cambiar estado</label>
            <select id="selectEstadoDestino"></select>
          </div>
          <div>
            <button type="button" id="btnAplicarEstado" class="btn-confirmar">Aplicar cambio</button>
          </div>
        </div>
      </div>

      <div class="acciones-modal">
        <a href="#" id="btnAbrirEditar" class="btn-enlace" target="_blank">Editar</a>
        <a href="#" id="btnAbrirAsistentes" class="btn-enlace btn-secundario" target="_blank">Asistentes</a>
        <button type="button" id="btnCerrarModal" class="btn-secundario">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script>
    let calendar;
    let eventoSeleccionado = null;
    let accionEnCurso = false;
    let fechaInicialCalendario = null;

    function redirigirLogin() {
      const next = encodeURIComponent(window.location.pathname);
      window.location.href = `admin-login.html?next=${next}`;
    }

    async function comprobarSesionAdmin() {
      const response = await fetch("/api/admin/session", {
        method: "GET",
        credentials: "same-origin"
      });

      if (!response.ok) {
        redirigirLogin();
        return false;
      }

      return true;
    }

    async function cerrarSesion() {
      try {
        await fetch("/api/admin/logout", {
          method: "POST",
          credentials: "same-origin"
        });
      } catch {}

      redirigirLogin();
    }

    function mostrarMensaje(tipo, texto) {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje " + tipo;
      mensaje.style.display = "block";
      mensaje.textContent = texto;
    }

    function limpiarMensaje() {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje";
      mensaje.style.display = "none";
      mensaje.textContent = "";
    }

    async function cargarConfigEvento() {
      try {
        const response = await fetch("/api/config-evento", {
          credentials: "same-origin"
        });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar la configuración del evento.");
        }

        const config = data.config || {};

        document.title = "Calendario administrativo";
        document.getElementById("tituloEvento").textContent = config.nombre_evento || "Evento no configurado";
        document.getElementById("subtituloEvento").textContent = "Calendario administrativo";

        const lugarEl = document.getElementById("lugarEvento");
        if (config.lugar && String(config.lugar).trim() !== "") {
          lugarEl.style.display = "block";
          lugarEl.innerHTML = `<strong>Lugar:</strong> ${config.lugar}`;
        } else {
          lugarEl.style.display = "none";
          lugarEl.textContent = "";
        }
      } catch (error) {
        console.error(error);
        document.getElementById("tituloEvento").textContent = "Evento no disponible";
      }
    }

    async function obtenerFechaInicialConEventos() {
      try {
        const params = new URLSearchParams();
        params.set("start", "2000-01-01");
        params.set("end", "2100-12-31");

        const estado = document.getElementById("filtroEstado").value;
        const incluirCanceladas = document.getElementById("chkCanceladas").checked;
        const incluirRechazadas = document.getElementById("chkRechazadas").checked;

        if (estado) {
          params.set("estado", estado);
        } else {
          if (incluirCanceladas) params.set("incluir_canceladas", "1");
          if (incluirRechazadas) params.set("incluir_rechazadas", "1");
        }

        const response = await fetch(`/api/admin/calendario?${params.toString()}`, {
          credentials: "same-origin"
        });

        if (response.status === 401) {
          redirigirLogin();
          return null;
        }

        const data = await response.json();

        if (!response.ok || !data.ok) {
          return null;
        }

        const eventos = Array.isArray(data.eventos) ? data.eventos : [];
        if (!eventos.length) return null;

        eventos.sort((a, b) => new Date(a.start) - new Date(b.start));
        return eventos[0].start.slice(0, 10);
      } catch {
        return null;
      }
    }

    async function actualizarContadores() {
      try {
        const params = new URLSearchParams();
        params.set("start", "2000-01-01");
        params.set("end", "2100-12-31");
        params.set("incluir_canceladas", "1");
        params.set("incluir_rechazadas", "1");

        const response = await fetch(`/api/admin/calendario?${params.toString()}`, {
          credentials: "same-origin"
        });

        if (!response.ok) return;

        const data = await response.json();
        const eventos = Array.isArray(data.eventos) ? data.eventos : [];

        const pendientes = eventos.filter(e => e.extendedProps?.estado === "PENDIENTE").length;
        const confirmadas = eventos.filter(e => e.extendedProps?.estado === "CONFIRMADA").length;
        const rechazadas = eventos.filter(e => e.extendedProps?.estado === "RECHAZADA").length;
        const canceladas = eventos.filter(e => e.extendedProps?.estado === "CANCELADA").length;

        document.getElementById("contadorPendientes").textContent = pendientes;
        document.getElementById("contadorConfirmadas").textContent = confirmadas;
        document.getElementById("contadorRechazadas").textContent = rechazadas;
        document.getElementById("contadorCanceladas").textContent = canceladas;
      } catch {
        // sin acción
      }
    }

    function opcionesEstadoPara(estadoActual) {
      const opciones = [{ value: "", label: "Sin cambio" }];

      if (estadoActual === "PENDIENTE") {
        opciones.push({ value: "confirmar", label: "Pasar a CONFIRMADA" });
        opciones.push({ value: "rechazar", label: "Pasar a RECHAZADA" });
        opciones.push({ value: "cancelar", label: "Pasar a CANCELADA" });
      } else if (estadoActual === "CONFIRMADA") {
        opciones.push({ value: "reabrir", label: "Pasar a PENDIENTE" });
        opciones.push({ value: "cancelar", label: "Pasar a CANCELADA" });
      } else if (estadoActual === "RECHAZADA") {
        opciones.push({ value: "reabrir", label: "Pasar a PENDIENTE" });
        opciones.push({ value: "cancelar", label: "Pasar a CANCELADA" });
      } else if (estadoActual === "CANCELADA") {
        opciones.push({ value: "reabrir", label: "Pasar a PENDIENTE" });
      }

      return opciones;
    }

    function cargarSelectorEstado(estadoActual) {
      const select = document.getElementById("selectEstadoDestino");
      select.innerHTML = "";

      opcionesEstadoPara(estadoActual).forEach(op => {
        const option = document.createElement("option");
        option.value = op.value;
        option.textContent = op.label;
        select.appendChild(option);
      });
    }

    function abrirModalEvento(info) {
      eventoSeleccionado = info.event;
      const p = info.event.extendedProps;
      const estadoClass = String(p.estado || "").toLowerCase();

      document.getElementById("modalTitulo").textContent = p.codigo_reserva || "Detalle de solicitud";
      document.getElementById("modalDetalle").innerHTML = `
        <strong>Estado:</strong> <span class="estado ${estadoClass}">${p.estado}</span><br>
        <strong>Centro:</strong> ${p.centro || ""}<br>
        <strong>Contacto:</strong> ${p.contacto || ""}<br>
        <strong>Teléfono:</strong> ${p.telefono || ""}<br>
        <strong>Email:</strong> ${p.email || ""}<br>
        <strong>Personas:</strong> ${p.personas || 0}<br>
        <strong>Franja:</strong> ${p.fecha} · ${p.hora_inicio} - ${p.hora_fin}<br>
        <strong>Capacidad de franja:</strong> ${p.capacidad || 0}<br>
        <strong>Observaciones:</strong> ${p.observaciones ? p.observaciones : "Sin observaciones"}
      `;

      document.getElementById("btnAbrirEditar").href = `editar.html?token=${encodeURIComponent(p.token_edicion)}`;
      document.getElementById("btnAbrirAsistentes").href = `asistentes.html?token=${encodeURIComponent(p.token_edicion)}`;

      cargarSelectorEstado(p.estado);

      document.getElementById("modalEvento").classList.add("activo");
      document.getElementById("modalEvento").setAttribute("aria-hidden", "false");
    }

    function cerrarModalEvento() {
      eventoSeleccionado = null;
      document.getElementById("modalEvento").classList.remove("activo");
      document.getElementById("modalEvento").setAttribute("aria-hidden", "true");
    }

    async function ejecutarAccionDesdeModal() {
      if (!eventoSeleccionado || accionEnCurso) return;

      const accion = document.getElementById("selectEstadoDestino").value;
      if (!accion) {
        cerrarModalEvento();
        return;
      }

      let textoConfirmacion = "¿Desea ejecutar esta acción?";
      if (accion === "confirmar") textoConfirmacion = "¿Desea confirmar esta solicitud?";
      if (accion === "rechazar") textoConfirmacion = "¿Desea rechazar esta solicitud?";
      if (accion === "cancelar") textoConfirmacion = "¿Desea cancelar esta solicitud o reserva?";
      if (accion === "reabrir") textoConfirmacion = "¿Desea reabrir esta solicitud y dejarla pendiente?";

      const confirmar = window.confirm(textoConfirmacion);
      if (!confirmar) return;

      try {
        accionEnCurso = true;
        document.getElementById("btnAplicarEstado").disabled = true;

        const response = await fetch("/api/admin/reservas", {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({
            id: eventoSeleccionado.id,
            accion
          })
        });

        if (response.status === 401) {
          redirigirLogin();
          return;
        }

        const data = await response.json();

        if (!response.ok || !data.ok) {
          mostrarMensaje("error", data.error || "No se pudo ejecutar la acción.");
          return;
        }

        mostrarMensaje("ok", data.mensaje || "Acción realizada correctamente.");
        cerrarModalEvento();
        calendar.refetchEvents();
        await actualizarContadores();

      } catch (error) {
        mostrarMensaje("error", error.message || "Error de conexión con el servidor.");
      } finally {
        accionEnCurso = false;
        document.getElementById("btnAplicarEstado").disabled = false;
      }
    }

    function construirUrlEventos(fetchInfo) {
      const params = new URLSearchParams();
      params.set("start", fetchInfo.startStr);
      params.set("end", fetchInfo.endStr);

      const estado = document.getElementById("filtroEstado").value;
      const incluirCanceladas = document.getElementById("chkCanceladas").checked;
      const incluirRechazadas = document.getElementById("chkRechazadas").checked;

      if (estado) {
        params.set("estado", estado);
      } else {
        if (incluirCanceladas) params.set("incluir_canceladas", "1");
        if (incluirRechazadas) params.set("incluir_rechazadas", "1");
      }

      return `/api/admin/calendario?${params.toString()}`;
    }

    function crearCalendario() {
      const calendarEl = document.getElementById("calendar");

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "timeGridWeek",
        initialDate: fechaInicialCalendario || undefined,
        locale: "es",
        firstDay: 1,
        height: "auto",
        headerToolbar: {
          left: "prev,next",
          center: "title",
          right: "today,dayGridMonth,timeGridWeek,timeGridDay,listWeek"
        },
        buttonText: {
          today: "Hoy",
          month: "Mes",
          week: "Semana",
          day: "Día",
          list: "Lista"
        },
        nowIndicator: true,
        allDaySlot: false,
        slotMinTime: "08:00:00",
        slotMaxTime: "22:00:00",
        eventTimeFormat: {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        },
        events: async function(fetchInfo, successCallback, failureCallback) {
          try {
            const url = construirUrlEventos(fetchInfo);

            const response = await fetch(url, {
              credentials: "same-origin"
            });

            if (response.status === 401) {
              redirigirLogin();
              return;
            }

            const data = await response.json();

            if (!response.ok || !data.ok) {
              throw new Error(data.error || "No se pudieron cargar los eventos.");
            }

            successCallback(data.eventos || []);
          } catch (error) {
            console.error(error);
            mostrarMensaje("error", error.message || "No se pudo cargar el calendario.");
            failureCallback(error);
          }
        },
        eventClick: function(info) {
          abrirModalEvento(info);
        }
      });

      calendar.render();

      if (fechaInicialCalendario) {
        calendar.gotoDate(fechaInicialCalendario);
      }
    }

    function activarRecargaAutomaticaFiltros() {
      document.getElementById("filtroEstado").addEventListener("change", async () => {
        limpiarMensaje();
        calendar.refetchEvents();
        await actualizarContadores();
      });

      document.getElementById("chkCanceladas").addEventListener("change", async () => {
        limpiarMensaje();
        calendar.refetchEvents();
        await actualizarContadores();
      });

      document.getElementById("chkRechazadas").addEventListener("change", async () => {
        limpiarMensaje();
        calendar.refetchEvents();
        await actualizarContadores();
      });
    }

    document.addEventListener("DOMContentLoaded", async function () {
      const ok = await comprobarSesionAdmin();
      if (!ok) return;

      document.getElementById("app").style.display = "block";
      document.getElementById("btnCerrarSesion").addEventListener("click", cerrarSesion);
      document.getElementById("btnCerrarModal").addEventListener("click", cerrarModalEvento);
      document.getElementById("btnAplicarEstado").addEventListener("click", ejecutarAccionDesdeModal);

      document.getElementById("btnRecargar").addEventListener("click", async function() {
        limpiarMensaje();
        calendar.refetchEvents();
        await actualizarContadores();
      });

      document.getElementById("modalEvento").addEventListener("click", function(e) {
        if (e.target.id === "modalEvento") {
          cerrarModalEvento();
        }
      });

      try {
        await cargarConfigEvento();
        fechaInicialCalendario = await obtenerFechaInicialConEventos();
        crearCalendario();
        activarRecargaAutomaticaFiltros();
        await actualizarContadores();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo inicializar el calendario.");
      }
    });
  </script>
</body>
</html>
