<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios públicos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/fondo-cabecera-movil-unificado.css">
  <link rel="stylesheet" href="assets/mobile-mensaje-flotante.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, Arial, sans-serif; color: #17395e; }
    .cabecera { max-width: 1108px; margin: 0 auto; padding: 22px 16px 12px; }
    .cabecera-inner { display: flex; align-items: center; gap: 22px; }
    .logo-cabecera { width: 120px; height: 120px; object-fit: contain; }
    .logo-cabecera.logo-pendiente { opacity: 0.5; }
    .logo-cabecera.logo-admin-personal { border-radius: 10px; background: #fff; border: 1px solid #d8e3ef; padding: 5px; }
    .titulos-cabecera h1 { margin: 0; font-size: 40px; font-weight: 800; color: #123a63; letter-spacing: 0.2px; }
    .titulos-cabecera h2 { margin: 6px 0 0; font-size: 30px; font-weight: 500; color: #5f7286; }
    .franja-sesion { max-width: 1108px; margin: 0 auto; padding: 0 16px; }
    .franja-sesion-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border: 1px solid rgba(213, 222, 233, 0.95);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
    }
    .franja-sesion-texto { min-width: 210px; line-height: 1.2; }
    .franja-sesion-rol { display: block; font-size: 14px; font-weight: 700; color: #123a63; }
    .franja-sesion-nombre { display: block; margin-top: 4px; font-size: 29px; font-weight: 700; color: #123a63; }
    .franja-sesion-spacer { flex: 1 1 auto; }
    .barra-admin { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-btn {
      border: 1px solid #b9c6d3;
      background: #fff;
      color: #263a4e;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 17px;
      cursor: pointer;
    }
    .nav-btn.activo { background: #0b5ed7; color: #fff; border-color: #0b5ed7; font-weight: 700; }
    .nav-btn-icon {
      width: 34px; height: 34px; border-radius: 999px; border: 1px solid #b9c6d3; background: #fff; color: #5c6f82;
      display: inline-flex; align-items: center; justify-content: center; padding: 0; cursor: pointer;
    }
    .nav-btn-icon svg, .nav-btn-icon img { width: 16px; height: 16px; display: block; }
    .contenedor { max-width: 1108px; margin: 12px auto 22px; padding: 0 16px 18px; }
    .bloque {
      border: 1px solid rgba(211, 220, 230, 0.95);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      padding: 14px;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.07);
      margin-bottom: 10px;
    }
    .bloque h3 { margin: 0; color: #123a63; font-size: 24px; }
    .subtitulo { margin: 6px 0 0; color: #5f7286; font-size: 15px; }
    .barra-acciones { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .btn-ficha { padding: 9px 14px; border-radius: 999px; border: 1px solid #bcc9d7; background: #fff; color: #2d4257; font-size: 14px; cursor: pointer; }
    .btn-ficha:disabled { opacity: 0.45; cursor: not-allowed; }
    .mensaje { display: none; margin-bottom: 10px; border-radius: 10px; padding: 10px 12px; font-size: 14px; }
    .mensaje.ok { display: block; background: #eaf7ea; color: #146c2e; }
    .mensaje.error { display: block; background: #fdeaea; color: #9b1c1c; }
    .tabla-wrap { overflow-x: auto; border: 1px solid #dbe4ee; border-radius: 12px; background: #fff; }
    table { width: 100%; min-width: 920px; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e6edf4; text-align: left; font-size: 14px; }
    thead th { background: #f5f8fb; color: #35506a; text-transform: uppercase; font-size: 12px; letter-spacing: 0.03em; }
    th.sel-col, td.sel-col { width: 36px; text-align: center; }
    .fila-seleccionada { background: #eef5ff; }
    .pill { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 700; }
    .pill-bloqueado { background: #fdeaea; color: #9b1c1c; }
    .pill-permitido { background: #eaf7ea; color: #146c2e; }
    .muted { color: #6e7e90; }
    @media (max-width: 920px) {
      .cabecera-inner { gap: 12px; }
      .logo-cabecera { width: 82px; height: 82px; }
      .titulos-cabecera h1 { font-size: 28px; }
      .titulos-cabecera h2 { font-size: 20px; }
      .franja-sesion-nombre { font-size: 20px; }
      .nav-btn { font-size: 14px; }
    }
  </style>
</head>
<body class="fondo-cabecera-unificada">
  <div class="cabecera">
    <div class="cabecera-inner">
      <img src="logo.png" alt="Logo administrador" class="logo-cabecera logo-pendiente" id="logoCabeceraAdminUsuariosPublicos">
      <div class="titulos-cabecera">
        <h1>Actividades Públicas Institucionales</h1>
        <h2 id="subtituloCabecera">Armada</h2>
      </div>
    </div>
  </div>

  <div class="franja-sesion">
    <div class="franja-sesion-inner">
      <div class="franja-sesion-texto">
        <span class="franja-sesion-rol">Administrador</span>
        <span id="textoSesionNombre" class="franja-sesion-nombre">-</span>
      </div>
      <div class="franja-sesion-spacer"></div>
      <div class="barra-admin">
        <button class="nav-btn" onclick="location.href='mis-actividades.html'">Panel de actividades</button>
        <button class="nav-btn" onclick="location.href='admin-reservas.html'">Panel de reservas</button>
        <button class="nav-btn activo">Usuarios públicos</button>
        <button class="nav-btn" onclick="location.href='admin-plantillas.html'">Plantillas</button>
        <button class="nav-btn" onclick="location.href='admin-informes.html'">Informes</button>
        <button class="nav-btn-icon" type="button" onclick="location.href='admin-calendario.html'" title="Calendario" aria-label="Calendario">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2.5" x2="16" y2="6"></line>
            <line x1="8" y1="2.5" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </button>
        <button class="nav-btn-icon" type="button" onclick="location.href='portal.html'" title="Portal" aria-label="Portal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 10.5L12 3l9 7.5"></path>
            <path d="M5 9.5V21h14V9.5"></path>
            <path d="M9 21v-6h6v6"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="contenedor">
    <div id="mensajeEstado" class="mensaje"></div>
    <div class="bloque">
      <h3>Usuarios públicos de mi ámbito</h3>
      <p class="subtitulo">Lista global de usuarios públicos activos. El bloqueo solo aplica a tus actividades.</p>
      <div class="barra-acciones">
        <button id="btnBloquear" class="btn-ficha" disabled>Bloquear para mis actividades</button>
        <button id="btnDesbloquear" class="btn-ficha" disabled>Desbloquear para mis actividades</button>
        <button id="btnRecargar" class="btn-ficha">Recargar</button>
      </div>
      <div class="tabla-wrap" style="margin-top:10px;">
        <table>
          <thead>
            <tr>
              <th class="sel-col"></th>
              <th>Centro</th>
              <th>Responsable</th>
              <th>Email</th>
              <th>Teléfono</th>
              <th>Estado para mí</th>
              <th>Motivo de bloqueo</th>
            </tr>
          </thead>
          <tbody id="tbodyUsuarios"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let usuarios = [];
    let usuarioSeleccionado = null;

    function escapeHtml(valor) {
      return String(valor || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function aplicarLogoCabeceraAdmin(img, userLike = {}) {
      if (!img) return;
      const logoUsuario = String(userLike?.logo_url || "").trim();
      img.src = logoUsuario || "logo.png";
      img.classList.remove("logo-pendiente");
      img.classList.toggle("logo-admin-personal", !!logoUsuario);
    }

    async function cargarSesionCabecera() {
      try {
        const res = await fetch("/api/usuario/session", { credentials: "same-origin" });
        const data = await res.json().catch(() => null);
        const logoEl = document.getElementById("logoCabeceraAdminUsuariosPublicos");
        if (!res.ok || !data?.ok || !data?.authenticated || !data?.user) {
          if (logoEl) logoEl.classList.remove("logo-pendiente");
          return;
        }
        const nombre = data.user.nombre || data.user.email || "Administrador";
        const textoVisible = data.user.nombre_publico || nombre;
        document.getElementById("subtituloCabecera").textContent = "Armada";
        document.getElementById("textoSesionNombre").textContent = String(textoVisible).toUpperCase();
        aplicarLogoCabeceraAdmin(logoEl, data.user);
      } catch (_) {
        const logoEl = document.getElementById("logoCabeceraAdminUsuariosPublicos");
        if (logoEl) logoEl.classList.remove("logo-pendiente");
      }
    }

    function setMensaje(tipo, texto) {
      const el = document.getElementById("mensajeEstado");
      if (!texto) {
        el.className = "mensaje";
        el.textContent = "";
        el.style.display = "none";
        return;
      }
      el.className = `mensaje ${tipo === "ok" ? "ok" : "error"}`;
      el.textContent = texto;
      el.style.display = "block";
    }

    function actualizarAcciones() {
      const bloqueado = Number(usuarioSeleccionado?.bloqueado_para_admin || 0) === 1;
      document.getElementById("btnBloquear").disabled = !usuarioSeleccionado || bloqueado;
      document.getElementById("btnDesbloquear").disabled = !usuarioSeleccionado || !bloqueado;
    }

    function seleccionarUsuario(id) {
      usuarioSeleccionado = usuarios.find((item) => Number(item.id) === Number(id)) || null;
      renderTabla();
      actualizarAcciones();
    }

    function renderTabla() {
      const tbody = document.getElementById("tbodyUsuarios");
      if (!usuarios.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="muted">No hay usuarios públicos activos disponibles.</td></tr>`;
        return;
      }
      tbody.innerHTML = usuarios.map((item) => {
        const seleccionado = usuarioSeleccionado && Number(usuarioSeleccionado.id) === Number(item.id);
        const bloqueado = Number(item.bloqueado_para_admin || 0) === 1;
        const nombreCentro = item.centro || item.nombre || "(Sin nombre)";
        return `<tr class="${seleccionado ? "fila-seleccionada" : ""}" onclick="seleccionarUsuario(${Number(item.id)})">
          <td class="sel-col"><input type="radio" name="selUsuario" ${seleccionado ? "checked" : ""} onchange="seleccionarUsuario(${Number(item.id)})"></td>
          <td>${escapeHtml(nombreCentro)}</td>
          <td>${escapeHtml(item.nombre || "-")}</td>
          <td>${escapeHtml(item.email || "-")}</td>
          <td>${escapeHtml(item.telefono_contacto || "-")}</td>
          <td><span class="pill ${bloqueado ? "pill-bloqueado" : "pill-permitido"}">${bloqueado ? "Bloqueado" : "Permitido"}</span></td>
          <td>${escapeHtml(item.motivo_bloqueo || "-")}</td>
        </tr>`;
      }).join("");
    }

    async function cargarUsuarios() {
      setMensaje("", "");
      try {
        const res = await fetch("/api/admin/usuarios-publicos-ambito-lista", { credentials: "include" });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.ok) {
          setMensaje("error", data?.error || "No se pudo cargar el listado.");
          usuarios = [];
          usuarioSeleccionado = null;
          renderTabla();
          actualizarAcciones();
          return;
        }
        usuarios = Array.isArray(data.usuarios) ? data.usuarios : [];
        if (usuarioSeleccionado) {
          usuarioSeleccionado = usuarios.find((item) => Number(item.id) === Number(usuarioSeleccionado.id)) || null;
        }
        renderTabla();
        actualizarAcciones();
      } catch (_) {
        setMensaje("error", "Error de conexión al cargar usuarios.");
      }
    }

    async function actualizarBloqueo(bloqueado) {
      if (!usuarioSeleccionado) return;
      let motivo = "";
      if (bloqueado) {
        motivo = window.prompt("Indica el motivo del bloqueo para tus actividades:") || "";
        if (!motivo.trim()) {
          setMensaje("error", "Debes indicar un motivo para bloquear.");
          return;
        }
      }
      try {
        const res = await fetch("/api/admin/usuarios-publicos-ambito-estado", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            usuario_id: Number(usuarioSeleccionado.id),
            bloqueado: bloqueado ? 1 : 0,
            motivo
          })
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.ok) {
          setMensaje("error", data?.error || "No se pudo actualizar el estado.");
          return;
        }
        setMensaje("ok", data.mensaje || "Estado actualizado.");
        await cargarUsuarios();
      } catch (_) {
        setMensaje("error", "Error de conexión al actualizar el estado.");
      }
    }

    document.getElementById("btnBloquear").addEventListener("click", () => actualizarBloqueo(true));
    document.getElementById("btnDesbloquear").addEventListener("click", () => actualizarBloqueo(false));
    document.getElementById("btnRecargar").addEventListener("click", cargarUsuarios);

    (async function init() {
      await Promise.all([cargarSesionCabecera(), cargarUsuarios()]);
    })();
  </script>
</body>
</html>
