<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de administración de reservas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 1280px;
      margin: 20px auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    h2 {
      margin: 8px 0 0;
      font-size: 18px;
      font-weight: normal;
    }

    .cabecera {
      position: relative;
      min-height: 150px;
      margin-bottom: 16px;
      border-bottom: 1px solid #d9e0e7;
      padding-bottom: 16px;
    }

    .logo {
      position: absolute;
      left: 0;
      top: 0;
      max-width: 110px;
      height: auto;
    }

    .cabecera-centro {
      text-align: center;
      padding: 0 220px 0 220px;
    }

    .lugar {
      margin-top: 10px;
      font-size: 15px;
      color: #333;
    }

    .nav-admin {
      margin-top: 26px;
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .nav-btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #1e2a36;
      text-decoration: none;
      font-size: 14px;
      line-height: 1;
      transition: all 0.15s ease;
    }

    .nav-btn:hover {
      background: #f7f9fb;
    }

    .nav-btn.activo {
      background: #0b5ed7;
      color: #fff;
      border-color: #0b5ed7;
    }

    .cabecera-acciones {
      position: absolute;
      right: 0;
      top: 0;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-icono {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .btn-icono:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }

    .btn-icono svg {
      width: 18px;
      height: 18px;
    }

    .bloque {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .bloque h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 16px;
    }

    .filtros {
      display: grid;
      grid-template-columns: 160px 200px 160px 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      background: #fff;
    }

    .check-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 30px;
      font-weight: bold;
      color: #1e2a36;
    }

    .check-wrap input {
      margin: 0;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      color: #fff;
      background: #0b5ed7;
    }

    .btn:hover {
      background: #094db1;
    }

    .btn-secundario {
      background: #6c757d;
    }

    .btn-secundario:hover {
      background: #565e64;
    }

    .btn-verde {
      background: #198754;
    }

    .btn-verde:hover {
      background: #13653f;
    }

    .btn-rojo {
      background: #dc3545;
    }

    .btn-rojo:hover {
      background: #b52a37;
    }

    .btn-gris {
      background: #6c757d;
    }

    .btn-gris:hover {
      background: #565e64;
    }

    .resumen {
      font-weight: bold;
      margin-bottom: 14px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #dde4ea;
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef4ff;
      color: #1d4f91;
      font-weight: bold;
    }

    .codigo {
      font-weight: bold;
    }

    .estado-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
    }

    .estado-badge.pendiente { background: #d39e00; }
    .estado-badge.confirmada { background: #198754; }
    .estado-badge.rechazada { background: #dc3545; }
    .estado-badge.cancelada { background: #6c757d; }

    .acciones-tabla {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .acciones-tabla .btn {
      padding: 8px 12px;
      font-size: 14px;
    }

    .muted {
      color: #6b7280;
    }

    .mensaje {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    @media (max-width: 1200px) {
      .filtros {
        grid-template-columns: 1fr 1fr;
      }

      .cabecera-centro {
        padding: 120px 0 0 0;
      }

      .logo {
        position: static;
        display: block;
        margin: 0 auto 12px auto;
      }

      .cabecera-acciones {
        position: static;
        justify-content: center;
        margin-top: 14px;
      }

      .cabecera {
        min-height: auto;
      }
    }

    @media (max-width: 900px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 16px;
        border: 1px solid #dde4ea;
        border-radius: 8px;
        overflow: hidden;
      }

      td {
        border-bottom: 1px solid #eef2f6;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo Armada" class="logo">

      <div class="cabecera-centro">
        <h1 id="tituloEvento">DIFAS 2026</h1>
        <h2>Panel de administración de reservas</h2>
        <div class="lugar" id="lugarEvento"><strong>Lugar:</strong> ARFER</div>

        <div class="nav-admin">
          <a class="nav-btn" href="admin-franjas.html">Franjas</a>
          <a class="nav-btn activo" href="admin-reservas.html">Reservas</a>
          <a class="nav-btn" href="admin-calendar.html">Calendario</a>
        </div>
      </div>

      <div class="cabecera-acciones">
        <button type="button" class="btn-icono" id="btnRecargar" title="Recargar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <polyline points="21 3 21 9 15 9"></polyline>
          </svg>
        </button>

        <button type="button" class="btn-icono" id="btnLogout" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="bloque">
      <h3>Filtros</h3>
      <div class="filtros">
        <div>
          <label for="filtroFecha">Fecha</label>
          <input type="date" id="filtroFecha">
        </div>

        <div>
          <label for="filtroFranja">Franja</label>
          <select id="filtroFranja">
            <option value="">Todas</option>
          </select>
        </div>

        <div>
          <label for="filtroEstado">Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="CONFIRMADA">Confirmada</option>
            <option value="RECHAZADA">Rechazada</option>
            <option value="CANCELADA">Cancelada</option>
          </select>
        </div>

        <div>
          <label for="filtroBuscar">Buscar</label>
          <input type="text" id="filtroBuscar" placeholder="Código, centro, contacto, email o teléfono">
        </div>

        <button type="button" class="btn" id="btnAplicarFiltros">Aplicar filtros</button>
        <button type="button" class="btn btn-secundario" id="btnLimpiarFiltros">Limpiar</button>
      </div>
    </div>

    <div class="bloque">
      <div class="resumen" id="resumenPanel"></div>

      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Fecha / franja</th>
              <th>Centro / contacto</th>
              <th>Teléfono / email</th>
              <th>Plazas reservadas</th>
              <th>Plazas asignadas</th>
              <th>Alumnos / profesores</th>
              <th>Estado</th>
              <th>Observaciones</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyReservas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function mostrarMensaje(tipo, texto) {
      const m = document.getElementById("mensaje");
      m.className = "mensaje " + tipo;
      m.style.display = "block";
      m.textContent = texto;
    }

    function limpiarMensaje() {
      const m = document.getElementById("mensaje");
      m.className = "mensaje";
      m.style.display = "none";
      m.textContent = "";
    }

    function claseEstado(estado) {
      const e = String(estado || "").toLowerCase();
      if (e === "pendiente") return "pendiente";
      if (e === "confirmada") return "confirmada";
      if (e === "rechazada") return "rechazada";
      if (e === "cancelada") return "cancelada";
      return "";
    }

    function formatearFechaISOaInput(iso) {
      if (!iso) return "";
      return iso;
    }

    function leerFiltros() {
      return {
        fecha: document.getElementById("filtroFecha").value || "",
        franja: document.getElementById("filtroFranja").value || "",
        estado: document.getElementById("filtroEstado").value || "",
        buscar: document.getElementById("filtroBuscar").value.trim()
      };
    }

    function construirQuery(filtros) {
      const params = new URLSearchParams();
      if (filtros.fecha) params.set("fecha", filtros.fecha.split("-").reverse().join("/"));
      if (filtros.franja) params.set("franja", filtros.franja);
      if (filtros.estado) params.set("estado", filtros.estado);
      if (filtros.buscar) params.set("buscar", filtros.buscar);
      return params.toString();
    }

    function pintarFranjas(franjas) {
      const sel = document.getElementById("filtroFranja");
      const valorActual = sel.value;
      sel.innerHTML = `<option value="">Todas</option>`;

      franjas.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f.id;
        opt.textContent = `${f.fecha} - ${f.hora_inicio} a ${f.hora_fin}`;
        if (String(valorActual) === String(f.id)) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function pintarResumen(resumen) {
      document.getElementById("resumenPanel").innerHTML = `
        <span>Total solicitudes: ${resumen.total_solicitudes}</span>
        <span>|</span>
        <span>Pendientes: ${resumen.pendientes}</span>
        <span>|</span>
        <span>Confirmadas: ${resumen.confirmadas}</span>
        <span>|</span>
        <span>Rechazadas: ${resumen.rechazadas}</span>
        <span>|</span>
        <span>Canceladas: ${resumen.canceladas}</span>
        <span>|</span>
        <span>Plazas asignadas: ${resumen.plazas_asignadas}</span>
      `;
    }

    function botonEstado(texto, clase, onclick) {
      return `<button type="button" class="btn ${clase}" onclick="${onclick}">${texto}</button>`;
    }

    function pintarReservas(reservas) {
      const tbody = document.getElementById("tbodyReservas");

      if (!reservas.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="muted">No hay reservas que coincidan con los filtros.</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = reservas.map(r => `
        <tr>
          <td>
            <div class="codigo">${r.codigo_reserva}</div>
          </td>
          <td>
            ${r.fecha}<br>
            ${r.hora_inicio} - ${r.hora_fin}
          </td>
          <td>
            ${r.centro}<br>
            <span class="muted">${r.contacto}</span>
          </td>
          <td>
            ${r.telefono || ""}<br>
            <span class="muted">${r.email || ""}</span>
          </td>
          <td>${r.plazas_reservadas}</td>
          <td>${r.plazas_asignadas}</td>
          <td>
            Alumnos: ${r.alumnos}<br>
            Profesores: ${r.profesores}
          </td>
          <td>
            <span class="estado-badge ${claseEstado(r.estado)}">${r.estado}</span>
          </td>
          <td>${r.observaciones || '<span class="muted">Sin observaciones</span>'}</td>
          <td>
            <div class="acciones-tabla">
              ${botonEstado("Editar", "btn-verde", `irEditar(${r.id}, '${r.codigo_reserva}')`)}
              ${botonEstado("Asistentes", "btn-verde", `irAsistentes(${r.id}, '${r.codigo_reserva}')`)}
              ${r.estado === "PENDIENTE" ? botonEstado("Confirmar", "btn-verde", `cambiarEstado(${r.id}, 'CONFIRMADA')`) : ""}
              ${r.estado === "PENDIENTE" ? botonEstado("Rechazar", "btn-rojo", `cambiarEstado(${r.id}, 'RECHAZADA')`) : ""}
              ${["PENDIENTE", "CONFIRMADA"].includes(r.estado) ? botonEstado("Cancelar", "btn-gris", `cambiarEstado(${r.id}, 'CANCELADA')`) : ""}
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function cargarPanel() {
      limpiarMensaje();

      try {
        const filtros = leerFiltros();
        const query = construirQuery(filtros);
        const url = `/api/admin/reservas${query ? "?" + query : ""}`;

        const res = await fetch(url, { credentials: "same-origin" });
        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar el panel.");
        }

        pintarFranjas(data.franjas || []);
        pintarResumen(data.resumen || {
          total_solicitudes: 0,
          pendientes: 0,
          confirmadas: 0,
          rechazadas: 0,
          canceladas: 0,
          plazas_asignadas: 0
        });
        pintarReservas(data.reservas || []);
      } catch (error) {
        mostrarMensaje("error", error.message || "Error al cargar el panel.");
      }
    }

    async function cerrarSesion() {
      try {
        await fetch("/api/admin/logout", {
          method: "POST",
          credentials: "same-origin"
        });
      } catch (_) {
      }
      window.location.href = "index.html";
    }

    async function resolverTokenDesdeCodigo(codigoReserva) {
      const res = await fetch(`/api/admin/reserva-token?codigo=${encodeURIComponent(codigoReserva)}`, {
        credentials: "same-origin"
      });
      const data = await res.json();

      if (!res.ok || !data.ok || !data.token_edicion) {
        throw new Error(data.error || "No se pudo resolver el acceso a la solicitud.");
      }

      return data.token_edicion;
    }

    async function irEditar(id, codigoReserva) {
      try {
        const token = await resolverTokenDesdeCodigo(codigoReserva);
        window.location.href = `editar.html?token=${encodeURIComponent(token)}`;
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo abrir la solicitud.");
      }
    }

    async function irAsistentes(id, codigoReserva) {
      try {
        const token = await resolverTokenDesdeCodigo(codigoReserva);
        window.location.href = `asistentes.html?token=${encodeURIComponent(token)}`;
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo abrir la gestión de asistentes.");
      }
    }

    async function cambiarEstado(id, estado) {
      let texto = "¿Desea aplicar el cambio de estado?";
      if (estado === "CONFIRMADA") texto = "¿Desea confirmar esta solicitud?";
      if (estado === "RECHAZADA") texto = "¿Desea rechazar esta solicitud?";
      if (estado === "CANCELADA") texto = "¿Desea cancelar esta solicitud?";

      if (!window.confirm(texto)) return;

      limpiarMensaje();

      try {
        const res = await fetch("/api/admin/reserva-estado", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            reserva_id: id,
            estado
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cambiar el estado.");
        }

        mostrarMensaje("ok", data.mensaje || "Estado actualizado correctamente.");
        await cargarPanel();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo cambiar el estado.");
      }
    }

    document.getElementById("btnAplicarFiltros").addEventListener("click", cargarPanel);

    document.getElementById("btnLimpiarFiltros").addEventListener("click", function () {
      document.getElementById("filtroFecha").value = "";
      document.getElementById("filtroFranja").value = "";
      document.getElementById("filtroEstado").value = "";
      document.getElementById("filtroBuscar").value = "";
      cargarPanel();
    });

    document.getElementById("btnRecargar").addEventListener("click", cargarPanel);
    document.getElementById("btnLogout").addEventListener("click", cerrarSesion);

    cargarPanel();
  </script>
</body>
</html>
