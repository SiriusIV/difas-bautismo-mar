<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de administración de reservas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 1280px;
      margin: 20px auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    h2 {
      margin: 8px 0 0;
      font-size: 18px;
      font-weight: normal;
    }

    .cabecera {
      position: relative;
      min-height: 150px;
      margin-bottom: 16px;
      border-bottom: 1px solid #d9e0e7;
      padding-bottom: 16px;
    }

    .logo {
      position: absolute;
      left: 0;
      top: 0;
      max-width: 110px;
      height: auto;
    }

    .cabecera-centro {
      text-align: center;
      padding: 0 220px 0 220px;
    }

    .lugar {
      margin-top: 10px;
      font-size: 15px;
      color: #333;
    }

    .nav-admin {
      margin-top: 22px;
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .nav-btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #1e2a36;
      text-decoration: none;
      font-size: 14px;
      line-height: 1;
      transition: all 0.15s ease;
    }

    .nav-btn:hover {
      background: #f7f9fb;
    }

    .nav-btn.activo {
      background: #0b5ed7;
      color: #fff;
      border-color: #0b5ed7;
    }

    .cabecera-acciones {
      position: absolute;
      right: 0;
      top: 0;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-icono {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid #bfc9d4;
      background: #fff;
      color: #4a5a6a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .btn-icono:hover {
      background: #f7f9fb;
      color: #0b5ed7;
      border-color: #9fb2c7;
    }

    .btn-icono svg {
      width: 18px;
      height: 18px;
    }

    .btn-icono:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      color: #8a98a8;
      background: #f8fafc;
    }

    .bloque {
      background: #f7f9fb;
      border: 1px solid #dde4ea;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .bloque h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 16px;
    }

    .filtros {
      display: grid;
      grid-template-columns: 160px 200px 160px 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      background: #fff;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      color: #fff;
      background: #0b5ed7;
    }

    .btn:hover {
      background: #094db1;
    }

    .btn-secundario {
      background: #6c757d;
    }

    .btn-secundario:hover {
      background: #565e64;
    }

    .resumen-linea {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .resumen {
      font-weight: bold;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .acciones-superiores {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid #dde4ea;
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
      word-wrap: break-word;
    }

    th {
      background: #eef4ff;
      color: #1d4f91;
      font-weight: bold;
    }

    th.sel-col, td.sel-col {
      width: 42px;
      text-align: center;
    }

    th.codigo-col, td.codigo-col {
      width: 120px;
    }

    th.fecha-col, td.fecha-col {
      width: 140px;
    }

    th.centro-col, td.centro-col {
      width: 170px;
    }

    th.contacto-col, td.contacto-col {
      width: 150px;
    }

    th.telmail-col, td.telmail-col {
      width: 160px;
    }

    th.res-col, td.res-col {
      width: 90px;
      text-align: center;
    }

    th.asig-col, td.asig-col {
      width: 90px;
      text-align: center;
    }

    th.tipo-col, td.tipo-col {
      width: 120px;
    }

    th.estado-col, td.estado-col {
      width: 110px;
    }

    .codigo {
      font-weight: bold;
    }

    .estado-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
    }

    .estado-badge.pendiente { background: #d39e00; }
    .estado-badge.confirmada { background: #198754; }
    .estado-badge.rechazada { background: #dc3545; }
    .estado-badge.cancelada { background: #6c757d; }

    .fila-seleccionada {
      background: #f2f7ff;
    }

    .muted {
      color: #6b7280;
    }

    .mensaje {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    @media (max-width: 1200px) {
      .filtros {
        grid-template-columns: 1fr 1fr;
      }

      .cabecera-centro {
        padding: 120px 0 0 0;
      }

      .logo {
        position: static;
        display: block;
        margin: 0 auto 12px auto;
      }

      .cabecera-acciones {
        position: static;
        justify-content: center;
        margin-top: 14px;
      }

      .cabecera {
        min-height: auto;
      }
    }

    @media (max-width: 980px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        margin-bottom: 16px;
        border: 1px solid #dde4ea;
        border-radius: 8px;
        overflow: hidden;
      }

      td {
        border-bottom: 1px solid #eef2f6;
      }

      td.sel-col {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo Armada" class="logo">

      <div class="cabecera-centro">
        <h1 id="tituloEvento">DIFAS 2026</h1>
        <h2>Panel de administración de reservas</h2>
        <div class="lugar" id="lugarEvento"><strong>Lugar:</strong> ARFER</div>

        <div class="nav-admin">
          <a class="nav-btn" href="admin-franjas.html">Franjas</a>
          <a class="nav-btn activo" href="admin-reservas.html">Reservas</a>
          <a class="nav-btn" href="admin-calendario.html">Calendario</a>
        </div>
      </div>

      <div class="cabecera-acciones">
        <button type="button" class="btn-icono" id="btnRecargar" title="Recargar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <polyline points="21 3 21 9 15 9"></polyline>
          </svg>
        </button>

        <button type="button" class="btn-icono" id="btnLogout" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <div class="bloque">
      <h3>Filtros</h3>
      <div class="filtros">
        <div>
          <label for="filtroFecha">Fecha</label>
          <input type="date" id="filtroFecha">
        </div>

        <div>
          <label for="filtroFranja">Franja</label>
          <select id="filtroFranja">
            <option value="">Todas</option>
          </select>
        </div>

        <div>
          <label for="filtroEstado">Estado</label>
          <select id="filtroEstado">
            <option value="">Todos</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="CONFIRMADA">Confirmada</option>
            <option value="RECHAZADA">Rechazada</option>
            <option value="CANCELADA">Cancelada</option>
          </select>
        </div>

        <div>
          <label for="filtroBuscar">Buscar</label>
          <input type="text" id="filtroBuscar" placeholder="Código, centro, contacto, email o teléfono">
        </div>

        <button type="button" class="btn" id="btnAplicarFiltros">Aplicar filtros</button>
        <button type="button" class="btn btn-secundario" id="btnLimpiarFiltros">Limpiar</button>
      </div>
    </div>

    <div class="bloque">
      <div class="resumen-linea">
        <div class="resumen" id="resumenPanel"></div>

        <div class="acciones-superiores">
          <button type="button" class="btn-icono" id="btnEditarSeleccion" title="Editar reserva" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
            </svg>
          </button>

          <button type="button" class="btn-icono" id="btnAsistentesSeleccion" title="Gestionar asistentes" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </button>

          <button type="button" class="btn-icono" id="btnConfirmarSeleccion" title="Confirmar" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </button>

          <button type="button" class="btn-icono" id="btnRechazarSeleccion" title="Rechazar" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>

          <button type="button" class="btn-icono" id="btnCancelarSeleccion" title="Cancelar" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
        </div>
      </div>

      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th class="sel-col"></th>
              <th class="codigo-col">Código</th>
              <th class="fecha-col">Fecha / franja</th>
              <th class="centro-col">Centro</th>
              <th class="contacto-col">Contacto</th>
              <th class="telmail-col">Teléfono / email</th>
              <th class="res-col">Plazas reservadas</th>
              <th class="asig-col">Plazas asignadas</th>
              <th class="tipo-col">Alumnos / profesores</th>
              <th class="estado-col">Estado</th>
              <th>Observaciones</th>
            </tr>
          </thead>
          <tbody id="tbodyReservas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let reservaSeleccionada = null;
    let reservasActuales = [];

    function mostrarMensaje(tipo, texto) {
      const m = document.getElementById("mensaje");
      m.className = "mensaje " + tipo;
      m.style.display = "block";
      m.textContent = texto;
    }

    function limpiarMensaje() {
      const m = document.getElementById("mensaje");
      m.className = "mensaje";
      m.style.display = "none";
      m.textContent = "";
    }

    function claseEstado(estado) {
      const e = String(estado || "").toLowerCase();
      if (e === "pendiente") return "pendiente";
      if (e === "confirmada") return "confirmada";
      if (e === "rechazada") return "rechazada";
      if (e === "cancelada") return "cancelada";
      return "";
    }

    function leerFiltros() {
      return {
        fecha: document.getElementById("filtroFecha").value || "",
        franja: document.getElementById("filtroFranja").value || "",
        estado: document.getElementById("filtroEstado").value || "",
        buscar: document.getElementById("filtroBuscar").value.trim()
      };
    }

    function construirQuery(filtros) {
      const params = new URLSearchParams();
      if (filtros.fecha) params.set("fecha", filtros.fecha.split("-").reverse().join("/"));
      if (filtros.franja) params.set("franja", filtros.franja);
      if (filtros.estado) params.set("estado", filtros.estado);
      if (filtros.buscar) params.set("buscar", filtros.buscar);
      return params.toString();
    }

    function pintarFranjas(franjas) {
      const sel = document.getElementById("filtroFranja");
      const valorActual = sel.value;
      sel.innerHTML = `<option value="">Todas</option>`;

      franjas.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f.id;
        opt.textContent = `${f.fecha} - ${f.hora_inicio} a ${f.hora_fin}`;
        if (String(valorActual) === String(f.id)) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function pintarResumen(resumen) {
      document.getElementById("resumenPanel").innerHTML = `
        <span>Total solicitudes: ${resumen.total_solicitudes}</span>
        <span>|</span>
        <span>Pendientes: ${resumen.pendientes}</span>
        <span>|</span>
        <span>Confirmadas: ${resumen.confirmadas}</span>
        <span>|</span>
        <span>Rechazadas: ${resumen.rechazadas}</span>
        <span>|</span>
        <span>Canceladas: ${resumen.canceladas}</span>
        <span>|</span>
        <span>Plazas asignadas: ${resumen.plazas_asignadas}</span>
      `;
    }

    function actualizarBotonesAccion() {
      const hay = !!reservaSeleccionada;

      const btnEditar = document.getElementById("btnEditarSeleccion");
      const btnAsist = document.getElementById("btnAsistentesSeleccion");
      const btnConfirmar = document.getElementById("btnConfirmarSeleccion");
      const btnRechazar = document.getElementById("btnRechazarSeleccion");
      const btnCancelar = document.getElementById("btnCancelarSeleccion");

      btnEditar.disabled = !hay;
      btnAsist.disabled = !hay;
      btnConfirmar.disabled = !hay || reservaSeleccionada.estado !== "PENDIENTE";
      btnRechazar.disabled = !hay || reservaSeleccionada.estado !== "PENDIENTE";
      btnCancelar.disabled = !hay || !["PENDIENTE", "CONFIRMADA"].includes(reservaSeleccionada.estado);
    }

    function seleccionarReserva(id) {
      reservaSeleccionada = reservasActuales.find(r => Number(r.id) === Number(id)) || null;
      pintarReservas(reservasActuales);
      actualizarBotonesAccion();
    }

    function pintarReservas(reservas) {
      reservasActuales = reservas.slice();
      const tbody = document.getElementById("tbodyReservas");

      if (reservaSeleccionada) {
        const sigue = reservasActuales.find(r => Number(r.id) === Number(reservaSeleccionada.id));
        reservaSeleccionada = sigue || null;
      }

      if (!reservas.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="11" class="muted">No hay reservas que coincidan con los filtros.</td>
          </tr>
        `;
        actualizarBotonesAccion();
        return;
      }

      tbody.innerHTML = reservas.map(r => `
        <tr class="${reservaSeleccionada && Number(reservaSeleccionada.id) === Number(r.id) ? 'fila-seleccionada' : ''}">
          <td class="sel-col">
            <input
              type="radio"
              name="seleccionReserva"
              ${reservaSeleccionada && Number(reservaSeleccionada.id) === Number(r.id) ? 'checked' : ''}
              onchange="seleccionarReserva(${r.id})"
            >
          </td>
          <td class="codigo-col">
            <div class="codigo">${r.codigo_reserva}</div>
          </td>
          <td class="fecha-col">
            ${r.fecha}<br>
            ${r.hora_inicio} - ${r.hora_fin}
          </td>
          <td class="centro-col">${r.centro}</td>
          <td class="contacto-col">${r.contacto || '<span class="muted">Sin contacto</span>'}</td>
          <td class="telmail-col">
            ${r.telefono || ""}<br>
            <span class="muted">${r.email || ""}</span>
          </td>
          <td class="res-col">${r.plazas_reservadas}</td>
          <td class="asig-col">${r.plazas_asignadas}</td>
          <td class="tipo-col">
            Alumnos: ${r.alumnos}<br>
            Profesores: ${r.profesores}
          </td>
          <td class="estado-col">
            <span class="estado-badge ${claseEstado(r.estado)}">${r.estado}</span>
          </td>
          <td>${r.observaciones || '<span class="muted">Sin observaciones</span>'}</td>
        </tr>
      `).join("");

      actualizarBotonesAccion();
    }

    async function cargarPanel() {
      limpiarMensaje();

      try {
        const filtros = leerFiltros();
        const query = construirQuery(filtros);
        const url = `/api/admin/reservas${query ? "?" + query : ""}`;

        const res = await fetch(url, { credentials: "same-origin" });
        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cargar el panel.");
        }

        pintarFranjas(data.franjas || []);
        pintarResumen(data.resumen || {
          total_solicitudes: 0,
          pendientes: 0,
          confirmadas: 0,
          rechazadas: 0,
          canceladas: 0,
          plazas_asignadas: 0
        });
        pintarReservas(data.reservas || []);
      } catch (error) {
        mostrarMensaje("error", error.message || "Error al cargar el panel.");
      }
    }

    async function cerrarSesion() {
      try {
        await fetch("/api/admin/logout", {
          method: "POST",
          credentials: "same-origin"
        });
      } catch (_) {
      }
      window.location.href = "index.html";
     }

    async function abrirEditarSeleccion() {
  if (!reservaSeleccionada) return;

  if (!reservaSeleccionada.token_edicion) {
    mostrarMensaje("error", "La reserva seleccionada no incluye token de edición.");
    return;
  }

  window.location.href = `editar.html?token=${encodeURIComponent(reservaSeleccionada.token_edicion)}`;
}


    async function abrirAsistentesSeleccion() {
  if (!reservaSeleccionada) return;

  if (!reservaSeleccionada.token_edicion) {
    mostrarMensaje("error", "La reserva seleccionada no incluye token de edición.");
    return;
  }

  window.location.href = `asistentes.html?token=${encodeURIComponent(reservaSeleccionada.token_edicion)}`;
}


    async function cambiarEstadoSeleccion(estado) {
      if (!reservaSeleccionada) return;

      let texto = "¿Desea aplicar el cambio de estado?";
      if (estado === "CONFIRMADA") texto = "¿Desea confirmar esta solicitud?";
      if (estado === "RECHAZADA") texto = "¿Desea rechazar esta solicitud?";
      if (estado === "CANCELADA") texto = "¿Desea cancelar esta solicitud?";

      if (!window.confirm(texto)) return;

      limpiarMensaje();

      try {
        const res = await fetch("/api/admin/reserva-estado", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            reserva_id: reservaSeleccionada.id,
            estado
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "No se pudo cambiar el estado.");
        }

        mostrarMensaje("ok", data.mensaje || "Estado actualizado correctamente.");
        await cargarPanel();
      } catch (error) {
        mostrarMensaje("error", error.message || "No se pudo cambiar el estado.");
      }
    }

    document.getElementById("btnAplicarFiltros").addEventListener("click", cargarPanel);

    document.getElementById("btnLimpiarFiltros").addEventListener("click", function () {
      document.getElementById("filtroFecha").value = "";
      document.getElementById("filtroFranja").value = "";
      document.getElementById("filtroEstado").value = "";
      document.getElementById("filtroBuscar").value = "";
      reservaSeleccionada = null;
      cargarPanel();
    });

    document.getElementById("btnRecargar").addEventListener("click", cargarPanel);
    document.getElementById("btnLogout").addEventListener("click", cerrarSesion);

    document.getElementById("btnEditarSeleccion").addEventListener("click", abrirEditarSeleccion);
    document.getElementById("btnAsistentesSeleccion").addEventListener("click", abrirAsistentesSeleccion);
    document.getElementById("btnConfirmarSeleccion").addEventListener("click", function () {
      cambiarEstadoSeleccion("CONFIRMADA");
    });
    document.getElementById("btnRechazarSeleccion").addEventListener("click", function () {
      cambiarEstadoSeleccion("RECHAZADA");
    });
    document.getElementById("btnCancelarSeleccion").addEventListener("click", function () {
      cambiarEstadoSeleccion("CANCELADA");
    });

    cargarPanel();

    window.seleccionarReserva = seleccionarReserva;
  </script>
</body>
</html>
