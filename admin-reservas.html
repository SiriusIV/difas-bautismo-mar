<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de reservas</title>
  <style>
    html, body { height: 100%; }
    body {
      font-family: Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.78) 12%, rgba(255,255,255,0.42) 26%, rgba(255,255,255,0.18) 42%, rgba(255,255,255,0.10) 100%),
        linear-gradient(180deg, rgba(244,246,248,0.18) 0%, rgba(244,246,248,0.24) 100%),
        url("assets/fondo_cabecera.png") top center / 100% auto no-repeat,
        #f4f6f8;
      background-blend-mode: normal, screen, normal;
      margin: 0;
      color: #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }
    .cabecera-global { background: transparent; box-shadow: none; padding: 18px 20px 14px; flex: 0 0 auto; z-index: 20; }
    .cabecera-global-inner { max-width: 1108px; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
    .bloque-marca { display: flex; align-items: center; justify-content: center; gap: 50px; flex-wrap: wrap; text-align: left; }
.logo-cabecera { width: 101px; height: auto; display: block; transition: opacity 0.12s ease; }
.logo-cabecera.logo-admin-personal { width: 101px; }
    .logo-cabecera.logo-pendiente { opacity: 0; }
    .titulos-cabecera h1 { margin: 0; font-size: 24px; color: #123a63; line-height: 1.15; font-weight: 600; }
    .titulos-cabecera h2 { margin: 4px 0 0; font-size: 14px; font-weight: normal; color: #4a5a6a; text-align: left; }
    .app-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; }
    .contenedor { max-width: 1108px; margin: 14px auto 22px; padding: 0 16px 20px; }
    .barra-navegacion, .bloque { background: #fff; border-radius: 14px; box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
    .barra-navegacion { position: relative; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: flex-end; gap: 12px; flex-wrap: wrap; min-height: 58px; }
    .barra-navegacion-izq { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; text-align: center; width: min(100%, 560px); pointer-events: none; }
    .panel-titulo { white-space: nowrap; font-size: 20px; font-weight: 700; color: #163c67; line-height: 1.2; letter-spacing: 0.01em; }
    .barra-navegacion-der, .nav-admin, .acciones-superiores, .filtro-acciones { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .barra-navegacion-der, .nav-admin { margin-left: auto; }
    .nav-btn { display: inline-block; padding: 7px 14px; border-radius: 999px; border: 1px solid #bfc9d4; background: #fff; color: #1e2a36; text-decoration: none; font-size: 13px; line-height: 1; transition: all 0.15s ease; cursor: pointer; }
    .nav-btn:hover { background: #f7f9fb; }
    .nav-btn.activo { background: #0b5ed7; color: #fff; border-color: #0b5ed7; }
    .btn-icono, .btn-icono-filtro { width: 36px; height: 36px; border-radius: 999px; border: 1px solid #bfc9d4; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; padding: 0; }
    .btn-icono { background: #fff; color: #4a5a6a; }
    .btn-icono:hover { background: #f7f9fb; color: #0b5ed7; border-color: #9fb2c7; }
    .btn-icono:disabled { opacity: 0.45; cursor: not-allowed; color: #8a98a8; background: #f8fafc; }
    .btn-icono svg, .btn-icono-filtro svg { width: 18px; height: 18px; }
    #btnEditarSeleccion, #btnAsistentesSeleccion { display: none !important; }
    .bloque { padding: 14px; margin-bottom: 10px; }
    .bloque h3 { margin: 0 0 12px; font-size: 15px; color: #123a63; }
    .filtros { display: grid; grid-template-columns: 282px 150px 150px minmax(180px, 1fr) auto; gap: 10px; align-items: end; }
    label { display: block; font-weight: bold; margin-bottom: 6px; color: #123a63; font-size: 13px; }
    input[type="text"], input[type="date"], select { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #c9cfd6; border-radius: 8px; font-size: 13px; background: #fff; color: #1e2a36; }
    .filtro-acciones-rapidas { display: flex; align-items: end; justify-content: center; min-height: 40px; }
    .btn-filtros-reset { width: 40px; height: 40px; border: none; background: transparent; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
    .btn-filtros-reset img { width: 22px; height: 22px; display: block; transition: transform 0.15s ease, opacity 0.15s ease; }
    .btn-filtros-reset:hover img { transform: scale(1.06); opacity: 0.88; }
    .resumen-linea { display: grid; grid-template-columns: minmax(0, 1fr) minmax(180px, 220px) auto; align-items: center; gap: 16px; margin-bottom: 12px; }
    .resumen { font-weight: 700; display: flex; gap: 12px; flex-wrap: wrap; color: #123a63; font-size: 13px; }
    .resumen-centro { display: flex; align-items: center; justify-content: center; }
    .resumen-centro select { width: 100%; max-width: 220px; min-width: 160px; height: 34px; padding: 7px 30px 7px 10px; border: 1px solid #c9cfd6; border-radius: 8px; font-size: 13px; background: #fff; color: #1e2a36; }
    .tabla-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 930px; border-collapse: collapse; background: #fff; table-layout: fixed; font-size: 13px; }
    th, td { border-bottom: 1px solid #dde4ea; padding: 9px 8px; text-align: left; vertical-align: middle; line-height: 1.3; }
    th { background: #eef4ff; color: #1d4f91; font-weight: bold; }
    th.sel-col, td.sel-col { width: 30px; min-width: 30px; max-width: 30px; text-align: center; }
    th.obs-col, td.obs-col { width: 32px; min-width: 32px; max-width: 32px; text-align: center; }
    th.fecha-col, td.fecha-col { width: 82px; min-width: 82px; }
    th.actividad-col, td.actividad-col { width: 260px; min-width: 260px; }
    th.solicitante-col, td.solicitante-col { width: 170px; min-width: 170px; }
    th.estado-col, td.estado-col { width: 128px; min-width: 128px; text-align: center; }
    .encabezado-estado { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .encabezado-estado-icono { width: 14px; height: 14px; display: inline-block; opacity: 0.8; flex: 0 0 auto; }
    th.horario-col, td.horario-col { width: 112px; min-width: 112px; text-align: center; }
    th.res-col, td.res-col, th.asig-col, td.asig-col, th.tipo-col, td.tipo-col { width: 90px; min-width: 90px; text-align: center; }
    th.tipo-col, td.tipo-col { width: 132px; min-width: 132px; }
    th.hist-col, td.hist-col { width: 54px; min-width: 54px; max-width: 54px; text-align: center; }
    td.actividad-col, td.solicitante-col { white-space: normal; overflow-wrap: anywhere; }
    .actividad-nombre { font-weight: 700; color: #123a63; }
    .fecha-principal, .horario-principal { white-space: nowrap; }
    .fecha-secundaria { display: none; }
    .estado-badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; color: #fff; white-space: nowrap; }
    .estado-badge.pendiente { background: #d39e00; } .estado-badge.confirmada { background: #198754; } .estado-badge.suspendida { background: #b7791f; } .estado-badge.rechazada { background: #dc3545; }
    .estado-trigger-admin { border: none; background: transparent; padding: 0; margin: 0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .estado-trigger-admin:hover .estado-badge, .estado-trigger-admin:focus-visible .estado-badge { box-shadow: 0 0 0 2px rgba(11,94,215,0.16); transform: translateY(-1px); }
    .fila-seleccionada { background: #f2f7ff; }
    .muted { color: #6b7280; }
    .mensaje { margin-bottom: 10px; padding: 10px 12px; border-radius: 8px; display: none; font-size: 13px; }
    .mensaje.error { display: block; background: #fdeaea; color: #9b1c1c; border: 1px solid #f5c2c2; }
    .mensaje.ok { display: block; background: #eaf7ea; color: #146c2e; border: 1px solid #b9e0c0; }
    .icono-observacion { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; cursor: pointer; background: transparent; border: none; padding: 0; }
    .icono-observacion svg { width: 16px; height: 16px; display: block; }
    .icono-observacion:hover { transform: scale(1.08); }
    .btn-historial { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #cfd9e4; background: #fff; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
    .btn-historial:hover, .btn-historial:focus-visible { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(17, 74, 134, 0.16); border-color: #8fb2d8; }
    .btn-historial img { width: 16px; height: 16px; display: block; }
    td.sel-col input[type="radio"] { margin: 0; transform: scale(0.9); }
    .modal-fondo { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 9999; }
    .modal-fondo.activo { display: flex; }
    .modal { position: relative; background: #fff; width: 100%; max-width: 720px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 24px; }
    .modal h3 { margin: 0 0 14px; font-size: 24px; }
    .modal-contenido { background: #f7f9fb; border: 1px solid #dde4ea; border-radius: 8px; padding: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .modal-contenido.estado-modal-admin { white-space: normal; }
    .campo-modal { margin-top: 14px; }
    .campo-modal textarea { width: 100%; min-height: 110px; box-sizing: border-box; border: 1px solid #c9cfd6; border-radius: 8px; padding: 10px 12px; font-family: Arial, sans-serif; font-size: 13px; resize: vertical; }
    .nota-modal-admin { margin-top: 10px; color: #8a5b00; font-size: 12px; line-height: 1.45; }
    .mensaje-modal-admin { margin-top: 10px; padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.45; display: none; }
    .mensaje-modal-admin.error { display: block; background: #fdeaea; color: #9b1c1c; border: 1px solid #f5c2c2; }
    .historial-modal { margin-top: 16px; padding-top: 14px; border-top: 1px solid #dde4ea; }
    .historial-modal h4 { margin: 0 0 10px; font-size: 14px; color: #123a63; }
    .historial-lista { display: flex; flex-direction: column; gap: 10px; }
    .historial-item { background: #fff; border: 1px solid #dde4ea; border-radius: 8px; padding: 10px 12px; }
    .historial-cabecera { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 5px; }
    .historial-actor { font-weight: 700; color: #123a63; }
    .historial-fecha { color: #6b7280; font-size: 12px; }
    .historial-detalle { color: #21374d; line-height: 1.45; }
    .historial-observaciones { margin-top: 6px; padding: 8px 10px; border-radius: 7px; background: #fff8e6; border: 1px solid #f1d58b; color: #5a4630; line-height: 1.45; }
    .historial-vacio { color: #6b7280; font-size: 13px; }
    .modal-acciones { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
    .btn-modal { border: 1px solid #bfc9d4; background: #fff; color: #1e2a36; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .btn-modal:hover { background: #f7f9fb; }
    .btn-modal.btn-modal-principal { background: #0b5ed7; border-color: #0b5ed7; color: #fff; }
    .btn-modal.btn-modal-principal:hover { background: #0a53be; }
    .modal-cerrar-superior { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 999px; border: 1px solid #cfd9e4; background: #fff; color: #5b6b7c; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; font-size: 18px; line-height: 1; }
    .modal-cerrar-superior:hover { background: #f7f9fb; color: #0b5ed7; border-color: #9fb2c7; }
    .modal-subtitulo { margin: -6px 0 12px; font-size: 14px; font-weight: 400; color: #4a5a6a; line-height: 1.3; }
    @media (max-width: 1200px) { .filtros { grid-template-columns: 1fr 1fr; } .bloque-marca { gap: 28px; } }
    @media (max-width: 980px) { .cabecera-global-inner, .contenedor { max-width: 100%; } .barra-navegacion, .barra-navegacion-der, .nav-admin { align-items: stretch; margin-left: 0; } table, thead, tbody, th, td, tr { display: block; } thead { display: none; } tr { margin-bottom: 16px; border: 1px solid #dde4ea; border-radius: 8px; overflow: hidden; } td { border-bottom: 1px solid #eef2f6; white-space: normal !important; text-align: left !important; } table { min-width: 100%; } }
@media (max-width: 700px) { .bloque-marca { flex-direction: column; text-align: center; gap: 10px; } .barra-navegacion { justify-content: center; padding-top: 16px; padding-bottom: 12px; } .barra-navegacion-izq { position: static; transform: none; width: 100%; order: -1; pointer-events: auto; } .barra-navegacion-der { width: 100%; justify-content: center; } .panel-titulo { font-size: 18px; } .titulos-cabecera h2 { text-align: center; } .logo-cabecera { width: 82px; } .logo-cabecera.logo-admin-personal { width: 82px; } }
  </style>
</head>
<body>
  <div class="cabecera-global">
    <div class="cabecera-global-inner">
      <div class="bloque-marca">
        <img src="logo.png" alt="Logo administrador" class="logo-cabecera logo-pendiente" id="logoCabeceraAdminReservas">
        <div class="titulos-cabecera">
          <h1>Actividades Públicas Institucionales</h1>
          <h2 id="subtituloCabecera">Administrador</h2>
        </div>
      </div>
    </div>
  </div>
  <div class="app-scroll">
    <div class="contenedor">
      <div class="barra-navegacion">
        <div class="barra-navegacion-izq">
          <span class="panel-titulo" id="subactividadActual">Panel de reservas</span>
        </div>
        <div class="barra-navegacion-der">
          <div class="nav-admin">
            <a class="btn-icono" id="navCalendario" href="admin-calendario.html" title="Calendario" aria-label="Calendario"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
            <a class="btn-icono" href="portal.html" title="Portal" aria-label="Portal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"></path><path d="M5 9.5V21h14V9.5"></path><path d="M9 21v-6h6v6"></path></svg></a>
          </div>
        </div>
      </div>
      <div id="mensaje" class="mensaje"></div>
      <div class="bloque">
        <h3>Filtros</h3>
        <div class="filtros">
          <div><label for="filtroActividad">Actividad</label><select id="filtroActividad"><option value="">Todas</option></select></div>
          <div><label for="filtroFechaInicio">Fecha inicio</label><input type="date" id="filtroFechaInicio"></div>
          <div><label for="filtroFechaFin">Fecha fin</label><input type="date" id="filtroFechaFin"></div>
          <div><label for="filtroBuscar">Solicitante</label><select id="filtroBuscar"><option value="">Todos</option></select></div>
          <div class="filtro-acciones-rapidas">
            <button type="button" class="btn-filtros-reset" id="btnLimpiarFiltros" title="Quitar filtros" aria-label="Quitar filtros">
              <img src="assets/remove_filter_icon_216117.svg" alt="" aria-hidden="true">
            </button>
          </div>
        </div>
      </div>
      <div class="bloque">
        <div class="resumen-linea">
          <div class="resumen" id="resumenPanel"></div>
          <div class="resumen-centro">
            <select id="filtroEstadoCabecera">
              <option value="">Todas</option>
              <option value="PENDIENTE">Pendiente</option>
              <option value="CONFIRMADA">Confirmada</option>
              <option value="SUSPENDIDA">Suspendida</option>
              <option value="RECHAZADA">Rechazada</option>
            </select>
          </div>
          <div class="acciones-superiores">
            <button type="button" class="btn-icono" id="btnConfirmarSeleccion" title="Confirmar" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
            <button type="button" class="btn-icono" id="btnRechazarSeleccion" title="Rechazar" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
          </div>
        </div>
        <div class="tabla-wrap">
          <table>
            <thead><tr><th class="sel-col"></th><th class="obs-col"></th><th class="fecha-col">Fecha</th><th class="actividad-col">Actividad</th><th class="solicitante-col">Solicitante</th><th class="estado-col"><span class="encabezado-estado"><img src="assets/icono-estado-clicable.svg" alt="" aria-hidden="true" class="encabezado-estado-icono"><span>Estado</span></span></th><th class="horario-col">Horario</th><th class="res-col">Plazas reservadas</th><th class="asig-col">Plazas asignadas</th><th class="tipo-col">Alumnos / Profesores</th><th class="hist-col">Log</th></tr></thead>
            <tbody id="tbodyReservas"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <div id="modalObservaciones" class="modal-fondo" aria-hidden="true">
    <div class="modal">
      <button type="button" class="modal-cerrar-superior" id="btnCerrarModalObservacionesSuperior" aria-label="Cerrar">×</button>
      <h3 id="modalObservacionesTitulo">Observaciones</h3>
      <div id="modalObservacionesSubtitulo" class="modal-subtitulo"></div>
      <div id="modalObservacionesContenido" class="modal-contenido"></div>
      <div class="modal-acciones" id="modalObservacionesAcciones"><button type="button" class="btn-modal" id="btnCerrarModalObservaciones">Cerrar</button></div>
    </div>
  </div>
  <script>
    let reservaSeleccionada = null;
    let reservasActuales = [];
    let nombreAdminPanel = "Administrador";
    let reservaModalEstado = null;
    let accionPreferidaModal = "";
    function aplicarLogoCabeceraAdmin(img, userLike = {}) {
      if (!img) return;
      img.style.width = "";
      const logoUsuario = String(userLike?.logo_url || "").trim();
      img.classList.remove("logo-admin-personal");
      img.src = logoUsuario || "logo.png";
      if (logoUsuario) img.classList.add("logo-admin-personal");
      img.classList.remove("logo-pendiente");
    }
    function mostrarMensaje(tipo, texto) { const m = document.getElementById("mensaje"); m.className = "mensaje " + tipo; m.style.display = "block"; m.textContent = texto; }
    function limpiarMensaje() { const m = document.getElementById("mensaje"); m.className = "mensaje"; m.style.display = "none"; m.textContent = ""; }
    function claseEstado(estado) { const e = String(estado || "").toLowerCase(); if (e === "pendiente") return "pendiente"; if (e === "confirmada") return "confirmada"; if (e === "suspendida") return "suspendida"; if (e === "rechazada") return "rechazada"; return ""; }
    function textoEstadoVisible(estado) { const e = String(estado || "").toUpperCase(); if (e === "PENDIENTE") return "PENDIENTE"; if (e === "CONFIRMADA") return "CONFIRMADA"; if (e === "SUSPENDIDA") return "SUSPENDIDA"; if (e === "RECHAZADA") return "RECHAZADA"; return e || ""; }
    function escapeHtml(texto) { return String(texto || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;"); }
    function formatearFechaHoraHistorial(fechaTexto) { const texto = String(fechaTexto || "").trim(); if (!texto) return ""; const fecha = new Date(texto.replace(" ", "T")); if (Number.isNaN(fecha.getTime())) return texto; return fecha.toLocaleString("es-ES", { dateStyle: "short", timeStyle: "short" }); }
    function etiquetaAccionHistorial(item = {}) { const accion = String(item.accion || "").toUpperCase(); const origen = textoEstadoVisible(item.estado_origen); const destino = textoEstadoVisible(item.estado_destino); if (accion === "SOLICITUD_PRESENTADA") return `Solicitud presentada en estado ${destino || "PENDIENTE"}`; if (accion === "CAMBIO_ESTADO_ADMIN") return `Cambio manual de ${origen || "sin estado"} a ${destino || "sin estado"}`; if (accion === "ANULACION_ACTIVIDAD") return `Rechazo automático por anulación de actividad`; if (accion === "CAMBIO_REQUISITOS") return `Revisión por cambio de requisitos`; if (accion === "CAMBIO_FRANJA") return `Revisión por cambio de franja`; if (accion === "CADUCIDAD_SUSPENSION") return `Rechazo automático por vencimiento`; if (origen || destino) return `${origen || "Sin estado"} -> ${destino || "Sin estado"}`; return accion || "Movimiento registrado"; }
    function renderHistorialReserva(historial = []) { const items = Array.isArray(historial) ? historial : []; if (!items.length) return `<div class="historial-modal"><h4>Historial de tramitación</h4><div class="historial-vacio">Todavía no hay movimientos registrados para esta solicitud.</div></div>`; return `<div class="historial-modal"><h4>Historial de tramitación</h4><div class="historial-lista">${items.map((item) => `<div class="historial-item"><div class="historial-cabecera"><span class="historial-actor">${escapeHtml(item.actor_nombre || item.actor_rol || "Sistema")}</span><span class="historial-fecha">${escapeHtml(formatearFechaHoraHistorial(item.fecha_evento))}</span></div><div class="historial-detalle">${escapeHtml(etiquetaAccionHistorial(item))}</div>${item.observaciones ? `<div class="historial-observaciones">${escapeHtml(item.observaciones)}</div>` : ""}</div>`).join("")}</div></div>`; }
    function actividadIdDesdeURL() { const params = new URLSearchParams(window.location.search); const v = parseInt(params.get("actividad_id") || "", 10); return Number.isInteger(v) && v > 0 ? v : ""; }
    function formatearFechaCorta(fechaIso) {
      const texto = String(fechaIso || "").trim();
      if (!texto) return "-";
      const partes = texto.split("-");
      if (partes.length !== 3) return texto;
      return `${partes[2].slice(-2)}/${partes[1].slice(-2)}/${partes[0].slice(-2)}`;
    }
    function parsearFechaHoraReserva(fechaIso, horaTexto) {
      const fecha = String(fechaIso || "").trim();
      const hora = String(horaTexto || "").trim();
      if (!fecha) return null;
      const fechaHora = new Date(`${fecha}T${hora || "00:00"}:00`);
      if (Number.isNaN(fechaHora.getTime())) return null;
      return fechaHora;
    }
    function reservaYaPasada(reserva) {
      const fechaFin = parsearFechaHoraReserva(reserva?.fecha, reserva?.hora_fin);
      if (!fechaFin) return false;

    }
    function puedeConfirmarseReserva(reserva) {

    function puedeRechazarseReserva(reserva) {

    }
    async function cargarSesionCabecera() { try { const res = await fetch("/api/usuario/session", { credentials: "same-origin" }); const data = await res.json().catch(() => null); const logoEl = document.getElementById("logoCabeceraAdminReservas"); if (!res.ok || !data?.ok || !data?.authenticated || !data?.user) { if (logoEl) { logoEl.src = "logo.png"; logoEl.classList.remove("logo-pendiente"); } return; } const nombre = data.user.nombre || data.user.email || "Administrador"; nombreAdminPanel = String(nombre).toUpperCase(); document.getElementById("subtituloCabecera").textContent = nombreAdminPanel; document.getElementById("subactividadActual").textContent = `Panel de reservas de ${nombreAdminPanel}`; aplicarLogoCabeceraAdmin(logoEl, data.user); } catch (_) { const logoEl = document.getElementById("logoCabeceraAdminReservas"); if (logoEl) { logoEl.src = "logo.png"; logoEl.classList.remove("logo-pendiente"); } } }
    function actualizarNavegacionActividad() { const actividadId = (() => { const v = parseInt(document.getElementById("filtroActividad").value || "", 10); return Number.isInteger(v) && v > 0 ? v : ""; })(); const sufijo = actividadId ? `?actividad_id=${encodeURIComponent(actividadId)}` : ""; document.getElementById("navCalendario").href = `admin-calendario.html${sufijo}`; }

    async function cargarActividadesFiltro() { try { const res = await fetch("/api/admin/mis-actividades", { credentials: "same-origin" }); const data = await res.json(); if (!res.ok || !data.ok) return; const sel = document.getElementById("filtroActividad"); const valorActual = actividadIdDesdeURL() || sel.value || ""; sel.innerHTML = `<option value="">Todas</option>`; (data.actividades || []).forEach((a) => { const opt = document.createElement("option"); opt.value = a.id; opt.textContent = a.titulo_publico || a.nombre; if (String(valorActual) === String(a.id)) opt.selected = true; sel.appendChild(opt); }); actualizarSubactividad(); } catch (_) {} }
    function poblarSolicitantesFiltro(solicitantes = []) {
      const sel = document.getElementById("filtroBuscar");

        opt.value = texto;

        sel.appendChild(opt);
      });
    }

    function pintarResumen(resumen) { document.getElementById("resumenPanel").innerHTML = `<span>Total solicitudes: ${resumen.total_solicitudes}</span><span>|</span><span>Pendientes: ${resumen.pendientes}</span><span>|</span><span>Confirmadas: ${resumen.confirmadas}</span><span>|</span><span>Suspendidas: ${Number(resumen.suspendidas || 0)}</span><span>|</span><span>Rechazadas: ${resumen.rechazadas}</span>`; }

    function pintarReservas(reservas) { reservasActuales = reservas.slice(); const tbody = document.getElementById("tbodyReservas"); if (reservaSeleccionada) { const sigue = reservasActuales.find((r) => Number(r.id) === Number(reservaSeleccionada.id)); reservaSeleccionada = sigue || null; } if (!reservas.length) { tbody.innerHTML = `<tr><td colspan="10" class="muted">No hay reservas que coincidan con los filtros.</td></tr>`; actualizarBotonesAccion(); return; } tbody.innerHTML = reservas.map((r) => { const tieneObservaciones = !!(r.observaciones && String(r.observaciones).trim()); return `<tr class="${reservaSeleccionada && Number(reservaSeleccionada.id) === Number(r.id) ? "fila-seleccionada" : ""}"><td class="sel-col"><input type="radio" name="seleccionReserva" ${reservaSeleccionada && Number(reservaSeleccionada.id) === Number(r.id) ? "checked" : ""} onchange="seleccionarReserva(${r.id})"></td><td class="obs-col">${tieneObservaciones ? `<button type="button" class="icono-observacion" title="Esta reserva tiene observaciones" onclick="abrirModalObservaciones(${r.id})"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3L22 20H2L12 3Z" fill="#FFC107" stroke="#CC9A06" stroke-width="1" stroke-linejoin="round"/><rect x="11" y="9" width="2" height="6" fill="#222"></rect><rect x="11" y="16.5" width="2" height="2" fill="#222"></rect></svg></button>` : ``}</td><td class="fecha-col"><div class="fecha-principal">${formatearFechaCorta(r.fecha)}</div><div class="fecha-secundaria"></div></td><td class="actividad-col"><div class="actividad-nombre">${r.actividad_nombre || "Actividad"}</div></td><td class="solicitante-col">${r.centro || "<span class='muted'>Sin solicitante</span>"}</td><td class="estado-col"><span class="estado-badge ${claseEstado(r.estado)}">${textoEstadoVisible(r.estado)}</span></td><td class="horario-col"><div class="horario-principal">${r.hora_inicio || "-"} - ${r.hora_fin || "-"}</div></td><td class="res-col">${r.plazas_reservadas}</td><td class="asig-col">${r.plazas_asignadas}</td><td class="tipo-col">${r.alumnos} / ${r.profesores}</td></tr>`; }).join(""); actualizarBotonesAccion(); }
    async function cargarPanel() { limpiarMensaje(); try { actualizarSubactividad(); const filtros = leerFiltros(); const query = construirQuery(filtros); const url = `/api/admin/reservas${query ? "?" + query : ""}`; const res = await fetch(url, { credentials: "same-origin" }); const data = await res.json().catch(() => null); if (!res.ok || !data?.ok) throw new Error(data?.detalle || data?.error || "No se pudo cargar el panel."); poblarSolicitantesFiltro(data.solicitantes || []); pintarResumen(data.resumen || { total_solicitudes: 0, pendientes: 0, confirmadas: 0, suspendidas: 0, rechazadas: 0 }); pintarReservas(data.reservas || []); } catch (error) { mostrarMensaje("error", error.message || "No se pudo cargar el panel de reservas."); } }
    async function cambiarEstadoSeleccion(estado) { if (!reservaSeleccionada) return; let texto = "¿Desea aplicar el cambio de estado?"; if (estado === "CONFIRMADA") texto = "¿Desea confirmar esta solicitud?"; if (estado === "RECHAZADA") texto = "¿Desea rechazar esta solicitud?"; if (!window.confirm(texto)) return; limpiarMensaje(); try { const res = await fetch("/api/admin/reservas", { method: "PATCH", headers: { "Content-Type": "application/json" }, credentials: "same-origin", body: JSON.stringify({ id: reservaSeleccionada.id, accion: estado === "CONFIRMADA" ? "confirmar" : "rechazar" }) }); const data = await res.json().catch(() => null); if (!res.ok || !data?.ok) throw new Error(data?.detalle || data?.error || "No se pudo cambiar el estado."); mostrarMensaje("ok", data.mensaje || "Estado actualizado correctamente."); await cargarPanel(); } catch (error) { mostrarMensaje("error", error.message || "No se pudo cambiar el estado."); } }

    function abrirModalObservaciones(id) { const reserva = reservasActuales.find((r) => Number(r.id) === Number(id)); if (!reserva || !reserva.observaciones || !String(reserva.observaciones).trim()) return; reservaModalEstado = null; accionPreferidaModal = ""; document.getElementById("modalObservacionesTitulo").textContent = "Observaciones"; document.getElementById("modalObservacionesSubtitulo").textContent = reserva.actividad_nombre || "Reserva"; document.getElementById("modalObservacionesContenido").className = "modal-contenido"; document.getElementById("modalObservacionesContenido").innerHTML = `<div class="estado-modal-observaciones"><div class="estado-modal-observaciones-texto">${escapeHtml(reserva.observaciones)}</div></div>`; document.getElementById("modalObservacionesAcciones").innerHTML = ``; document.getElementById("btnCerrarModalObservacionesSuperior")?.addEventListener("click", cerrarModalObservaciones); asegurarBotonCerrarModalSuperior(); document.getElementById("modalObservaciones").classList.add("activo"); document.getElementById("modalObservaciones").setAttribute("aria-hidden", "false"); }

io-principal">${r.hora_inicio || "-"} - ${r.hora_fin || "-"}</div></td><td class="res-col">${r.plazas_reservadas}</td><td class="asig-col">${r.plazas_asignadas}</td><td class="tipo-col">${r.alumnos} / ${r.profesores}</td><td class="hist-col"><button type="button" class="btn-historial" title="Ver histórico de la solicitud" onclick="abrirModalHistorial(${r.id})"><img src="assets/icono-historial-solicitud.svg" alt="Ver histórico"></button></td></tr>`; }).join(""); actualizarBotonesAccion(); }
