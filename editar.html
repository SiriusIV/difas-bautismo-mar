<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo edicion de solicitud</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .panel {
      max-width: 540px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d7dfeb;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      line-height: 1.5;
    }

    a {
      color: #0b5ed7;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Abriendo edicion de la solicitud</h1>
    <p id="mensajeRedireccion">Estamos redirigiendo a la nueva pantalla de edicion.</p>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = String(params.get("token") || "").trim();
      const mensaje = document.getElementById("mensajeRedireccion");

      if (!token) {
        mensaje.textContent = "No se ha indicado ningun token de edicion.";
        return;
      }

      const destino = `solicitud-reserva.html?token=${encodeURIComponent(token)}`;
      mensaje.innerHTML = `Si la redirección no se completa automáticamente, puede continuar desde <a href="${destino}">este enlace</a>.`;
      window.location.replace(destino);
    })();
  </script>
</body>
</html>
