<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar solicitud de bautismo de mar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .contenedor {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    h2 {
      margin-top: 6px;
      font-size: 22px;
      font-weight: normal;
    }

    h3 {
      margin-top: 30px;
      margin-bottom: 12px;
    }

    .cabecera {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
      min-height: 120px;
    }

    .logo {
      position: absolute;
      left: 0;
      max-width: 120px;
      height: auto;
    }

    .titulos {
      text-align: center;
    }

    .campo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9cfd6;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input[readonly] {
      background: #f3f5f7;
    }

    button {
      background: #0b5ed7;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #094db1;
    }

    button:disabled {
      background: #7aa7e8;
      cursor: not-allowed;
    }

    .btn-secundario {
      background: #198754;
    }

    .btn-secundario:hover {
      background: #13653f;
    }

    .btn-eliminar {
      background: #dc3545;
      padding: 10px 14px;
    }

    .btn-eliminar:hover {
      background: #b52a37;
    }

    .mensaje {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .mensaje.error {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .mensaje.ok {
      display: block;
      background: #eaf7ea;
      color: #146c2e;
      border: 1px solid #b9e0c0;
    }

    .mensaje.aviso {
      display: block;
      background: #eef4ff;
      color: #1d4f91;
      border: 1px solid #c9dcff;
    }

    .mensaje.alerta {
      display: block;
      background: #fdeaea;
      color: #9b1c1c;
      border: 1px solid #f5c2c2;
    }

    .info {
      background: #eef4ff;
      border: 1px solid #c9dcff;
      color: #1d4f91;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .info-plazas {
      margin-top: 8px;
      font-size: 14px;
      color: #444;
    }

    .fila-visitante {
      display: grid;
      grid-template-columns: 1fr 220px 130px;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .seccion {
      border-top: 1px solid #e3e7eb;
      padding-top: 18px;
      margin-top: 18px;
    }

    .acciones {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="cabecera">
      <img src="logo.png" alt="Logo" class="logo">
      <div class="titulos">
        <h1>DIFAS 2026 – Arsenal de Ferrol</h1>
        <h2>Editar solicitud de bautismo de mar</h2>
      </div>
    </div>

    <div id="infoReserva" class="info" style="display:none;"></div>
    <div id="mensaje" class="mensaje"></div>

    <form id="formularioEdicion" style="display:none;">
      <div class="campo">
        <label for="centro">Centro solicitante</label>
        <input type="text" id="centro" name="centro" required>
      </div>

      <div class="campo">
        <label for="contacto">Persona de contacto</label>
        <input type="text" id="contacto" name="contacto" required>
      </div>

      <div class="campo">
        <label for="telefono">Teléfono de contacto</label>
        <input type="tel" id="telefono" name="telefono" required>
      </div>

      <div class="campo">
        <label for="email">Correo electrónico de contacto</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="campo">
        <label for="mayores10">Número de visitantes mayores de 10 años</label>
        <input type="number" id="mayores10" name="mayores10" min="0" required readonly>
      </div>

      <div class="campo">
        <label for="menores10">Número de visitantes menores de 10 años</label>
        <input type="number" id="menores10" name="menores10" min="0" required readonly>
      </div>

      <div class="campo">
        <label for="franja">Franja horaria solicitada</label>
        <select id="franja" name="franja" required>
          <option value="">Cargando franjas...</option>
        </select>
        <div id="infoPlazas" class="info-plazas"></div>
        <div id="avisoCapacidad" class="mensaje" style="margin-top:10px;"></div>
      </div>

      <div class="campo">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" name="observaciones"></textarea>
      </div>

      <div class="acciones">
        <button type="submit" id="btnGuardar">Guardar datos generales</button>
      </div>

      <div class="seccion">
        <h3>Asistentes del grupo</h3>

        <div class="campo">
          <div id="listaVisitantes"></div>
        </div>

        <div class="acciones">
          <button type="button" id="btnAgregarVisitante" class="btn-secundario">Añadir asistente</button>
          <button type="button" id="btnGuardarVisitantes">Guardar asistentes</button>
        </div>

        <div class="campo" style="margin-top:18px;">
          <label>Resumen automático del grupo</label>
          <div id="resumenVisitantes" class="info-plazas"></div>
        </div>
      </div>
    </form>
  </div>

  <script>
    let tokenEdicion = "";
    let reservaActual = null;
    let franjasCache = [];
    let envioEnCurso = false;

    function mostrarError(texto) {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje error";
      mensaje.style.display = "block";
      mensaje.textContent = texto;
    }

    function mostrarOk(texto) {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje ok";
      mensaje.style.display = "block";
      mensaje.textContent = texto;
    }

    function limpiarMensajePrincipal() {
      const mensaje = document.getElementById("mensaje");
      mensaje.className = "mensaje";
      mensaje.style.display = "none";
      mensaje.textContent = "";
    }

    function obtenerFranjaSeleccionada() {
      const franjaId = parseInt(document.getElementById("franja").value, 10);
      if (!franjaId) return null;
      return franjasCache.find(f => Number(f.id) === franjaId) || null;
    }

    function totalSolicitado() {
      const mayores10 = parseInt(document.getElementById("mayores10").value || "0", 10);
      const menores10 = parseInt(document.getElementById("menores10").value || "0", 10);
      return mayores10 + menores10;
    }

    function plazasEditablesEnFranja(franja) {
      if (!franja) return 0;

      const disponibles = Number(franja.disponibles || 0);

      if (reservaActual && Number(franja.id) === Number(reservaActual.franja_id)) {
        return disponibles + Number(reservaActual.personas || 0);
      }

      return disponibles;
    }

    function actualizarInfoPlazas() {
      const info = document.getElementById("infoPlazas");
      const franja = obtenerFranjaSeleccionada();

      if (!franja) {
        info.textContent = "";
        return;
      }

      const editables = plazasEditablesEnFranja(franja);

      if (reservaActual && Number(franja.id) === Number(reservaActual.franja_id)) {
        info.textContent = `Plazas disponibles para modificar esta reserva en su franja actual: ${editables}`;
      } else {
        info.textContent = `Plazas disponibles en esta franja: ${editables}`;
      }
    }

    function actualizarAvisoCapacidad() {
      const aviso = document.getElementById("avisoCapacidad");
      const boton = document.getElementById("btnGuardar");
      const botonVisitantes = document.getElementById("btnGuardarVisitantes");
      const franja = obtenerFranjaSeleccionada();
      const total = totalSolicitado();

      aviso.className = "mensaje";
      aviso.style.display = "none";
      aviso.textContent = "";

      if (!franja) {
        if (!envioEnCurso) {
          boton.disabled = false;
          botonVisitantes.disabled = false;
        }
        return;
      }

      if (total <= 0) {
        if (!envioEnCurso) {
          boton.disabled = false;
          botonVisitantes.disabled = false;
        }
        return;
      }

      const disponiblesEditables = plazasEditablesEnFranja(franja);
      const esMismaFranja = reservaActual && Number(franja.id) === Number(reservaActual.franja_id);

      if (total > disponiblesEditables) {
        aviso.className = "mensaje alerta";
        aviso.style.display = "block";

        if (esMismaFranja) {
          aviso.textContent = `Está solicitando ${total} plazas, pero para modificar esta reserva en su franja actual solo dispone de ${disponiblesEditables}.`;
        } else {
          aviso.textContent = `Está solicitando ${total} plazas, pero solo quedan ${disponiblesEditables} disponibles en la franja seleccionada.`;
        }

        if (!envioEnCurso) {
          boton.disabled = true;
          botonVisitantes.disabled = true;
        }
        return;
      }

      aviso.className = "mensaje aviso";
      aviso.style.display = "block";

      if (esMismaFranja) {
        aviso.textContent = `Está solicitando ${total} plazas y la modificación es válida dentro de su franja actual.`;
      } else {
        aviso.textContent = `Está solicitando ${total} plazas y quedan ${disponiblesEditables} disponibles. El cambio de franja puede tramitarse.`;
      }

      if (!envioEnCurso) {
        boton.disabled = false;
        botonVisitantes.disabled = false;
      }
    }

    function crearFilaVisitante(nombre = "", categoria = "MAYOR_10") {
      const fila = document.createElement("div");
      fila.className = "fila-visitante";

      fila.innerHTML = `
        <input type="text" class="visitante-nombre" placeholder="Nombre y apellidos" value="${nombre.replace(/"/g, '&quot;')}" />
        <select class="visitante-categoria">
          <option value="MAYOR_10" ${categoria === "MAYOR_10" ? "selected" : ""}>Mayor de 10 años</option>
          <option value="MENOR_10" ${categoria === "MENOR_10" ? "selected" : ""}>Menor de 10 años</option>
        </select>
        <button type="button" class="btn-eliminar">Eliminar</button>
      `;

      fila.querySelector(".btn-eliminar").addEventListener("click", function () {
        fila.remove();
        recalcularResumenVisitantes();
        limpiarMensajePrincipal();
      });

      fila.querySelector(".visitante-nombre").addEventListener("input", function () {
        recalcularResumenVisitantes();
        limpiarMensajePrincipal();
      });

      fila.querySelector(".visitante-categoria").addEventListener("change", function () {
        recalcularResumenVisitantes();
        limpiarMensajePrincipal();
      });

      return fila;
    }

    function obtenerVisitantesDesdeFormulario() {
      const filas = document.querySelectorAll(".fila-visitante");
      const visitantes = [];

      filas.forEach(fila => {
        const nombre = fila.querySelector(".visitante-nombre").value.trim();
        const categoria = fila.querySelector(".visitante-categoria").value;

        if (nombre !== "") {
          visitantes.push({
            nombre_completo: nombre,
            categoria_edad: categoria
          });
        }
      });

      return visitantes;
    }

    function recalcularResumenVisitantes() {
      const visitantes = obtenerVisitantesDesdeFormulario();

      const mayores = visitantes.filter(v => v.categoria_edad === "MAYOR_10").length;
      const menores = visitantes.filter(v => v.categoria_edad === "MENOR_10").length;
      const total = visitantes.length;

      const resumen = document.getElementById("resumenVisitantes");
      resumen.innerHTML = `
        Total asistentes: <strong>${total}</strong><br>
        Mayores de 10 años: <strong>${mayores}</strong><br>
        Menores de 10 años: <strong>${menores}</strong>
      `;

      document.getElementById("mayores10").value = mayores;
      document.getElementById("menores10").value = menores;

      actualizarAvisoCapacidad();
    }

    async function cargarFranjas(franjaSeleccionadaId = "") {
      const select = document.getElementById("franja");

      const response = await fetch("/api/franjas");
      if (!response.ok) {
        throw new Error("No se pudieron cargar las franjas");
      }

      const franjas = await response.json();
      franjasCache = franjas;

      select.innerHTML = '<option value="">Seleccione una opción</option>';

      franjas.forEach(f => {
        const option = document.createElement("option");
        option.value = f.id;
        option.textContent = `${f.fecha} - ${f.hora_inicio} a ${f.hora_fin} (${f.disponibles} plazas disponibles)`;
        if (String(f.id) === String(franjaSeleccionadaId)) {
          option.selected = true;
        }
        select.appendChild(option);
      });

      const existe = franjas.some(f => String(f.id) === String(franjaSeleccionadaId));
      if (!existe && franjaSeleccionadaId && reservaActual) {
        const option = document.createElement("option");
        option.value = reservaActual.franja_id;
        option.textContent = `${reservaActual.fecha} - ${reservaActual.hora_inicio} a ${reservaActual.hora_fin} (franja actual de la reserva)`;
        option.selected = true;
        select.appendChild(option);
      }

      actualizarInfoPlazas();
      actualizarAvisoCapacidad();
    }

    async function cargarVisitantes() {
      const response = await fetch(`/api/visitantes?token=${encodeURIComponent(tokenEdicion)}`);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || "No se pudieron cargar los visitantes.");
      }

      const lista = document.getElementById("listaVisitantes");
      lista.innerHTML = "";

      if (data.visitantes.length === 0) {
        lista.appendChild(crearFilaVisitante());
      } else {
        data.visitantes.forEach(v => {
          lista.appendChild(crearFilaVisitante(v.nombre_completo, v.categoria_edad));
        });
      }

      recalcularResumenVisitantes();
    }

    async function cargarReserva() {
      const params = new URLSearchParams(window.location.search);
      tokenEdicion = params.get("token") || "";

      if (!tokenEdicion) {
        mostrarError("Falta el token de edición en la URL.");
        return;
      }

      const response = await fetch(`/api/reserva?token=${encodeURIComponent(tokenEdicion)}`);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        mostrarError(data.error || "No se pudo recuperar la reserva.");
        return;
      }

      reservaActual = data.reserva;

      document.getElementById("infoReserva").style.display = "block";
      document.getElementById("infoReserva").innerHTML = `
        <strong>Código de reserva:</strong> ${reservaActual.codigo_reserva}<br>
        <strong>Estado:</strong> ${reservaActual.estado}<br>
        <strong>Franja actual:</strong> ${reservaActual.fecha} - ${reservaActual.hora_inicio} a ${reservaActual.hora_fin}
      `;

      document.getElementById("centro").value = reservaActual.centro || "";
      document.getElementById("contacto").value = reservaActual.contacto || "";
      document.getElementById("telefono").value = reservaActual.telefono || "";
      document.getElementById("email").value = reservaActual.email || "";
      document.getElementById("mayores10").value = reservaActual.mayores10 ?? 0;
      document.getElementById("menores10").value = reservaActual.menores10 ?? 0;
      document.getElementById("observaciones").value = reservaActual.observaciones || "";

      await cargarFranjas(reservaActual.franja_id);
      await cargarVisitantes();

      document.getElementById("formularioEdicion").style.display = "block";
    }

    async function guardarCambios(event) {
      event.preventDefault();

      if (envioEnCurso) return;

      limpiarMensajePrincipal();

      const boton = document.getElementById("btnGuardar");

      const datos = {
        token_edicion: tokenEdicion,
        centro: document.getElementById("centro").value.trim(),
        contacto: document.getElementById("contacto").value.trim(),
        telefono: document.getElementById("telefono").value.trim(),
        email: document.getElementById("email").value.trim(),
        mayores10: parseInt(document.getElementById("mayores10").value || "0", 10),
        menores10: parseInt(document.getElementById("menores10").value || "0", 10),
        franja: document.getElementById("franja").value,
        observaciones: document.getElementById("observaciones").value.trim()
      };

      try {
        envioEnCurso = true;
        boton.disabled = true;
        boton.textContent = "Guardando...";

        const response = await fetch("/api/reserva-actualizar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(datos)
        });

        const resultado = await response.json();

        if (!response.ok || !resultado.ok) {
          mostrarError(resultado.error || "No se pudo actualizar la reserva.");
          await cargarReserva();
          return;
        }

        mostrarOk(`Datos generales actualizados correctamente. Quedan ${resultado.disponibles_despues} plazas disponibles en la franja seleccionada.`);
        await cargarReserva();

      } catch (error) {
        console.error(error);
        mostrarError("Error de conexión con el servidor.");
      } finally {
        envioEnCurso = false;
        boton.disabled = false;
        boton.textContent = "Guardar datos generales";
      }
    }

    async function guardarVisitantes() {
      if (envioEnCurso) return;

      limpiarMensajePrincipal();

      const boton = document.getElementById("btnGuardarVisitantes");
      const visitantes = obtenerVisitantesDesdeFormulario();

      try {
        envioEnCurso = true;
        boton.disabled = true;
        boton.textContent = "Guardando asistentes...";

        const response = await fetch("/api/visitantes-guardar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token_edicion: tokenEdicion,
            visitantes
          })
        });

        const resultado = await response.json();

        if (!response.ok || !resultado.ok) {
          mostrarError(resultado.error || "No se pudieron guardar los asistentes.");
          await cargarReserva();
          return;
        }

        mostrarOk(`Lista de asistentes actualizada correctamente. Total asistentes: ${resultado.totales.personas}. Quedan ${resultado.disponibles_despues} plazas disponibles.`);
        await cargarReserva();

      } catch (error) {
        console.error(error);
        mostrarError("Error de conexión con el servidor.");
      } finally {
        envioEnCurso = false;
        boton.disabled = false;
        boton.textContent = "Guardar asistentes";
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("franja").addEventListener("change", function () {
        limpiarMensajePrincipal();
        actualizarInfoPlazas();
        actualizarAvisoCapacidad();
      });

      document.getElementById("centro").addEventListener("input", limpiarMensajePrincipal);
      document.getElementById("contacto").addEventListener("input", limpiarMensajePrincipal);
      document.getElementById("telefono").addEventListener("input", limpiarMensajePrincipal);
      document.getElementById("email").addEventListener("input", limpiarMensajePrincipal);
      document.getElementById("observaciones").addEventListener("input", limpiarMensajePrincipal);

      document.getElementById("formularioEdicion").addEventListener("submit", guardarCambios);

      document.getElementById("btnAgregarVisitante").addEventListener("click", function () {
        document.getElementById("listaVisitantes").appendChild(crearFilaVisitante());
        recalcularResumenVisitantes();
        limpiarMensajePrincipal();
      });

      document.getElementById("btnGuardarVisitantes").addEventListener("click", guardarVisitantes);

      cargarReserva().catch(err => {
        console.error(err);
        mostrarError("Error al cargar la página de edición.");
      });
    });
  </script>
</body>
</html>
